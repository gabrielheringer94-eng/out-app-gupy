function filterTimeline(bdrId){
  // Update chip styles
  document.querySelectorAll('[id^="chip-"]').forEach(function(btn){
    var isActive=(btn.id==='chip-'+bdrId)||(bdrId==='todos'&&btn.id==='chip-todos');
    btn.style.background=isActive?'var(--accent)':'var(--bg2)';
    btn.style.color=isActive?'white':'var(--text)';
    btn.style.borderColor=isActive?'var(--accent)':'var(--border2)';
  });
  // Filter rows
  var rows=document.querySelectorAll('#timeline-rows [data-bdr]');
  rows.forEach(function(row){
    row.style.display=(bdrId==='todos'||row.dataset.bdr===bdrId)?'':'none';
  });
}

function buildLeadTimePanel(pane){
  const r=DATA.reunioes;
  const today=new Date();

  function diasAtraso(data){
    const pts=data.split('/');
    const d=new Date(2026,parseInt(pts[1])-1,parseInt(pts[0]));
    return Math.floor((today-d)/(1000*60*60*24));
  }

  function statusInfo(dias){
    if(dias<=1) return {label:'No SLA',col:'var(--green)',bg:'var(--green-bg)',icon:'✅'};
    if(dias<=6) return {label:'Atenção',col:'var(--amber)',bg:'var(--amber-bg)',icon:'⚠️'};
    if(dias<=13) return {label:'Crítico',col:'var(--red)',bg:'var(--red-bg)',icon:'🔴'};
    return {label:'Grave',col:'#7c3aed',bg:'#ede9fe',icon:'💀'};
  }

  // Build unified list (deduplicate TA+TM by empresa+bdr)
  var allMeetings=[];
  var seen={};
  [...r.atrasadasTA,...r.atrasadasTM].forEach(function(a){
    var key=a.empresa+a.id;
    if(!seen[key]){
      seen[key]=true;
      var dias=diasAtraso(a.data);
      allMeetings.push({...a, dias, status:statusInfo(dias)});
    }
  });
  allMeetings.sort(function(a,b){return b.dias-a.dias;});

  // Metrics
  var totalMeet=allMeetings.length;
  var avgDias=totalMeet>0?Math.round(allMeetings.reduce(function(s,m){return s+m.dias;},0)/totalMeet):0;
  var criticas=allMeetings.filter(function(m){return m.dias>=14;}).length;
  var noSla=allMeetings.filter(function(m){return m.dias<=1;}).length;
  var maxDias=allMeetings[0]?allMeetings[0].dias:1;

  // Group by AE
  var byAE={};
  allMeetings.forEach(function(m){
    var ae=m.ae.split(' ')[0]+' '+m.ae.split(' ')[1];
    if(!byAE[ae]) byAE[ae]={name:ae,count:0,totalDias:0,items:[]};
    byAE[ae].count++;
    byAE[ae].totalDias+=m.dias;
    byAE[ae].items.push(m);
  });
  var aeList=Object.values(byAE).sort(function(a,b){return (b.totalDias/b.count)-(a.totalDias/a.count);});

  // Group by BDR
  var byBDR={};
  allMeetings.forEach(function(m){
    if(!byBDR[m.id]) byBDR[m.id]={id:m.id,name:m.name,bg:m.bg,color:m.color,count:0,totalDias:0};
    byBDR[m.id].count++;
    byBDR[m.id].totalDias+=m.dias;
  });
  var bdrList=Object.values(byBDR).sort(function(a,b){return b.count-a.count;});

  // Build HTML
  var el=document.createElement('div');
  el.style.cssText='margin-top:16px';

  // Header
  el.innerHTML='<div style="font-size:11px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px;padding-bottom:7px;border-bottom:2px solid var(--red-bg);display:flex;align-items:center;gap:6px">'
    +'<span>⏱</span> Lead Time de Validação — SLA: 24h'
    +'</div>'

    // ── Bloco 1: Cards resumo ──
    +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">'
    +'<div class="metric-card" style="text-align:center;padding:12px 8px;border-top:3px solid var(--red)">'
    +'<div style="font-size:9px;color:var(--text3);text-transform:uppercase;font-weight:600;margin-bottom:4px">Lead time médio</div>'
    +'<div style="font-size:28px;font-weight:700;font-family:\'Inter\',sans-serif;color:var(--red);line-height:1">'+avgDias+'d</div>'
    +'<div style="font-size:9px;color:var(--text3);margin-top:3px">SLA: 1 dia</div>'
    +'</div>'
    +'<div class="metric-card" style="text-align:center;padding:12px 8px;border-top:3px solid var(--red)">'
    +'<div style="font-size:9px;color:var(--text3);text-transform:uppercase;font-weight:600;margin-bottom:4px">Reuniões pendentes</div>'
    +'<div style="font-size:28px;font-weight:700;font-family:\'Inter\',sans-serif;color:var(--text);line-height:1">'+totalMeet+'</div>'
    +'<div style="font-size:9px;color:var(--text3);margin-top:3px">'+noSla+' no SLA</div>'
    +'</div>'
    +'<div class="metric-card" style="text-align:center;padding:12px 8px;border-top:3px solid #7c3aed">'
    +'<div style="font-size:9px;color:var(--text3);text-transform:uppercase;font-weight:600;margin-bottom:4px">Graves (+14 dias)</div>'
    +'<div style="font-size:28px;font-weight:700;font-family:\'Inter\',sans-serif;color:#7c3aed;line-height:1">'+criticas+'</div>'
    +'<div style="font-size:9px;color:var(--text3);margin-top:3px">aguardando AE</div>'
    +'</div>'
    +'</div>'

    // ── Bloco 2: Ranking por AE ──
    +'<div class="card" style="margin-bottom:12px">'
    +'<div class="card-title" style="display:flex;align-items:center;justify-content:space-between">'
    +'Ranking AE — quem está segurando'
    +'<span style="font-size:9px;color:var(--text3);font-weight:400">média de dias</span>'
    +'</div>'
    +aeList.map(function(ae){
      var avg=Math.round(ae.totalDias/ae.count);
      var s=statusInfo(avg);
      var aeId='ae-'+ae.name.replace(/\s+/g,'-');
      var empresasListHtml=ae.items.map(function(x){
        var ds=Math.floor((new Date()-new Date(2026,parseInt(x.data.split('/')[1])-1,parseInt(x.data.split('/')[0])))/(1000*60*60*24));
        var dc=ds>=14?'var(--red)':ds>=7?'var(--amber)':'var(--text2)';
        return '<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);background:var(--bg2)">'
          +'<span style="font-size:11px;color:var(--text)">'+x.empresa.substring(0,32)+(x.empresa.length>32?'…':'')+'</span>'
          +'<span style="font-size:11px;font-weight:700;font-family:\'Inter\',sans-serif;color:'+dc+';margin-left:10px">'+ds+'d</span>'
          +'</div>';
      }).join('');
      return '<div style="padding:10px 0;border-bottom:1px solid var(--border)">'
        +'<div style="display:flex;align-items:center;justify-content:space-between">'
        +'<div style="display:flex;align-items:center;gap:8px">'
        +'<span style="font-size:14px">'+s.icon+'</span>'
        +'<div>'
        +'<button id="'+aeId+'" onclick="toggleAEList(\''+aeId+'\')" '
        +'onmouseenter="this.style.background=\'var(--accent-light)\';this.style.color=\'var(--accent)\';this.style.borderColor=\'var(--accent)\'" '
        +'onmouseleave="if(!document.getElementById(\'list-'+aeId+'\').style.display||document.getElementById(\'list-'+aeId+'\').style.display===\'none\'){this.style.background=\'transparent\';this.style.color=\'var(--text)\';this.style.borderColor=\'transparent\';}" '
        +'style="font-size:12px;font-weight:600;color:var(--text);background:transparent;border:1.5px solid transparent;border-radius:8px;padding:3px 8px;cursor:pointer;font-family:\'Inter\',sans-serif;transition:all .15s">'
        +ae.name+' ▾</button>'
        +'<div id="list-'+aeId+'" style="display:none;margin-top:6px;padding:4px 0;background:var(--bg2)">'
        +empresasListHtml
        +'</div>'

        +'</div>'
        +'</div>'
        +'<div style="text-align:right">'
        +'<div style="font-size:16px;font-weight:700;font-family:\'Inter\',sans-serif;color:'+s.col+'">'+avg+'d</div>'
        +'<div style="font-size:9px;color:var(--text3)">média</div>'
        +'</div>'
        +'</div>'
        +'</div>';
    }).join('')
    +'</div>'

    // ── Bloco 3: Timeline visual com filtro BDR ──
    var uniqueBdrs=[...new Set(allMeetings.map(function(m){return m.id;}))]
      .map(function(id){var m=allMeetings.find(function(x){return x.id===id;});return {id:id,name:m.name.split(' ')[0],bg:m.bg,color:m.color,photo:DATA.bdrs.find(function(b){return b.id===id;})&&DATA.bdrs.find(function(b){return b.id===id;}).photo};});
    var filterChips='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">'
      +'<button onclick="filterTimeline(\'todos\')" id="chip-todos" '

function buildBDRApp(user){
  const bdr=DATA.bdrs.find(b=>b.id===user.id);
  if(!bdr)return;
  const hasPDI=DATA.pdiUsers.includes(bdr.id);
  const tabs=[
    {id:'hoje',        label:'Início'},
    {id:'resultado',   label:'Meu Resultado'},
    {id:'performance', label:'Performance'},
    {id:'funil',       label:'Funil'},
    {id:'time_bdr',    label:'Time'},
  ];
  const builders=[
    p=>buildHoje(p,bdr),
    p=>buildMeuResultado(p,bdr),
    p=>buildPerformanceBDR(p,bdr),
    p=>buildBDRFunil(p,bdr),
    p=>buildTimeView(p,bdr),
  ];
  if(hasPDI){
    tabs.push({id:'pdi',label:'PDI'});
    builders.push(p=>buildPDI(p,bdr));
  }
  buildTabs(tabs,builders);
}

function buildMeuResultado(pane, bdr){

    var wrap=document.createElement('div');
    wrap.className='card';
    wrap.style.cssText='margin-bottom:10px;overflow:hidden;padding:0';
    var hdr=document.createElement('div');
    hdr.style.cssText='display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none';
    hdr.innerHTML='<div style="display:flex;align-items:center;gap:8px">'
      +'<span style="font-size:14px">'+icon+'</span>'
      +'<span style="font-size:13px;font-weight:700;color:var(--text)">'+title+'</span>'
      +(subtitle?'<span style="font-size:11px;font-weight:400;color:var(--text3)">'+subtitle+'</span>':'')
      +'</div>'
      +'<span id="chevron-'+id+'" style="font-size:13px;color:var(--text3);transition:transform .2s">'+(openByDefault?'▴':'▾')+'</span>';
    var body=document.createElement('div');
    body.id='mres-'+id;
    body.style.cssText='padding:0 16px 16px;display:'+(openByDefault?'block':'none');
    hdr.onclick=function(){
      var open=body.style.display!=='none';
      body.style.display=open?'none':'block';
      document.getElementById('chevron-'+id).textContent=open?'▾':'▴';
      if(!body.dataset.built){
        body.dataset.built='1';
        buildFn(body);
      }
    };
    if(openByDefault){
      body.dataset.built='1';
      buildFn(body);
    }
    wrap.appendChild(hdr);
    wrap.appendChild(body);
    pane.appendChild(wrap);
  }

  // Header
  var hd=document.createElement('div');
  hd.style.cssText='font-size:11px;color:var(--text3);margin-bottom:12px;font-family:\'Inter\',sans-serif';

  (function(){

    var sems=DATA.mesAbril.semanas; // array de semanas passadas

        var diff=real-(fcst||0);
        var diffCol=diff>=0?'var(--green)':'var(--red)';
        return '<div style="flex:1;min-width:0">'
          +'<div style="font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;text-align:center;font-family:\'Inter\',sans-serif">'+label+'</div>'
          +'<div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 4px;text-align:center;margin-bottom:4px">'
          +'<div style="font-size:8px;color:var(--text3);margin-bottom:2px;font-family:\'Inter\',sans-serif">Fcst</div>'
          +'<div style="font-size:18px;font-weight:700;font-family:\'Inter\',sans-serif;color:var(--text)">'+(loading?'…':(fcst||0))+'</div>'
          +'</div>'
          +'<div style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:7px 4px;text-align:center;margin-bottom:4px">'
          +'<div style="font-size:8px;color:var(--text3);margin-bottom:2px;font-family:\'Inter\',sans-serif">Real</div>'
          +'<div style="font-size:18px;font-weight:700;font-family:\'Inter\',sans-serif;color:var(--text)">'+(loading?'…':real)+'</div>'
          +'</div>'
          +'<div style="text-align:center;font-size:13px;font-weight:700;font-family:\'Inter\',sans-serif;color:'+(loading?'var(--text3)':diffCol)+'">'+(loading?'—':(diff>=0?'+':'')+diff)+'</div>'
          +'</div>';
      }
      return '<div style="display:flex;gap:8px">'+block('LC',lcFcst,lcReal)+block('RA',raFcst,raReal)+block('OP',opFcst,opReal)+'</div>';
    }

    // ── Chip bar ──
    var chipBar=document.createElement('div');
    chipBar.style.cssText='display:flex;gap:0;margin-bottom:12px;border-bottom:1.5px solid var(--border)';

    // ── Detail panel (single shared panel below chips) ──
    var detailPanel=document.createElement('div');
    detailPanel.id='sem-detail-panel';
    detailPanel.style.cssText='display:none;margin-bottom:14px';

    var activeSem=semAtual; // which chip is open

    function renderDetail(n){
      var isPast=n<semAtual;
      var isCurrent=n===semAtual;
      var isFuture=n>semAtual;

      detailPanel.style.display='block';

      if(isFuture){
        detailPanel.innerHTML='<div class="card" style="padding:20px;text-align:center">'
          +'<div style="font-size:13px;color:var(--text3);font-family:\'Inter\',sans-serif">📅 S'+n+' ainda não iniciou. Dados disponíveis quando a semana começar.</div>'
          +'</div>';
        return;
      }

      // Past or current — show fcst blocks
      var semData=sems.find(function(s){return s.sem===n;})||{};
      var ligVal=isCurrent?bdr.lig:(semData.lig||0);
      var rasVal=isCurrent?bdr.ras:(semData.ras||0);
      var oppsVal=isCurrent?bdr.opps:(semData.opps||0);

      detailPanel.innerHTML='<div class="card" style="padding:14px 16px">'
        +'<div id="sem-fcst-blocks-'+n+'">'+fcstBlocks(0,0,0,ligVal,rasVal,oppsVal,isCurrent)+'</div>'
        +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px">'
        +'<div style="background:var(--bg3);border-radius:var(--radius-sm);padding:9px 12px">'
        +'<div style="font-size:9px;color:var(--text3);margin-bottom:3px;font-family:\'Inter\',sans-serif">Ligações</div>'
        +'<div style="font-size:20px;font-weight:700;font-family:\'Inter\',sans-serif;color:var(--text)">'+ligVal+'</div>'
        +'</div>'
        +'<div style="background:var(--bg3);border-radius:var(--radius-sm);padding:9px 12px">'
        +'<div style="font-size:9px;color:var(--text3);margin-bottom:3px;font-family:\'Inter\',sans-serif">Atividades</div>'
        +'<div style="font-size:20px;font-weight:700;font-family:\'Inter\',sans-serif;color:var(--text)">'+(isCurrent?bdr.ativ:(semData.ativ||'—'))+'</div>'
        +'</div>'
        +'</div>'
        +'</div>';

      // Load forecast for current sem from Supabase
      if(isCurrent){
        supaFetch('gp_semanas','order=id.desc&limit=1').then(function(ss){
          if(!ss||!ss[0]) return null;
          return supaFetch('gp_forecast','semana_id=eq.'+ss[0].id+'&bdr_id=eq.'+bdr.id);
        }).then(function(fcsts){
          var f=fcsts&&fcsts[0]?fcsts[0]:null;
          var el=document.getElementById('sem-fcst-blocks-'+n);
          if(el) el.innerHTML=fcstBlocks(
            f?f.fcst_lc:0, f?f.fcst_ra:0, f?f.fcst_op:0,
            bdr.lig, bdr.ras, bdr.opps, false
          );
        }).catch(function(){});
      }
    }

    function setActiveChip(n){
      activeSem=n;
      // Update all chip styles
      document.querySelectorAll('.sem-chip').forEach(function(c){
        var cn=parseInt(c.dataset.sem);
        var isPast=cn<semAtual;
        var isCurrent=cn===semAtual;
        var isSelected=cn===n;
        c.style.borderBottom=isSelected?'2.5px solid '+(isCurrent?'var(--accent)':'var(--text)'):'2.5px solid transparent';
        c.style.color=isSelected?(isCurrent?'var(--accent)':'var(--text)'):(isPast?'var(--text3)':'var(--text)');
        c.style.fontWeight=isSelected?'700':'400';
      });
      renderDetail(n);
    }

    // Build chips for all weeks S1..semTotal
    for(var n=1;n<=semTotal;n++){
      (function(sn){
        var isPast=sn<semAtual;
        var isCurrent=sn===semAtual;
        var isFuture=sn>semAtual;
        var chip=document.createElement('button');
        chip.className='sem-chip';
        chip.dataset.sem=sn;
        chip.style.cssText='flex:1;padding:10px 4px 12px;background:none;border:none;border-bottom:2.5px solid '+(isCurrent?'var(--accent)':'transparent')+';'
          +'cursor:pointer;font-family:\'Inter\',sans-serif;font-size:16px;font-weight:'+(isCurrent?'700':'400')+';'
          +'color:'+(isCurrent?'var(--accent)':isPast?'var(--text3)':'var(--text)')+';'
          +'transition:all .15s;user-select:none;text-align:center';
        var semInfoChip=sems.find(function(s){return s.sem===sn;})||{};
        var chipDatas=semInfoChip.datas||'';
        chip.innerHTML='<div style="font-size:16px;font-weight:700;font-family:\'Inter\',sans-serif">S'+sn+'</div>'
          +'<div style="font-size:8px;margin-top:2px;font-weight:400;color:'+(isCurrent?'var(--accent)':isPast?'var(--text3)':'var(--text3)')+';font-family:\'Inter\',sans-serif;line-height:1.3">'
          +(chipDatas||( isPast?'concluída':isCurrent?'atual':'próxima'))+'</div>';
        chip.onclick=function(){ setActiveChip(sn); };
        chipBar.appendChild(chip);
      })(n);
    }

    pane.appendChild(chipBar);
    pane.appendChild(detailPanel);

    // Auto-open current week
    setActiveChip(semAtual);
  })();

  // S-1 agora acessível via chips de semana acima



  // ── Blocos reordenáveis ──
  var BLOCKS_DEF=[
    {id:'mes', title:'Resultado do Trimestre — Q2', icon:'🎯', buildFn:function(b){buildResultadoMesBDR(b,bdr);}, open:true},
    {id:'cal', title:'Meu Calendário do Mês',       icon:'🗓️', buildFn:function(b){buildCalendarioBDR(b,bdr);},   open:false},
    {id:'mrr', title:'Meu MRR',                      icon:'💰', buildFn:function(b){buildMRRBDR(b,bdr);},         open:false},
  ];

  var storageKey='mres-order-'+bdr.id;
  var savedOrder=null;
  try{ savedOrder=JSON.parse(localStorage.getItem(storageKey)); }catch(e){}
  if(savedOrder&&Array.isArray(savedOrder)){
    var ordered=[];
    savedOrder.forEach(function(sid){
      var b=BLOCKS_DEF.find(function(x){return x.id===sid;});
      if(b) ordered.push(b);
    });
    // append any missing
    BLOCKS_DEF.forEach(function(b){
      if(!ordered.find(function(x){return x.id===b.id;})) ordered.push(b);
    });
    BLOCKS_DEF=ordered;
  }

  var dragContainer=document.createElement('div');
  dragContainer.id='mres-drag-container';
  pane.appendChild(dragContainer);

  var dragSrc=null;

  function saveOrder(){
    var order=Array.from(dragContainer.children).map(function(el){return el.dataset.blockId;});
    try{ localStorage.setItem(storageKey,JSON.stringify(order)); }catch(e){}
  }

  function buildDraggableBlock(def){
    var wrap=document.createElement('div');
    wrap.className='card mres-block';
    wrap.dataset.blockId=def.id;
    wrap.style.cssText='margin-bottom:10px;overflow:hidden;padding:0;transition:opacity .2s,transform .15s';
    wrap.draggable=true;

    // Header
    var hdr=document.createElement('div');
    hdr.style.cssText='display:flex;align-items:center;justify-content:space-between;padding:12px 16px;user-select:none';

    // Left: drag handle + icon + title
    var left=document.createElement('div');
    left.style.cssText='display:flex;align-items:center;gap:8px;flex:1';

    var handle=document.createElement('span');
    handle.textContent='⠿';
    handle.title='Arrastar para reordenar';
    handle.style.cssText='font-size:16px;color:var(--text3);cursor:grab;padding:0 4px;flex-shrink:0;touch-action:none';

    var iconEl=document.createElement('span');
    iconEl.textContent=def.icon;
    iconEl.style.cssText='font-size:14px';

    var titleEl=document.createElement('span');
    titleEl.textContent=def.title;
    titleEl.style.cssText='font-size:13px;font-weight:700;color:var(--text);font-family:\'Inter\',sans-serif';

    left.appendChild(handle);
    left.appendChild(iconEl);
    left.appendChild(titleEl);

    var chev=document.createElement('span');
    chev.id='chevron-'+def.id;
    chev.textContent=def.open?'▴':'▾';
    chev.style.cssText='font-size:13px;color:var(--text3);cursor:pointer';

    hdr.appendChild(left);
    hdr.appendChild(chev);

    // Body
    var body=document.createElement('div');
    body.id='mres-'+def.id;
    body.style.cssText='padding:0 16px 16px;display:'+(def.open?'block':'none');
    if(def.open){ body.dataset.built='1'; def.buildFn(body); }

    // Toggle on header click (but not on handle)
    hdr.onclick=function(e){
      if(e.target===handle) return;
      var open=body.style.display!=='none';
      body.style.display=open?'none':'block';
      chev.textContent=open?'▾':'▴';
      if(!body.dataset.built){ body.dataset.built='1'; def.buildFn(body); }
    };

    // ── Drag events ──
    wrap.addEventListener('dragstart',function(e){
      dragSrc=wrap;
      wrap.style.opacity='0.4';
      e.dataTransfer.effectAllowed='move';
    });
    wrap.addEventListener('dragend',function(){
      dragSrc=null;
      wrap.style.opacity='1';
      wrap.style.transform='';
      document.querySelectorAll('.mres-block').forEach(function(b){
        b.style.borderTop='';
      });
      saveOrder();
    });
    wrap.addEventListener('dragover',function(e){
      e.preventDefault();
      e.dataTransfer.dropEffect='move';
      if(dragSrc&&dragSrc!==wrap){
        wrap.style.borderTop='2px solid var(--accent)';
      }
    });
    wrap.addEventListener('dragleave',function(){
      wrap.style.borderTop='';
    });
    wrap.addEventListener('drop',function(e){
      e.preventDefault();
      wrap.style.borderTop='';
      if(dragSrc&&dragSrc!==wrap){
        var container=dragContainer;
        var children=Array.from(container.children);
        var srcIdx=children.indexOf(dragSrc);
        var tgtIdx=children.indexOf(wrap);
        if(srcIdx<tgtIdx){
          container.insertBefore(dragSrc,wrap.nextSibling);
        } else {
          container.insertBefore(dragSrc,wrap);
        }
        saveOrder();
      }
    });

    // ── Touch drag (mobile) ──
    var touchStartY=0, touchClone=null, touchOffsetY=0;
    handle.addEventListener('touchstart',function(e){
      e.stopPropagation();
      var t=e.touches[0];
      touchStartY=t.clientY;
      touchOffsetY=t.clientY-wrap.getBoundingClientRect().top;
      touchClone=wrap.cloneNode(true);
      touchClone.style.cssText='position:fixed;left:'+wrap.getBoundingClientRect().left+'px;top:'+(t.clientY-touchOffsetY)+'px;width:'+wrap.offsetWidth+'px;opacity:.7;z-index:9999;pointer-events:none;transition:none;box-shadow:0 8px 30px rgba(0,0,0,.3)';
      document.body.appendChild(touchClone);
      wrap.style.opacity='0.3';
    },{passive:true});
    handle.addEventListener('touchmove',function(e){
      if(!touchClone) return;
      e.preventDefault();
      var t=e.touches[0];
      touchClone.style.top=(t.clientY-touchOffsetY)+'px';
      // Find element under touch
      touchClone.style.display='none';
      var el=document.elementFromPoint(t.clientX,t.clientY);
      touchClone.style.display='';
      var target=el?el.closest('.mres-block'):null;
      document.querySelectorAll('.mres-block').forEach(function(b){b.style.borderTop='';});
      if(target&&target!==wrap) target.style.borderTop='2px solid var(--accent)';
    },{passive:false});
    handle.addEventListener('touchend',function(e){
      if(!touchClone) return;
      var t=e.changedTouches[0];
      touchClone.remove(); touchClone=null;
      wrap.style.opacity='1';
      document.querySelectorAll('.mres-block').forEach(function(b){b.style.borderTop='';});
      var el=document.elementFromPoint(t.clientX,t.clientY);
      var target=el?el.closest('.mres-block'):null;
      if(target&&target!==wrap){
        var container=dragContainer;
        var children=Array.from(container.children);
        var srcIdx=children.indexOf(wrap);
        var tgtIdx=children.indexOf(target);
        if(srcIdx<tgtIdx) container.insertBefore(wrap,target.nextSibling);
        else container.insertBefore(wrap,target);
        saveOrder();
      }
    });

    wrap.appendChild(hdr);
    wrap.appendChild(body);
    return wrap;
  }

  BLOCKS_DEF.forEach(function(def){
    dragContainer.appendChild(buildDraggableBlock(def));
  });
}


// ─── RESULTADO MÊS BDR ────────────────────────────────────────
function buildResultadoMesBDR(body, bdr){
  var meta=DATA.metaBDR;
  var semAtual=DATA.semAtual;
  var semTotal=DATA.semTotal;

  // Meses do Q2 — Abril (em andamento), Maio e Junho (futuros)
  var meses=[
    {
      nome:'Abril 2026', short:'Abr', ativo:true,
      real:bdr.opps,
      meta:meta,
      mtd:semAtual>0?Math.round((bdr.opps/semAtual)*semTotal):0,
      semAtual:semAtual, semTotal:semTotal
    },
    {nome:'Maio 2026',  short:'Mai', ativo:false, real:0, meta:meta, mtd:null},
    {nome:'Junho 2026', short:'Jun', ativo:false, real:0, meta:meta, mtd:null},
  ];

  function mesCard(m){
    var pct=m.meta>0?Math.min(Math.round((m.real/m.meta)*100),100):0;
    var realCol=pct>=100?'var(--green)':pct>=60?'var(--amber)':'var(--red)';
    var mtdCol=m.mtd!==null?(m.mtd>=m.meta?'var(--green)':m.mtd>=m.meta*0.7?'var(--amber)':'var(--red)'):'var(--text3)';
    var desvio=m.real-m.meta;
    var desvCol=desvio>=0?'var(--green)':'var(--red)';
    var cardId='mes-card-'+m.short;
    var openByDefault=m.ativo; // Abril abre, Maio e Junho fechados

    var paceBar='';
    if(m.ativo){
      paceBar='<div style="margin:8px 0 6px">'
        +'<div style="height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;position:relative">'
        +'<div style="position:absolute;left:0;top:0;height:100%;width:'+Math.round(((m.semAtual/m.semTotal)*100))+'%;background:rgba(99,179,237,0.45);border-radius:3px"></div>'
        +'<div style="width:'+pct+'%;height:100%;background:'+(pct>=100?'var(--green)':pct>=60?'var(--amber)':'var(--red)')+';border-radius:3px"></div>'
        +'</div>'
        +'<div style="display:flex;justify-content:space-between;font-size:8px;color:var(--text3);margin-top:3px;font-family:\'Inter\',sans-serif">'
        +'<span>sem '+m.semAtual+'/'+m.semTotal+'</span><span>'+pct+'%</span></div>'
        +'</div>';
    }

    var detailHtml=paceBar
      +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:4px;margin-top:8px">'
      +compact('Meta',   m.meta, 'var(--text2)')
      +compact('Real',   m.real, m.ativo?realCol:'var(--text3)')
      +compact('MTD',    m.mtd!==null?m.mtd:'—', m.ativo?mtdCol:'var(--text3)')
      +compact('Desvio', m.ativo?(desvio>=0?'+'+desvio:String(desvio)):'—', m.ativo?desvCol:'var(--text3)')
      +'</div>';

    // Header line (always visible)
    var headerLine='<div onclick="toggleMesCard(\''+cardId+'\', this)" '
      +'style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none">'
      +'<div style="display:flex;align-items:center;gap:8px">'
      +'<span style="font-size:12px;font-weight:700;color:'+(m.ativo?'var(--accent)':'var(--text2)')+';font-family:\'Inter\',sans-serif">'+m.nome+'</span>'
      +(m.ativo?'<span style="font-size:9px;font-weight:600;color:var(--accent);background:var(--accent-light);padding:2px 7px;border-radius:10px;font-family:\'Inter\',sans-serif">em andamento</span>'
               :'<span style="font-size:9px;color:var(--text3);font-family:\'Inter\',sans-serif">em breve</span>')
      +'</div>'
      +'<span id="chev-'+cardId+'" style="font-size:13px;color:var(--text3)">'+(openByDefault?'▴':'▾')+'</span>'
      +'</div>';

    return '<div style="border:1px solid '+(m.ativo?'var(--accent)':'var(--border)')+';border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:8px;'+(m.ativo?'background:rgba(26,86,219,0.04)':'')+'">'
      +headerLine
      +'<div id="'+cardId+'" style="display:'+(openByDefault?'block':'none')+'">'+detailHtml+'</div>'
      +'</div>';
  }

  function compact(label, val, col){
    return '<div style="text-align:center;padding:6px 4px;background:var(--bg3);border-radius:6px">'
      +'<div style="font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;font-family:\'Inter\',sans-serif">'+label+'</div>'
      +'<div style="font-size:16px;font-weight:700;font-family:\'Inter\',sans-serif;color:'+(col||'var(--text)')+'">'+val+'</div>'
      +'</div>';
  }

  body.innerHTML='<div style="font-size:10px;color:var(--text3);margin-bottom:10px;font-family:\'Inter\',sans-serif">Q2 2026 · Abr → Jun · Meta mensal: '+meta+' opps</div>'
    +meses.map(mesCard).join('');
}

// ─── CALENDÁRIO BDR ───────────────────────────────────────────
function buildCalendarioBDR(body, bdr){
  var r=DATA.reunioes;

  // Filter futuras for this BDR
  var futuras=r.futuras.map(function(d){
    return {date:d.date,day:d.day,
      ta:d.ta.filter(function(m){return m.bdr===bdr.name;}),
      tm:d.tm.filter(function(m){return m.bdr===bdr.name;})};
  }).filter(function(d){return d.ta.length>0||d.tm.length>0;});

  // Atrasadas for this BDR
  var atrasadasTA=r.atrasadasTA.filter(function(a){return a.id===bdr.id;});
  var atrasadasTM=r.atrasadasTM.filter(function(a){return a.id===bdr.id;});

  // Build column for each date (futuras + atrasadas)
  var allDates={};

  // Add futuras
  futuras.forEach(function(d){
    if(!allDates[d.date]) allDates[d.date]={date:d.date,day:d.day,items:[],isAtrasada:false};
    d.ta.forEach(function(m){allDates[d.date].items.push({tipo:'TA',empresa:m.empresa,status:'futura'});});
    d.tm.forEach(function(m){allDates[d.date].items.push({tipo:'TM',empresa:m.empresa,status:'futura'});});
  });

  // Add atrasadas
  function addAtrasada(list, tipo){
    list.forEach(function(a){
      if(!allDates[a.data]) allDates[a.data]={date:a.data,day:'',items:[],isAtrasada:true};
      var pts=a.data.split('/');
      var dias=Math.floor((new Date()-new Date(2026,parseInt(pts[1])-1,parseInt(pts[0])))/(1000*60*60*24));
      allDates[a.data].items.push({tipo:tipo,empresa:a.empresa,status:'atrasada',dias:dias});
      allDates[a.data].isAtrasada=true;
    });
  }
  addAtrasada(atrasadasTA,'TA');
  addAtrasada(atrasadasTM,'TM');

  var dateKeys=Object.keys(allDates).sort(function(a,b){
    var pa=a.split('/'); var pb=b.split('/');
    return new Date(2026,parseInt(pa[1])-1,parseInt(pa[0]))-new Date(2026,parseInt(pb[1])-1,parseInt(pb[0]));
  });

  if(dateKeys.length===0){
    body.innerHTML='<div style="text-align:center;padding:20px;color:var(--text3);font-size:13px;font-family:\'Inter\',sans-serif">Nenhuma reunião agendada ou atrasada.</div>';
    return;
  }

  var cols=dateKeys.map(function(dt){
    var d=allDates[dt];
    var borderCol=d.isAtrasada?'rgba(220,38,38,0.4)':'rgba(26,86,219,0.2)';
    var headerCol=d.isAtrasada?'var(--red)':'var(--accent)';
    var headerBg=d.isAtrasada?'var(--red-bg)':'var(--accent-light)';
    var items=d.items.map(function(it){
      var tipoCor=it.tipo==='TA'?'var(--accent)':'var(--teal)';
      var tipoBg=it.tipo==='TA'?'var(--accent-light)':'rgba(13,148,136,0.1)';
      var statusBadge=it.status==='atrasada'
        ?'<span style="font-size:9px;font-weight:600;color:var(--red);font-family:\'Inter\',sans-serif">'+it.dias+'d atrasada</span>'
        :'';
      return '<div style="padding:8px 10px;border-radius:8px;background:var(--bg2);border:1px solid '+(it.status==='atrasada'?'rgba(220,38,38,0.2)':'var(--border)')+';margin-bottom:6px">'
        +'<div style="display:flex;align-items:center;gap:5px;margin-bottom:3px">'
        +'<span style="font-size:8px;font-weight:700;color:'+tipoCor+';background:'+tipoBg+';padding:1px 6px;border-radius:4px;font-family:\'Inter\',sans-serif">'+it.tipo+'</span>'
        +statusBadge
        +'</div>'
        +'<div style="font-size:12px;font-weight:500;color:var(--text);line-height:1.3;font-family:\'Inter\',sans-serif">'+it.empresa+'</div>'
        +'</div>';
    }).join('');

    // Each date = a card column (vertical, fixed width, swipeable horizontally)
    return '<div style="width:160px;flex-shrink:0;display:flex;flex-direction:column">'
      +'<div style="padding:7px 10px;border-radius:8px;background:'+headerBg+';margin-bottom:8px;border:1px solid '+borderCol+';text-align:center">'
      +'<div style="font-size:12px;font-weight:700;color:'+headerCol+';font-family:\'Inter\',sans-serif">'+d.date+(d.day?' · '+d.day:'')+'</div>'
      +(d.isAtrasada?'<div style="font-size:9px;color:var(--red);font-weight:500;margin-top:1px;font-family:\'Inter\',sans-serif">⚠ atrasada</div>':'')
      +'</div>'
      +items
      +'</div>';
  }).join('');

  // ── Resumo: futuras vs atrasadas por AE ──
  var totalFuturas=0, totalAtrasadas=0;
  var byAE={};

  function addAE(ae,tipo,status){
    var key=ae;
    if(!byAE[key]) byAE[key]={ae:ae,taFut:0,tmFut:0,taAt:0,tmAt:0};
    if(status==='futura'){ if(tipo==='TA') byAE[key].taFut++; else byAE[key].tmFut++; }
    else                 { if(tipo==='TA') byAE[key].taAt++;  else byAE[key].tmAt++;  }
  }

  futuras.forEach(function(d){
    d.ta.forEach(function(m){ totalFuturas++; addAE('—','TA','futura'); });
    d.tm.forEach(function(m){ totalFuturas++; addAE('—','TM','futura'); });
  });
  atrasadasTA.forEach(function(a){ totalAtrasadas++; addAE(a.ae,'TA','atrasada'); });
  atrasadasTM.forEach(function(a){ totalAtrasadas++; addAE(a.ae,'TM','atrasada'); });

  // Build AE summary rows
  var aeRows=Object.values(byAE).map(function(ae){
    var temAt=ae.taAt>0||ae.tmAt>0;
    return '<div style="display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)">'

      +(ae.taAt+ae.tmAt>0?'<span style="font-size:10px;font-weight:600;color:var(--red);background:var(--red-bg);padding:2px 7px;border-radius:10px;font-family:\'Inter\',sans-serif">'+(ae.taAt>0?ae.taAt+'TA ':'')+( ae.tmAt>0?ae.tmAt+'TM':'')+'⚠</span>':'')
      +'</div>'
      +'<span style="font-size:10px;color:var(--text3);font-family:\'Inter\',sans-serif">'+(ae.taFut+ae.tmFut+ae.taAt+ae.tmAt)+' total</span>'
      +'</div>';
  }).join('');

  var summaryHtml='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">'
    +'<div style="background:var(--accent-light);border:1px solid rgba(26,86,219,0.2);border-radius:var(--radius-sm);padding:10px 12px;text-align:center">'
    +'<div style="font-size:22px;font-weight:700;font-family:\'Inter\',sans-serif;color:var(--accent)">'+totalFuturas+'</div>'
    +'<div style="font-size:10px;color:var(--accent);font-weight:600;margin-top:2px;font-family:\'Inter\',sans-serif">Futuras</div>'
    +'</div>'
    +'<div style="background:var(--red-bg);border:1px solid rgba(220,38,38,0.2);border-radius:var(--radius-sm);padding:10px 12px;text-align:center">'
    +'<div style="font-size:22px;font-weight:700;font-family:\'Inter\',sans-serif;color:var(--red)">'+totalAtrasadas+'</div>'
    +'<div style="font-size:10px;color:var(--red);font-weight:600;margin-top:2px;font-family:\'Inter\',sans-serif">Atrasadas</div>'
    +'</div>'
    +'</div>'
    +(aeRows?'<div style="margin-bottom:12px">'
      +'<div style="font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;font-family:\'Inter\',sans-serif">Por AE / Por mundo</div>'
      +aeRows
      +'</div>':'');

  body.innerHTML=summaryHtml
    +'<div style="font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;font-family:\'Inter\',sans-serif">Timeline</div>'
    +'<div style="overflow-x:auto;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory;margin:0 -16px;padding-bottom:8px">'
    +'<div style="display:flex;gap:10px;min-width:max-content;padding:0 16px">'
    +cols
    +'</div>'
    +'</div>'
    +'<div style="padding:6px 0 0;font-size:10px;color:var(--text3);font-family:\'Inter\',sans-serif;display:flex;align-items:center;gap:4px;justify-content:center">'
    +'<span style="opacity:.5">←</span><span style="opacity:.5"> deslize </span><span style="opacity:.5">→</span>'
    +'</div>';

}
// ─── HOJE ─────────────────────────────────────────────────────

function buildHoje(pane, bdr){
  const META=DATA.metaBDR, SEMR=DATA.semTotal-DATA.semAtual;

  const prioridades=[];

  // Priority 1: always about opps/RAs

    prioridades.push({icon:'🤝',cor:'var(--amber)',titulo:'Acompanhar reuniões realizadas',desc:`Você tem ${bdr.ras} RAs mas 0 oportunidades. Verifique com o AE o status das reuniões feitas — pode haver oportunidade já validada.`});
  } else {
    prioridades.push({icon:'🎯',cor:'var(--green)',titulo:'Manter o ritmo',desc:`${bdr.ras} RAs e ${bdr.opps} opps na semana. Você precisa de ${needed} opps/semana restante para bater a meta de ${META}.`});
  }

  // Priority 2: volume of calls
  if(bdr.lig<10){
    prioridades.push({icon:'⚡',cor:'var(--red)',titulo:'Volume de ligações crítico',desc:`${bdr.lig} ligações conectadas — muito abaixo do time. Reserve blocos de 45min só para ligações hoje.`});
  } else if(bdr.lig<ligMeta){
    prioridades.push({icon:'📈',cor:'var(--amber)',titulo:'Aumentar volume de ligações',desc:`${bdr.lig} ligações vs benchmark de ${ligMeta}/semana. Tente mais ${ligMeta-bdr.lig} conexões hoje.`});
  } else {
    prioridades.push({icon:'✅',cor:'var(--green)',titulo:'Volume saudável de ligações',desc:`${bdr.lig} ligações conectadas — acima do benchmark. Mantenha o ritmo e foque na qualificação das conversas.`});
  }

  // Priority 3: conversion or disqualification
  if(bdr.desq>20){
    prioridades.push({icon:'🔍',cor:'var(--amber)',titulo:'Revisar critérios de qualificação',desc:`${bdr.desq} leads desqualificados esta semana. Revise o ICP com seu gestor — possível problema na lista de prospecção.`});
  } else if(convLigRA<10&&bdr.lig>5){
    prioridades.push({icon:'💬',cor:'var(--amber)',titulo:'Trabalhar o pitch de qualificação',desc:`Conversão lig→RA em ${convLigRA}% — abaixo do esperado. Revise sua abordagem de abertura e qualificação na ligação.`});
  } else {
    prioridades.push({icon:'📋',cor:'var(--blue)',titulo:'Limpar leads parados',desc:`Verifique seus leads sem atividade há mais de 3 dias. Ou avance ou desqualifique — lead parado não vira oportunidade.`});
  }

  // Reuniões do dia - nova estrutura com objetos {bdr, empresa}

  const isCritical=bdr.lig<=5||bdr.ras===0;

  const semAnteriorBoa=bdr.opps>=Math.ceil(DATA.metaBDR/DATA.semTotal);
  const totalOppsTime=DATA.funil.oportunidades;
  const totalRAsTime=DATA.funil.reuniaoAgendada;

  const atrasadasBDR=[...DATA.reunioes.atrasadasTA,...DATA.reunioes.atrasadasTM].filter(a=>a.id===bdr.id);
  const temAtrasadas=atrasadasBDR.length>0;

async function loadBDRForecast(bdr, forceSemId){
  const el=document.getElementById(`forecast-content-${bdr.id}`);
  if(!el) return;
  try{
    // Get all semanas for selector
    const allSemanas=await supaFetch('gp_semanas','order=id.asc');
    if(!allSemanas||!allSemanas.length){el.innerHTML='<div style="font-size:12px;color:var(--text3);text-align:center;padding:12px">Sem semana ativa.</div>';return;}
    // Default to forceSemId or current semana
    const targetSem=forceSemId||allSemanas.find(s=>s.sem_atual===DATA.semAtual)?.id||allSemanas[allSemanas.length-1].id;
    const semId=targetSem;
    // Render semana selector chips
    const selectorHtml='<div style="display:flex;gap:4px;margin-bottom:12px;justify-content:center">'+allSemanas.map(s=>{
      const isActive=s.id===semId;
      const isCur=s.sem_atual===DATA.semAtual;
      return `<button onclick="loadBDRForecast(DATA.bdrs.find(b=>b.id==='${bdr.id}'),${s.id})" style="font-size:11px;font-weight:${isActive?'700':'500'};padding:5px 12px;border-radius:20px;border:${isActive?'2px solid var(--accent)':'1px solid var(--border)'};background:${isActive?'var(--accent-light)':'transparent'};color:${isActive?'var(--accent)':'var(--text3)'};cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s">S${s.sem_atual}${isCur?' ●':''}</button>`;
    }).join('')+'</div>';
    el.innerHTML=selectorHtml+'<div id="forecast-sem-content-${bdr.id}"><div style="text-align:center;padding:8px;color:var(--text3);font-size:11px">Carregando...</div></div>';
    const contentEl=document.getElementById(`forecast-sem-content-${bdr.id}`)||el;

    // Check if already submitted
    const existing=await supaFetch('gp_forecast',`semana_id=eq.${semId}&bdr_id=eq.${bdr.id}`);
    const isGestor=currentUser&&currentUser.isGestor;
    if(existing&&existing.length>0){
      const f=existing[0];
      const dt=f.enviado_em?new Date(f.enviado_em).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'—';
      const fStatus=f.status||'aguardando';
      const statusBg=fStatus==='aprovado'?'#f0fdf4':fStatus==='reflita'?'#fff5f5':'#fffbeb';
      const statusBorder=fStatus==='aprovado'?'#bbf7d0':fStatus==='reflita'?'#fecaca':'#fde68a';
      const statusIcon=fStatus==='aprovado'?'✅':fStatus==='reflita'?'🔄':'⏳';
      const statusLabel=fStatus==='aprovado'?'Aprovado pela liderança':fStatus==='reflita'?'Liderança pediu reflexão':'Aguardando aprovação da liderança';
      const statusColor=fStatus==='aprovado'?'var(--green)':fStatus==='reflita'?'var(--red)':'var(--amber)';
      contentEl.innerHTML=`
        <div style="background:${statusBg};border:1px solid ${statusBorder};border-radius:var(--radius-sm);padding:12px;margin-bottom:12px">
          <div style="display:flex;align-items:center;justify-content:space-between">
            <div style="display:flex;align-items:center;gap:8px">
              <span style="font-size:18px">${statusIcon}</span>
              <div>
                <div style="font-size:12px;font-weight:700;color:${statusColor}">${statusLabel}</div>
                <div style="font-size:10px;color:var(--text3);margin-top:1px">Forecast enviado — ${dt}</div>
              </div>
            </div>
            <button onclick="editForecast('${bdr.id}','${bdr.name}',${semId},${f.id})" style="font-size:10px;font-weight:600;color:var(--accent);background:var(--accent-light);border:none;border-radius:8px;padding:5px 10px;cursor:pointer;font-family:\'Inter\',sans-serif">Editar ✎</button>
          </div>
          ${fStatus==='reflita'&&f.justificativa?`<div style="margin-top:8px;padding:10px;background:white;border-radius:8px;border:1px solid #fecaca">
            <div style="font-size:9px;color:var(--red);font-weight:600;margin-bottom:4px">Feedback do gestor:</div>
            <div style="font-size:11px;color:var(--text);line-height:1.4;margin-bottom:10px">${f.justificativa}</div>
            <div style="display:flex;gap:8px">
              <button onclick="editForecast('${bdr.id}','${bdr.name}',${semId},${f.id})" style="flex:1;font-size:11px;font-weight:600;color:white;background:var(--accent);border:none;border-radius:8px;padding:8px;cursor:pointer;font-family:'Inter',sans-serif">Ajustar Forecast</button>
              <button onclick="keepForecast(${f.id},'${bdr.id}')" style="flex:1;font-size:11px;font-weight:600;color:var(--text2);background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px;cursor:pointer;font-family:'Inter',sans-serif">Manter esse</button>
            </div>
          </div>`:''}
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
          ${[['LC',f.fcst_lc],['RA',f.fcst_ra],['OP',f.fcst_op]].map(([l,v])=>`
            <div style="background:var(--bg3);border-radius:var(--radius-sm);padding:10px;text-align:center">
              <div style="font-size:22px;font-weight:700;font-family:\'Inter\',sans-serif;color:var(--accent)">${v}</div>
              <div style="font-size:9px;color:var(--text3);text-transform:uppercase;margin-top:3px">${l}</div>
            </div>`).join('')}
        </div>
        <div style="margin-top:10px;text-align:center">
          <button onclick="resetForecast(${f.id},'${bdr.id}')" style="font-size:10px;font-weight:500;color:var(--text3);background:transparent;border:1px solid var(--border);border-radius:8px;padding:6px 14px;cursor:pointer;font-family:'Inter',sans-serif">Resetar Forecast</button>
        </div>`;
      return;
    }

    // ── Smart suggestion with full rationale ──
    const semR=Math.max(1,DATA.semTotal-DATA.semAtual+1); // semanas restantes incl. atual
    const semRest=DATA.semTotal-DATA.semAtual; // após esta semana
    const oppsLeft=Math.max(0,DATA.metaBDR-bdr.opps);
    const bench=DATA.benchmarks;

    // Use hist3m m3 (mês mais recente) for conversions
    const bdrH=DATA.hist3m&&DATA.hist3m.bdrs&&DATA.hist3m.bdrs[bdr.id];
    const m3=bdrH?bdrH.m3:null;

    // Per-conversion: use BDR if >= bench*0.5, else flag as critical and use bench
    const CRITICAL_THRESHOLD=0.6; // abaixo de 60% do bench = crítico
    function resolveConv(bdrVal, benchVal, label){
      const hasBdr=m3&&bdrVal>0;
      const bdrRate=hasBdr?bdrVal/100:null;
      const benchRate=benchVal/100;
      const isCritical=hasBdr&&(bdrRate<benchRate*CRITICAL_THRESHOLD);
      const usedRate=(!hasBdr||isCritical)?benchRate:bdrRate;
      return {
        bdrVal:hasBdr?bdrVal:null,
        benchVal,
        usedRate,
        isCritical,
        usedBench:!hasBdr||isCritical,
        label
      };
    }

    const convAiLc=resolveConv(m3?m3.aiLc:0, bench.aiLc, 'AI→LC');
    const convLcRa=resolveConv(m3?m3.lcRa:0, bench.lcRa, 'LC→RA');
    const convRaOp=resolveConv(m3?m3.raOp:0, bench.raOp, 'RA→OP');

    // Calculate suggestion bottom-up (OP → RA → LC → AI)
    const sugOp=semR>0?Math.ceil(oppsLeft/semR):oppsLeft;
    const sugRa=convRaOp.usedRate>0?Math.ceil(sugOp/convRaOp.usedRate):0;
    const sugLc=convLcRa.usedRate>0?Math.ceil(sugRa/convLcRa.usedRate):0;
    const sugAi=convAiLc.usedRate>0?Math.ceil(sugLc/convAiLc.usedRate):0;

    // Critical conversions list
    const criticals=[convRaOp,convLcRa,convAiLc].filter(c=>c.isCritical);

    // Build rationale rows
    function convRow(conv, from, to){
      const col=conv.isCritical?'var(--red)':conv.usedBench?'var(--amber)':'var(--green)';
      const src=conv.usedBench
        ?(conv.isCritical?'crit. — usando benchmark':'ref. do time')
        :'seu histórico';
      return '<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border)">'
        +'<span style="font-size:11px;color:var(--text2)">'+from+' → '+to+'</span>'
        +'<div style="display:flex;align-items:center;gap:5px">'
        +'<span style="font-size:12px;font-weight:700;color:'+col+'">'+Math.round(conv.usedRate*100)+'%</span>'
        +'<span style="font-size:9px;color:var(--text3)">('+src+')</span>'
        +'</div></div>';
    }

    // Show input form
    contentEl.innerHTML=`
      <div style="background:rgba(0,60,253,0.05);border:1px solid rgba(0,60,253,0.15);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:14px">
        <div style="font-size:12px;font-weight:700;color:var(--accent);margin-bottom:4px">Este é o seu compromisso.</div>
        <div style="font-size:12px;color:var(--text2);line-height:1.6">Seu forecast é visível para o gestor e para o time. Seja honesto — um bom forecast não é o número que você quer, é o número que você acredita que vai entregar.</div>
      </div>

      ${oppsLeft>0?`
      <div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:14px">

        <!-- Header -->
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:12px">
          <span style="font-size:14px">💡</span>
          <div style="font-size:12px;font-weight:700;color:var(--text);font-family:'Inter',sans-serif">Sugestão para esta semana</div>
          <span style="font-size:9px;color:var(--text3);background:var(--bg4);padding:2px 7px;border-radius:10px;font-family:'Inter',sans-serif;margin-left:auto">${semR} sem. restante${semR>1?'s':''}</span>
        </div>

        <!-- Goal summary -->
        <div style="background:#fff;border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:10px;border:1px solid var(--border)">
          <div style="font-size:11px;color:var(--text3);margin-bottom:4px;font-family:'Inter',sans-serif">Para bater a meta de ${DATA.metaBDR} opps</div>
          <div style="font-size:13px;color:var(--text);line-height:1.6;font-family:'Inter',sans-serif">
            Faltam <strong style="color:var(--accent)">${oppsLeft} opp${oppsLeft>1?'s':''}</strong> em ${semR} semana${semR>1?'s':''}
            → <strong style="color:var(--accent)">${sugOp} opp${sugOp>1?'s':''} esta semana</strong>
          </div>
        </div>

        <!-- Racional — colapsável -->
        <div style="margin-bottom:10px">
          <button onclick="(function(btn){
            var detail=btn.nextElementSibling;
            var open=detail.style.display!=='none';
            detail.style.display=open?'none':'block';
            btn.querySelector('.rac-arrow').style.transform=open?'':'rotate(180deg)';
          })(this)" style="width:100%;display:flex;align-items:center;justify-content:space-between;background:none;border:none;padding:4px 0;cursor:pointer;font-family:'Inter',sans-serif">
            <span style="font-size:11px;font-weight:600;color:var(--accent);text-decoration:underline;text-underline-offset:2px;text-decoration-style:dotted">Como chegamos nesses números?</span>
            <span class="rac-arrow" style="font-size:10px;color:var(--accent);transition:transform .2s">▼</span>
          </button>
          <div style="display:none;background:#fff;border-radius:var(--radius-sm);padding:10px 12px;margin-top:6px;border:1px solid var(--border)">
            <div style="font-size:12px;color:var(--text2);line-height:1.9;margin-bottom:8px">
              <span style="color:var(--accent);font-weight:600">${sugOp} OP</span>
              ÷ <span style="color:var(--teal);font-weight:600">${Math.round(convRaOp.usedRate*100)}% RA→OP</span>
              = <span style="font-weight:600;color:var(--text)">${sugRa} RAs</span>
              ÷ <span style="color:var(--teal);font-weight:600">${Math.round(convLcRa.usedRate*100)}% LC→RA</span>
              = <span style="font-weight:600;color:var(--text)">${sugLc} LCs</span>
              ÷ <span style="color:var(--teal);font-weight:600">${Math.round(convAiLc.usedRate*100)}% AI→LC</span>
              = <span style="font-weight:600;color:var(--text)">${sugAi} Abordagens</span>
            </div>
            ${convRow(convRaOp,'RA','OP')}
            ${convRow(convLcRa,'LC','RA')}
            ${convRow(convAiLc,'AI','LC')}
          </div>
        </div>

        <!-- Cards com valores sugeridos -->
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px">
          ${[['AI',sugAi,'var(--text2)'],['LC',sugLc,'var(--text)'],['RA',sugRa,'var(--teal)'],['OP',sugOp,'var(--accent)']].map(([l,v,c])=>`
            <div style="text-align:center;padding:8px 4px;background:#fff;border-radius:8px;border:1px solid var(--border)">
              <div style="font-size:20px;font-weight:700;color:${c};font-family:'Inter',sans-serif">${v}</div>

          </button>

        <!-- Usar sugestão -->
        <button onclick="(function(){
          document.getElementById('fcst-lc-${bdr.id}').value=${sugLc};

          document.getElementById('fcst-op-${bdr.id}').value=${sugOp};
          // AI field is read-only reference — no input to fill
          document.getElementById('fcst-submit-${bdr.id}').disabled=false;
          document.getElementById('fcst-submit-${bdr.id}').style.opacity='1';
        })()" style="width:100%;padding:9px;background:transparent;border:1.5px solid rgba(0,18,47,0.15);border-radius:8px;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;font-family:'Inter',sans-serif">

}

async function submitForecast(bdrId,bdrNome,semId,btnRef){
  const lc=parseInt(document.getElementById(`fcst-lc-${bdrId}`)?.value)||0;
  const ra=parseInt(document.getElementById(`fcst-ra-${bdrId}`)?.value)||0;
  const op=parseInt(document.getElementById(`fcst-op-${bdrId}`)?.value)||0;
  if(lc===0&&ra===0&&op===0){alert('Preencha pelo menos um campo antes de enviar o forecast.');return;}
  const btn=btnRef||document.getElementById(`fcst-submit-${bdrId}`)||event.target;
  btn.textContent='Enviando...';btn.disabled=true;btn.style.opacity='0.7';
  try{
    const r=await fetch(`${SUPA_URL}/rest/v1/gp_forecast`,{
      method:'POST',
      headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({semana_id:semId,bdr_id:bdrId,bdr_nome:bdrNome,fcst_lc:lc,fcst_ra:ra,fcst_op:op})
    });
    if(!r.ok) throw new Error(await r.text());
    const bdr=DATA.bdrs.find(b=>b.id===bdrId);
    if(bdr) loadBDRForecast(bdr,semId);
  }catch(e){
    btn.textContent='Assumir meu forecast ↗';btn.disabled=false;
    alert('Erro ao enviar. Verifique sua conexão.');
  }
}

// ── Agenda/Eventos Weekly ──
function getWeeklyEvents(){
  return JSON.parse(localStorage.getItem('weekly_events')||'[]');
}
function saveWeeklyEvents(events){
  localStorage.setItem('weekly_events',JSON.stringify(events));
}
function addWeeklyEvent(){
  var dateEl=document.getElementById('weekly-event-date');
  var textEl=document.getElementById('weekly-event-text');
  if(!textEl||!textEl.value.trim()){alert('Descreva o evento.');return;}
  var events=getWeeklyEvents();
  var dateStr=dateEl&&dateEl.value?dateEl.value:'';
  var formatted='';
  if(dateStr){
    var parts=dateStr.split('-');
    formatted=parts[2]+'/'+parts[1];
  }
  events.push({id:Date.now(),date:dateStr,dateFormatted:formatted,text:textEl.value.trim()});
  events.sort(function(a,b){return(a.date||'9999')>(b.date||'9999')?1:-1;});
  saveWeeklyEvents(events);
  textEl.value='';
  if(dateEl) dateEl.value='';
  renderWeeklyEvents();
}
function removeWeeklyEvent(id){
  var events=getWeeklyEvents().filter(function(e){return e.id!==id;});
  saveWeeklyEvents(events);
  renderWeeklyEvents();
}
function renderWeeklyEvents(){
  var el=document.getElementById('weekly-events-list');
  if(!el) return;
  var events=getWeeklyEvents();
  if(events.length===0){el.innerHTML='<div style="font-size:11px;color:var(--text3);text-align:center;padding:8px">Nenhum evento adicionado.</div>';return;}
  el.innerHTML=events.map(function(e){
    var isPast=e.date&&new Date(e.date)<new Date(new Date().toDateString());
    return '<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;margin-bottom:4px;background:'+(isPast?'var(--bg3)':'rgba(139,92,246,0.06)')+';border:1px solid '+(isPast?'var(--border)':'rgba(139,92,246,0.15)')+'">'
      +'<div style="flex-shrink:0;width:40px;text-align:center">'
      +(e.dateFormatted?'<div style="font-size:13px;font-weight:700;color:'+(isPast?'var(--text3)':'#8b5cf6')+';font-family:\'Inter\',sans-serif">'+e.dateFormatted+'</div>':'<div style="font-size:11px;color:var(--text3)">—</div>')
      +'</div>'
      +'<div style="flex:1;font-size:12px;font-weight:500;color:'+(isPast?'var(--text3)':'var(--text)')+';'+(isPast?'text-decoration:line-through':'')+'">'+e.text+'</div>'
      +'<button onclick="removeWeeklyEvent('+e.id+')" style="background:none;border:none;font-size:14px;cursor:pointer;color:var(--text3);padding:2px 4px" title="Remover">✕</button>'
      +'</div>';
  }).join('');
}

// ─── MINHA PERFORMANCE (BDR) ─────────────────────────────────
function buildPerformanceBDR(pane, bdr){
  var h=DATA.hist3m;
  var b=h&&h.bdrs&&h.bdrs[bdr.id];
  if(!b){
    pane.innerHTML='<div style="padding:20px;text-align:center;color:#8892a0;font-family:\'Inter\',sans-serif;font-size:13px">Dados históricos não disponíveis.</div>';
    return;
  }
  var bench=DATA.benchmarks||{aiLc:57,lcRa:37,raOp:75,ligDia:10,noshow:1.5};
  var meta=h.meta||12;
  var meses=h.meses||['Fev','Mar','Abr'];
  var months=[b.m1,b.m2,b.m3];

  // Base calcs
  var pcts=months.map(function(m){return meta>0?Math.round((m.opps/meta)*100):0;});
  var avg=Math.round(pcts.reduce(function(s,p){return s+p;},0)/pcts.length);
  var best=Math.max.apply(null,pcts); var bestIdx=pcts.indexOf(best);
  var worst=Math.min.apply(null,pcts); var worstIdx=pcts.indexOf(worst);
  var trend=pcts[2]>pcts[0]?'subindo':pcts[2]<pcts[0]?'caindo':'estável';
  var trendIcon=trend==='subindo'?'↑':trend==='caindo'?'↓':'→';
  var trendCol=trend==='subindo'?'var(--green)':trend==='caindo'?'var(--red)':'var(--amber)';
  var variance=Math.sqrt(months.map(function(m,i){return Math.pow(pcts[i]-avg,2);}).reduce(function(s,v){return s+v;},0)/months.length);
  var consistency=variance<=10?'Consistente':variance<=25?'Moderado':'Instável';
  var consistencyCol=variance<=10?'var(--green)':variance<=25?'var(--amber)':'var(--red)';

  // Profile
  var profile,profileCol,profileDesc;
  if(avg>=90&&variance<=15){profile='Alta Performance Consistente';profileCol='var(--green)';profileDesc='Entrega acima da meta com regularidade. Referência para o time.';}
  else if(avg>=70&&variance>20){profile='Inconsistente com Picos';profileCol='var(--amber)';profileDesc='Tem capacidade mas não sustenta o ritmo. Foco em processos.';}
  else if(avg>=70){profile='Bom com Margem de Crescimento';profileCol='var(--accent)';profileDesc='Entrega sólida. Pequenos ajustes trazem grandes ganhos.';}
  else if(variance<=15){profile='Consistente Abaixo da Meta';profileCol='var(--red)';profileDesc='Regularidade negativa. Revisão estrutural necessária.';}
  else{profile='Em Desenvolvimento';profileCol='var(--amber)';profileDesc='Alta variação e resultado abaixo. Foco em fundamentos.';}

  // Indicators
  var indicators=[
    {label:'AI→LC',bench:bench.aiLc,vals:months.map(function(m){return m.aiLc;}),unit:'%',lower:false},
    {label:'LC→RA',bench:bench.lcRa,vals:months.map(function(m){return m.lcRa;}),unit:'%',lower:false},
    {label:'RA→OP',bench:bench.raOp,vals:months.map(function(m){return m.raOp;}),unit:'%',lower:false},
    {label:'Lig/sem',bench:40,vals:months.map(function(m){return m.lig;}),unit:'',lower:false},
    {label:'No-show',bench:bench.noshow,vals:months.map(function(m){return m.noshow;}),unit:'',lower:true},
  ];
  var gaps=indicators.filter(function(i){return !i.lower;}).map(function(ind){
    var a=Math.round(ind.vals.reduce(function(s,v){return s+v;},0)/ind.vals.length);
    return {label:ind.label,avgVal:a,bench:ind.bench,gap:a-ind.bench,unit:ind.unit};
  }).sort(function(a,b){return a.gap-b.gap;});
  var mainGap=gaps[0];

  var pdcaMap={
    'AI→LC':['Revisar pitch de abertura — primeiros 30s decisivos','Aumentar tentativas por lead (mínimo 6 touchpoints)','Escutar calls de alto AI→LC do time no MeetRox'],
    'LC→RA':['Trabalhar objeções de agendamento com role play','Criar urgência clara na conexão','Alinhar proposta de valor antes da ligação'],
    'RA→OP':['Briefing do lead antes de cada reunião','Alinhar com AE critérios de qualificação','Revisar ICP da lista de prospecção'],
    'Lig/sem':['Bloquear 2h diárias para ligações no calendário','Reduzir atividades passivas','Meta: '+bench.ligDia+' ligações conectadas por dia'],
  };
  var baseActions=pdcaMap[mainGap.label]||['Revisar processo de prospecção','Aumentar volume de atividades','Alinhar com gestor'];

  var goodMonths=months.filter(function(m){return meta>0&&(m.opps/meta)>=0.8;});
  var badMonths=months.filter(function(m){return meta>0&&(m.opps/meta)<0.6;});
  var goodPatt=goodMonths.length>0?'Nos meses bons: média de '+Math.round(goodMonths.reduce(function(s,m){return s+m.lig;},0)/goodMonths.length)+' ligações e '+Math.round(goodMonths.reduce(function(s,m){return s+m.aiLc;},0)/goodMonths.length)+'% AI→LC':'Sem meses acima de 80% no período';
  var badPatt=badMonths.length>0?'Nos meses ruins: queda em ligações e AI→LC — padrão de volume baixo':'Sem meses críticos no período';

  var actionsKey='perf-actions-'+bdr.id;

  // ── Stacked bar chart — estilo Salesforce/Gupy ──
  function buildBarChart(){
    var W=300, H=130, pL=8, pR=8, pT=22, pB=30;
    var pw=W-pL-pR, ph=H-pT-pB, n=meses.length;
    var gw=pw/n;
    var bw=Math.min(gw*0.55, 32);
    var maxV=110; // % scale

    function by(v){ return pT+ph - Math.max(0,(v/maxV))*ph; }

    // baseline
    var base='<line x1="'+pL+'" y1="'+(pT+ph)+'" x2="'+(W-pR)+'" y2="'+(pT+ph)+'" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>';

    var bars=meses.map(function(m,i){
      var cx = pL + (i+0.5)*gw;
      var bx = (cx - bw/2).toFixed(1);
      var rp = pcts[i];        // realizado %
      var mp = 100;            // meta = 100%
      var gap_pct = Math.max(0, mp - rp); // gap (não atingido)

      // stacked: bottom = realizado (azul escuro), top = gap (salmão)
      // If rp >= 100, only blue bar
      var realH = (ph * (Math.min(rp,100)/maxV)).toFixed(1);
      var realY = by(Math.min(rp,100)).toFixed(1);

      var gapH  = (ph * (gap_pct/maxV)).toFixed(1);
      var gapY  = (parseFloat(realY) - parseFloat(gapH)).toFixed(1);

      var totalH = (parseFloat(realH) + parseFloat(gapH)).toFixed(1);
      var topY   = parseFloat(gapH)>0 ? gapY : realY;

      // label at top
      var labelY = (parseFloat(topY) - 5).toFixed(1);
      var labelTxt = rp+'%';
      var labelCol = rp>=100?'rgba(34,197,94,0.9)':rp>=70?'rgba(245,158,11,0.9)':'rgba(239,68,68,0.9)';

      // month label
      var mY = (pT+ph+14).toFixed(1);

      return (gap_pct>0
        ? '<rect x="'+bx+'" y="'+gapY+'" width="'+bw+'" height="'+gapH+'" rx="3 3 0 0" fill="rgba(239,99,78,0.75)"/>'
        : '')
        +'<rect x="'+bx+'" y="'+realY+'" width="'+bw+'" height="'+realH+'" rx="'+(gap_pct>0?'0':'3 3 0 0')+'" fill="rgba(45,100,160,0.82)"/>'
        +'<text x="'+cx.toFixed(1)+'" y="'+labelY+'" text-anchor="middle" font-size="6" font-weight="700" font-family="Inter,sans-serif" fill="'+labelCol+'">'+labelTxt+'</text>'
        +'<text x="'+cx.toFixed(1)+'" y="'+mY+'" text-anchor="middle" font-size="6" font-family="Inter,sans-serif" fill="rgba(156,163,175,0.75)">'+m+'</text>';
    }).join('');

    // legend
    var legY = H-4;
    var leg = '<rect x="'+pL+'" y="'+(legY-7)+'" width="8" height="8" rx="1" fill="rgba(239,99,78,0.75)"/>'

async function loadDataFromSupabase(){
  // Busca a semana mais recente COM dados (não zerada)
  const allSemanas=await supaFetch('gp_semanas','order=id.desc');
  if(!allSemanas||allSemanas.length===0) throw new Error('Sem dados');
  // Prioriza semana com dados reais; se todas zeradas, usa a mais recente
  const sem=allSemanas.find(s=>s.oportunidades>0||s.abordagem_iniciada>0)||allSemanas[0];
  const bdrsDB=await supaFetch('gp_bdr_resultados',`semana_id=eq.${sem.id}&order=opps.desc`);
  const meetroxDB=await supaFetch('gp_meetrox',`semana_id=eq.${sem.id}`);

  // Atualiza DATA com valores do Supabase (mantém fotos/cores estáticas)
  DATA.meta=sem.meta; DATA.metaBDR=sem.meta_bdr;
  // semAtual vem de calcSemAtual(), não do Supabase — para não regredir
  DATA.semTotal=sem.sem_total;
  DATA.semana=sem.semana||''; DATA.periodo=sem.periodo||''; DATA.mes=sem.mes||'';
  // Funil: só sobrescreve se Supabase tem dados
  if(sem.abordagem_iniciada>0||sem.oportunidades>0){
    DATA.funil={
      novoLead:sem.novo_lead, abordagemIniciada:sem.abordagem_iniciada,
      leadConectado:sem.lead_conectado, reuniaoAgendada:sem.reuniao_agendada,
      oportunidades:sem.oportunidades, desqualificados:sem.desqualificados,
    };
    DATA.conversoes={
      aiLc:{real:sem.conv_ai_lc,meta:sem.conv_ai_lc_meta},
      lcRa:{real:sem.conv_lc_ra,meta:sem.conv_lc_ra_meta},
      raOp:{real:sem.conv_ra_op,meta:sem.conv_ra_op_meta},
    };
  }
  if(bdrsDB&&bdrsDB.length>0) bdrsDB.forEach(row=>{
    const b=DATA.bdrs.find(b=>b.id===row.bdr_id);
    if(!b) return;
    b.opps=row.opps; b.ras=row.ras; b.lig=row.ligacoes;
    b.ativ=row.atividades; b.desq=row.desqualificados;
  });
  meetroxDB.forEach(row=>{
    const b=DATA.bdrs.find(b=>b.id===row.bdr_id);
    if(!b) return;
    b.meetrox={nota:parseFloat(row.nota_semana)||0,conversas:row.conversas_semana||0,
      notaMes:parseFloat(row.nota_mes)||0,conversasMes:row.conversas_mes||0,gap:row.gap||''};
  });
  DATA.raPendentes={};
  bdrsDB.forEach(row=>{ DATA.raPendentes[row.bdr_id]=row.ra_pendentes||0; });
  var supaTs=sem.created_at||'';
  if(!DATA.ultimaAtualizacao||supaTs>DATA.ultimaAtualizacao) DATA.ultimaAtualizacao=supaTs||new Date().toISOString();
  console.log('✓ Supabase — semana:',sem.semana);
}

// Convert VAPID key
function urlBase64ToUint8Array(base64String){
  const padding='='.repeat((4-base64String.length%4)%4);
  const base64=(base64String+padding).replace(/-/g,'+').replace(/_/g,'/');
  const rawData=window.atob(base64);
  return Uint8Array.from([...rawData].map(c=>c.charCodeAt(0)));
}

// Request push permission and subscribe
async function requestPushPermission(){
  if(!('Notification' in window)||!('serviceWorker' in navigator)){return null;}
  const permission=await Notification.requestPermission();
  if(permission!=='granted') return null;
  try{
    const reg=await navigator.serviceWorker.ready;
    const existing=await reg.pushManager.getSubscription();
    if(existing) return existing;
    const sub=await reg.pushManager.subscribe({
      userVisibleOnly:true,
      applicationServerKey:urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
    });
    // Save subscription to Supabase
    if(currentUser){
      await fetch(`${SUPA_URL}/rest/v1/gp_push_subs`,{
        method:'POST',
        headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},
        body:JSON.stringify({user_id:currentUser.id,user_name:currentUser.name,subscription:JSON.stringify(sub),updated_at:new Date().toISOString()})
      }).catch(()=>{});
    }
    return sub;
  }catch(e){console.warn('Push subscribe error:',e);return null;}
}

// Check and trigger local alerts on app open
function checkDailyAlerts(){
  if(!currentUser||currentUser.isGestor) return;
  const bdr=DATA.bdrs.find(b=>b.id===currentUser.id);
  if(!bdr) return;

  const now=new Date();
  const dow=now.getDay(); // 0=Dom,1=Seg,...,5=Sex,6=Sab
  const hour=now.getHours();
  const todayStr=`${String(now.getDate()).padStart(2,'0')}/${String(now.getMonth()+1).padStart(2,'0')}`;
  const lastAlertKey=`gpulse-alert-${currentUser.id}-${now.toDateString()}`;

  // Only show once per day
  if(localStorage.getItem(lastAlertKey)) return;
  localStorage.setItem(lastAlertKey,'1');

  // 1. Monday 8-10h: forecast reminder
  if(dow===1&&hour>=8&&hour<=10){
    // Check if forecast already submitted
    supaFetch('gp_semanas','order=id.desc&limit=1').then(sems=>{
      if(!sems||!sems[0]) return;
      return supaFetch('gp_forecast',`semana_id=eq.${sems[0].id}&bdr_id=eq.${bdr.id}`);
    }).then(fcsts=>{
      if(!fcsts||fcsts.length===0){
        showLocalNotification(
          '📊 Forecast da semana',
          `${bdr.name.split(' ')[0]}, você ainda não enviou seu forecast desta semana. Acesse o Gupy Pulse!`
        );
      }
    }).catch(()=>{});
  }

  // 2. Reunião hoje
  const reunioesHoje=DATA.reunioes.futuras.filter(d=>{
    const [dia,mes]=d.date.split('/');
    return d.date===todayStr&&(
      d.ta.some(r=>r.bdr===bdr.name)||
      d.tm.some(r=>r.bdr===bdr.name)
    );
  });
  if(reunioesHoje.length>0&&hour>=7&&hour<=9){
    const count=reunioesHoje.reduce((s,d)=>s+d.ta.filter(r=>r.bdr===bdr.name).length+d.tm.filter(r=>r.bdr===bdr.name).length,0);
    showLocalNotification(
      '📅 Reunião hoje!',
      `Você tem ${count} reunião(ões) agendada(s) para hoje. Prepare-se!`
    );
  }

  // 3. Reuniões atrasadas
  const atrasadasMeu=[...DATA.reunioes.atrasadasTA,...DATA.reunioes.atrasadasTM].filter(a=>a.id===bdr.id);
  if(atrasadasMeu.length>0&&hour>=8&&hour<=11){
    showLocalNotification(
      `🚨 ${atrasadasMeu.length} reunião(ões) atrasada(s)`,
      `Você tem reuniões vencidas que precisam ser reagendadas. Acesse Meu Resultado.`
    );
  }

  // 4. Friday 17h: weekly summary
  if(dow===5&&hour>=16&&hour<=18){
    const pct=DATA.metaBDR>0?Math.round((bdr.opps/DATA.metaBDR)*100):0;
    showLocalNotification(
      '📊 Resumo da semana',
      `Você fechou a semana em ${pct}% da meta do mês (${bdr.opps}/${DATA.metaBDR} opps). Confira seu painel.`
    );
  }
}

        ['📈','Sexta à tarde','Resumo da semana com seu resultado'],
      ].map(([icon,title,desc])=>`
        <div style="display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)">
          <span style="font-size:14px;flex-shrink:0">${icon}</span>
          <div>
            <div style="font-size:12px;font-weight:600;color:var(--text);font-family:'Inter',sans-serif">${title}</div>
            <div style="font-size:11px;color:var(--text3);font-family:'Inter',sans-serif">${desc}</div>
          </div>
        </div>`).join('')}
    </div>`;
}



// ═══════════════════════════════════════════════════
// SETTINGS PANEL
// ═══════════════════════════════════════════════════

function openSettings(){
  const overlay=document.getElementById('settings-overlay');
  const panel=document.getElementById('settings-panel');
  if(!overlay||!panel) return;
  buildSettingsContent();
  overlay.style.display='block';
  panel.style.display='block';
  requestAnimationFrame(()=>{ panel.style.transform='translateX(0)'; });
}

function closeSettings(){
  const overlay=document.getElementById('settings-overlay');
  const panel=document.getElementById('settings-panel');
  if(!panel) return;
  panel.style.transform='translateX(100%)';
  setTimeout(()=>{
    panel.style.display='none';
    overlay.style.display='none';
  },300);
}

function buildSettingsContent(){
  if(!currentUser) return;
  const c=document.getElementById('settings-content');
  const sub=document.getElementById('settings-subtitle');
  if(sub) sub.textContent=currentUser.name.split(' ')[0]+' · '+(currentUser.isGestor?'Líder':'BDR');

  // Load saved prefs
  const prefsKey='gpulse-prefs-'+currentUser.id;
  let prefs={};
  try{ prefs=JSON.parse(localStorage.getItem(prefsKey)||'{}'); }catch(e){}

  const notifStatus=('Notification' in window)?Notification.permission:'unsupported';
  const notifLabel=notifStatus==='granted'?'Ativadas ✓':notifStatus==='denied'?'Bloqueadas':notifStatus==='unsupported'?'Não suportado':'Não configurado';
  const notifColor=notifStatus==='granted'?'var(--green)':notifStatus==='denied'?'var(--red)':'var(--amber)';

  c.innerHTML=`
    <!-- Perfil -->
    <div style="margin-bottom:24px">
      <div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;font-family:'Inter',sans-serif">Perfil</div>

      <div style="margin-bottom:14px">
        <label style="font-size:12px;font-weight:600;color:var(--text);font-family:'Inter',sans-serif;display:block;margin-bottom:6px">Nome no app</label>
        <input id="pref-nome" type="text" placeholder="${currentUser.name.split(' ')[0]}" value="${prefs.nomeApp||''}"
          style="width:100%;padding:10px 12px;border:1.5px solid var(--border2);border-radius:var(--radius-sm);font-size:14px;font-family:'Inter',sans-serif;color:var(--text);background:var(--bg);outline:none;box-sizing:border-box"
          onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border2)'">
        <div style="font-size:10px;color:var(--text3);margin-top:4px;font-family:'Inter',sans-serif">Como você quer ser chamado no app</div>
      </div>

      <div style="margin-bottom:14px">
        <label style="font-size:12px;font-weight:600;color:var(--text);font-family:'Inter',sans-serif;display:block;margin-bottom:6px">Tempo de Gupy</label>
        <select id="pref-tempo" style="width:100%;padding:10px 12px;border:1.5px solid var(--border2);border-radius:var(--radius-sm);font-size:14px;font-family:'Inter',sans-serif;color:var(--text);background:var(--bg);outline:none;appearance:none;box-sizing:border-box"
          onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border2)'">
          <option value="">Selecione...</option>
          ${['Menos de 3 meses','3 a 6 meses','6 meses a 1 ano','1 a 2 anos','Mais de 2 anos'].map(o=>`<option value="${o}" ${prefs.tempoGupy===o?'selected':''}>${o}</option>`).join('')}
        </select>
      </div>

      <div style="margin-bottom:14px">
        <label style="font-size:12px;font-weight:600;color:var(--text);font-family:'Inter',sans-serif;display:block;margin-bottom:6px">Nível de senioridade</label>
        <select id="pref-nivel" style="width:100%;padding:10px 12px;border:1.5px solid var(--border2);border-radius:var(--radius-sm);font-size:14px;font-family:'Inter',sans-serif;color:var(--text);background:var(--bg);outline:none;appearance:none;box-sizing:border-box"
          onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border2)'">
          <option value="">Selecione...</option>
          ${['Júnior','Pleno','Sênior','Especialista'].map(o=>`<option value="${o}" ${prefs.nivel===o?'selected':''}>${o}</option>`).join('')}
        </select>
      </div>
    </div>

    <!-- Notificações -->
    <div style="margin-bottom:24px">
      <div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;font-family:'Inter',sans-serif">Notificações</div>

      <div style="background:var(--bg3);border-radius:var(--radius-sm);padding:14px;margin-bottom:12px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <div>
            <div style="font-size:13px;font-weight:600;color:var(--text);font-family:'Inter',sans-serif">Push notifications</div>
            <div style="font-size:11px;color:${notifColor};margin-top:2px;font-family:'Inter',sans-serif">${notifLabel}</div>
          </div>
          ${notifStatus==='granted'?
            '<span style="font-size:22px">🔔</span>':
            notifStatus==='denied'?
            '<span style="font-size:22px">🔕</span>':
            notifStatus==='unsupported'?'':
            `<button onclick="requestPushPermission().then(()=>buildSettingsContent())"
              style="padding:8px 14px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif">
              Ativar
            </button>`
          }
        </div>
        ${notifStatus==='denied'?`<div style="font-size:11px;color:var(--text3);font-family:'Inter',sans-serif;line-height:1.5">Para ativar, vá em Configurações do browser → Notificações → Permitir para este site.</div>`:''}
      </div>

      <div style="display:flex;flex-direction:column;gap:8px">
        ${[
          ['📊','Segunda de manhã','Forecast da semana não enviado'],
          ['📅','Dia de reunião','Lembrete das reuniões do dia (8h)'],
          ['🚨','Reunião atrasada','Alerta de reagendamento urgente'],
          ['📈','Sexta à tarde','Resumo da semana com seu resultado'],
        ].map(([icon,title,desc])=>`
          <div style="display:flex;gap:10px;padding:10px;background:var(--bg3);border-radius:var(--radius-sm)">
            <span style="font-size:16px;flex-shrink:0">${icon}</span>
            <div>
              <div style="font-size:12px;font-weight:600;color:var(--text);font-family:'Inter',sans-serif">${title}</div>
              <div style="font-size:11px;color:var(--text3);font-family:'Inter',sans-serif;margin-top:1px">${desc}</div>
            </div>
          </div>`).join('')}
      </div>
    </div>

    <!-- Salvar -->
    <button onclick="saveSettings()" style="width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;margin-bottom:12px">
      Salvar preferências
    </button>
    <button onclick="doLogout()" style="width:100%;padding:12px;background:transparent;color:var(--red);border:1.5px solid rgba(220,38,38,0.3);border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif">
      Sair da conta ↩
    </button>
  `;
}

function saveSettings(){
  if(!currentUser) return;
  const prefsKey='gpulse-prefs-'+currentUser.id;
  const prefs={
    nomeApp: document.getElementById('pref-nome')?.value?.trim()||'',
    tempoGupy: document.getElementById('pref-tempo')?.value||'',
    nivel: document.getElementById('pref-nivel')?.value||'',
  };
  localStorage.setItem(prefsKey, JSON.stringify(prefs));

  // Update displayed name if set
  if(prefs.nomeApp){
    const nameEl=document.getElementById('app-name');
    if(nameEl) nameEl.textContent=prefs.nomeApp;
  }
  // Refresh role line with new nivel
  if(currentUser&&!currentUser.isGestor){
    const roleEl=document.getElementById('app-role');
    if(roleEl){
      const nivel=prefs.nivel||'';
      roleEl.textContent='BDR · Pre Vendas'+(nivel?' · '+nivel:'');
    }
  }

  // Visual feedback
  const btn=document.querySelector('#settings-content button');
  if(btn){
    const orig=btn.textContent;
    btn.textContent='✓ Salvo!';
    btn.style.background='var(--green)';
    setTimeout(()=>{ btn.textContent=orig; btn.style.background='var(--accent)'; },2000);
  }
}

// Apply saved prefs on login
function applyUserPrefs(userId){
  try{
    const prefs=JSON.parse(localStorage.getItem('gpulse-prefs-'+userId)||'{}');
    if(prefs.nomeApp){
      const nameEl=document.getElementById('app-name');
      if(nameEl) nameEl.textContent=prefs.nomeApp;
    }
  }catch(e){}
}


if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
