            <div id="log-subtitle" style="font-size:11px;color:var(--text3);margin-top:2px"></div>
          </div>
          <a id="log-open-tab" href="#" target="_blank" rel="noopener" style="display:none;font-size:11px;font-weight:700;color:var(--accent);background:var(--accent-light);border:1px solid var(--accent-mid);border-radius:8px;padding:6px 10px;text-decoration:none;white-space:nowrap">Abrir em aba ↗</a>
        </div>
        <div id="log-frame-wrap" style="flex:1;position:relative;background:#fff">
          <iframe id="log-frame" src="about:blank" style="position:absolute;inset:0;width:100%;height:100%;border:0;background:#fff"></iframe>
          <div id="log-empty" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:var(--text3);font-size:13px;text-align:center;padding:24px">
            <div style="font-size:32px;opacity:.4">☰</div>
            <div>Selecione um tema na lateral</div>
            <div style="font-size:11px;opacity:.7">Clique no ícone ao lado para expandir a lista de temas</div>
          </div>
        </div>
      </main>
    </div>
  `;

  const side=pane.querySelector('#log-side');
  const list=pane.querySelector('#log-list');
  const toggle=pane.querySelector('#log-toggle');
  const toggleIcon=pane.querySelector('#log-toggle-icon');
  const labels=pane.querySelectorAll('.log-side-label');
  const titleEl=pane.querySelector('#log-title');
  const subEl=pane.querySelector('#log-subtitle');
  const frame=pane.querySelector('#log-frame');
  const empty=pane.querySelector('#log-empty');
  const openTab=pane.querySelector('#log-open-tab');

  function setOpen(open){
    side.dataset.open=open?'1':'0';
    side.style.width=open?'240px':'48px';
    toggleIcon.textContent=open?'×':'☰';
    toggle.setAttribute('aria-label',open?'Recolher log':'Expandir log');
    labels.forEach(function(l){ l.style.opacity=open?'1':'0'; });
    list.querySelectorAll('[data-tema-label]').forEach(function(l){ l.style.opacity=open?'1':'0'; });
  }
  toggle.onclick=function(){ setOpen(side.dataset.open!=='1'); track('log_toggle',side.dataset.open); };

  function renderList(activeId){
    list.innerHTML=LOG_TEMAS.map(function(t){
      var active=t.id===activeId;
      return '<button data-tema="'+t.id+'" style="all:unset;cursor:pointer;display:flex;align-items:center;gap:10px;width:100%;padding:11px 14px;border-left:3px solid '+(active?'var(--accent)':'transparent')+';background:'+(active?'var(--accent-light)':'transparent')+';color:'+(active?'var(--accent)':'var(--text2)')+';font-size:12px;font-weight:'+(active?'700':'600')+';box-sizing:border-box">'
        +'<span style="font-size:14px;line-height:1;flex-shrink:0">📄</span>'
        +'<span data-tema-label style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:'+(side.dataset.open==='1'?'1':'0')+';transition:opacity .15s">'+t.nome+'</span>'
        +'</button>';
    }).join('');
    list.querySelectorAll('[data-tema]').forEach(function(btn){
      btn.onclick=function(){ openTema(btn.dataset.tema); };
    });
  }

  function openTema(id){
    var t=LOG_TEMAS.find(function(x){return x.id===id;});
    if(!t) return;
    titleEl.textContent=t.nome;
    subEl.textContent=(t.desc||'')+(t.data?' · '+t.data:'');
    frame.src=t.src;
    empty.style.display='none';
    openTab.href=t.src;
    openTab.style.display='inline-block';
    renderList(id);
    track('log_open',id);
  }

  renderList(null);
  // Não abre nenhum tema automaticamente — sidebar fica minimizada e área principal mostra estado vazio.
}



// ─── RESULTADO GESTOR ─────────────────────────────────────────
function buildResultadoGestor(pane){
  var d=DATA;
  var mes=d.mesAbril;
  var metaMes=d.meta;
  var semAtual=d.semAtual;
  var semTotal=d.semTotal;

  // Acumulado do mês · pacing padronizado por dias úteis
  var oppsAcum=mes.opps;
  var rasAcum=mes.ras;
  var ligAcum=mes.lig;
  var pcMes=computePacing(oppsAcum,metaMes);
  var pctMes=pcMes.pctAtingimento;
  var proj=pcMes.diasUteisPassados>0?Math.round((oppsAcum/pcMes.diasUteisPassados)*pcMes.diasUteisTotais):0;
  var gapProj=proj-metaMes;
  var paceEsp=Math.round(pcMes.paceEsperado);

  // Pacing color (padrão do app: verde/amber/vermelho pelo state)
  var pacingCol=pcMes.cor;

  // Forecast analysis
  function buildForecastAnalysis(){
    var totalFcstEl=document.getElementById('fcst-resultado-total');
    if(!totalFcstEl) return;
    supaFetch('gp_semanas','order=id.asc').then(function(sems){
      if(!sems||!sems.length) return;
      var curSem=sems.find(function(s){return s.sem_atual===DATA.semAtual;});
      var semId=curSem?curSem.id:sems[sems.length-1].id;
      return supaFetch('gp_forecast','semana_id=eq.'+semId);
    }).then(function(forecasts){
      if(!forecasts) return;
      var totalFcstOp=forecasts.reduce(function(s,f){return s+(f.fcst_op||0);},0);
      var totalFcstRa=forecasts.reduce(function(s,f){return s+(f.fcst_ra||0);},0);
      var semRestantes=semTotal-semAtual;
      var opsNecessarias=Math.max(0,metaMes-oppsAcum);
      var paceMtd=Math.round(pcMes.paceEsperado);
      var gapPace=oppsAcum-paceMtd;
      var opsNeedWeek=semRestantes>0?Math.ceil(opsNecessarias/semRestantes):opsNecessarias;
      var rasNeedWeek=Math.ceil(opsNeedWeek/0.3); // ~30% RA→OP
      var fcstSuficiente=totalFcstOp>=opsNeedWeek;
      var gap=totalFcstOp-opsNeedWeek;
      var icone=fcstSuficiente?'✅':'⚠️';
      var paceMsg=gapPace>=0
        ?'No pace ('+oppsAcum+'/'+paceMtd+' MTD). Precisa de <strong>'+opsNeedWeek+' opps/semana</strong> para manter.'
        :'Abaixo do pace (<strong>'+oppsAcum+'/'+paceMtd+' MTD</strong>). Precisa de <strong>'+opsNeedWeek+' opps</strong> ou <strong>'+rasNeedWeek+' RAs</strong> no forecast semanal para voltar ao pace (meta: '+metaMes+').';

      // Find BDRs with low forecast
      var lowFcstBdrs=[];
      DATA.bdrs.forEach(function(bdr){
        var f=forecasts.find(function(x){return x.bdr_id===bdr.id;});
        var needPerBdr=Math.max(0,Math.ceil(opsNeedWeek/DATA.bdrs.length));
        if(!f||(f.fcst_op||0)<needPerBdr){
          lowFcstBdrs.push(bdr.name.split(' ')[0]+(f?(' (fcst '+f.fcst_op+')'):'(sem forecast)'));
        }
      });

      totalFcstEl.innerHTML='<div style="border-radius:var(--radius-sm);padding:12px 14px;background:'+(fcstSuficiente?'var(--green-bg)':'var(--red-bg)')+';border:1px solid '+(fcstSuficiente?'rgba(34,197,94,0.2)':'rgba(248,113,113,0.15)')+';">'
        +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">'
        +'<div style="font-size:12px;font-weight:700;color:'+(fcstSuficiente?'var(--green)':'var(--red)')+'">'+icone+' Forecast semanal do time</div>'
        +'<div style="font-size:13px;font-weight:700;font-family:\'Inter\',sans-serif;color:'+(fcstSuficiente?'var(--green)':'var(--red)')+'">'+totalFcstOp+' opps · '+totalFcstRa+' RAs</div>'
        +'</div>'
        +'<div style="font-size:11px;color:var(--text);line-height:1.5;margin-bottom:'+(lowFcstBdrs.length>0?'8':'0')+'px">'+paceMsg+'</div>'
        +(lowFcstBdrs.length>0?'<div style="font-size:10px;color:'+(fcstSuficiente?'var(--green)':'var(--red)')+'">BDRs abaixo: '+lowFcstBdrs.join(', ')+'</div>':'')
        +'</div>';
    }).catch(function(){
      totalFcstEl.innerHTML='<div style="font-size:11px;color:var(--text3);padding:8px">Forecast indisponível offline.</div>';
    });
  }

  // Semanas breakdown — colunas lado a lado
  var semsHtml='<div style="display:grid;grid-template-columns:repeat('+mes.semanas.length+',1fr);gap:6px">';
  mes.semanas.forEach(function(s){
    var p=metaMes>0?Math.round((s.opps/(metaMes/semTotal))*100):0;
    var c=p>=100?'var(--green)':p>=60?'var(--amber)':'var(--red)';
    var isFuture=s.sem>semAtual;
    var isCurrent=s.sem===semAtual;
    semsHtml+='<div style="background:var(--bg2);border-radius:var(--radius-sm);padding:10px 8px;text-align:center;border:'+(isCurrent?'2px solid var(--accent)':'1px solid var(--border)');+'">'
      +'<div style="font-size:11px;font-weight:700;color:'+(isCurrent?'var(--accent)':'var(--text2)')+';margin-bottom:2px">'+s.label+'</div>'
      +'<div style="font-size:9px;color:var(--text3);margin-bottom:8px">'+s.datas+'</div>'
      +'<div style="font-size:22px;font-weight:700;font-family:\'Inter\',sans-serif;color:'+(isFuture?'var(--text3)':c)+';line-height:1">'+s.opps+'</div>'
      +'<div style="font-size:9px;color:var(--text3);margin-top:2px">opps</div>'
      +'<div id="sem-fcst-'+s.sem+'" style="margin-top:6px;font-size:10px;color:var(--accent)"></div>'
      +'</div>';
  });
  semsHtml+='</div>';

  pane.innerHTML='<div style="font-size:11px;color:var(--text3);margin-bottom:12px;font-family:\'Inter\',sans-serif">Abril 2026 · Semana '+semAtual+' de '+semTotal+'</div>'

    // ── Hero: resultado do mês ──
    +'<div style="background:linear-gradient(145deg,'+(gapProj>=0?'#166534 0%,#064e3b 40%,#0a0a0f':'#991b1b 0%,#581c1c 40%,#12121a')+' 100%);border-radius:var(--radius);padding:18px;margin-bottom:12px;box-shadow:var(--shadow-lg)">'
    +'<div style="font-size:10px;font-weight:700;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">Resultado do mês — Abril 2026</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">'
    +'<div style="text-align:center"><div onclick="showOppsModal()" style="cursor:pointer;font-size:32px;font-weight:700;font-family:\'Inter\',sans-serif;color:white;line-height:1;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:3px">'+oppsAcum+'</div><div style="font-size:10px;color:rgba(255,255,255,.6);margin-top:2px">Atual</div></div>'
    +'<div style="text-align:center;border-left:1px solid rgba(255,255,255,0.1);border-right:1px solid rgba(255,255,255,0.1)"><div style="font-size:32px;font-weight:700;font-family:\'Inter\',sans-serif;color:white;line-height:1">'+proj+'</div><div style="font-size:10px;color:rgba(255,255,255,.6);margin-top:2px">Projeção</div></div>'
    +'<div style="text-align:center"><div style="font-size:32px;font-weight:700;font-family:\'Inter\',sans-serif;color:'+(gapProj>=0?'#bbf7d0':'#fecaca')+';line-height:1">'+(gapProj>=0?'+':'')+gapProj+'</div><div style="font-size:10px;color:rgba(255,255,255,.6);margin-top:2px">Gap</div></div>'
    +'</div>'
    +'<div style="height:8px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden;margin-bottom:5px;position:relative">'
    +'<div style="position:absolute;left:0;top:0;height:100%;width:'+Math.round((paceEsp/metaMes)*100)+'%;background:rgba(255,255,255,0.15);border-radius:4px"></div>'
    +'<div style="position:absolute;left:0;top:0;height:100%;width:'+pctMes+'%;background:var(--bg3);border-radius:4px"></div>'
    +'</div>'
    +'<div style="display:flex;justify-content:space-between;font-size:10px;color:rgba(255,255,255,.6)">'
    +'<span>Atual: '+pctMes+'% · Pace esp.: '+Math.round((paceEsp/metaMes)*100)+'%</span>'
    +'<span>Proj: '+Math.round((proj/metaMes)*100)+'% de '+metaMes+'</span>'
    +'</div>'
    +'</div>'

    // ── Forecast analysis ──
    +'<div id="fcst-resultado-total" style="margin-bottom:12px"><div style="font-size:11px;color:var(--text3);padding:10px;text-align:center">Carregando análise de forecast...</div></div>'

    // ── Semanas do mês ──
    +'<div class="card" style="margin-bottom:12px">'
    +'<div class="collapsible-header" onclick="toggleCard(\'\1\',this)" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0">'
    +'<div class="card-title" style="margin-bottom:0">📅 Semanas de Abril</div>'
    +'<span class="collapse-icon" style="font-size:16px;color:var(--text3)">▾</span>'
    +'</div>'
    +'<div id="res-sems" style="margin-top:12px">'+semsHtml+'</div>'
    +'</div>'

    // ── WoW Funil Table ──
    +'<div class="card" style="margin-bottom:12px">'
    +'<div class="collapsible-header" onclick="toggleCard(\'res-wow-funil\',this)" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0">'
    +'<div class="card-title" style="margin-bottom:0">📊 Funil WoW — Time</div>'
    +'<span class="collapse-icon" style="font-size:16px;color:var(--text3)">▾</span>'
    +'</div>'
    +'<div id="res-wow-funil" style="font-size:11px;color:var(--text3);text-align:center;padding:8px;margin-top:10px">Carregando...</div>'
    +'</div>'

    // ── Funil do mês ──
    +'<div class="card" style="margin-bottom:12px">'
    +'<div class="collapsible-header" onclick="toggleCard(\'\1\',this)" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0">'
    +'<div class="card-title" style="margin-bottom:0">🔽 Funil da semana</div>'
    +'<span class="collapse-icon" style="font-size:16px;color:var(--text3)">▾</span>'
    +'</div>'
    +'<div id="res-funil" style="margin-top:12px">'
    +'<div class="funnel" id="res-funil-bars"></div>'
    +'</div>'
    +'</div>'

    // ── MeetRox geral (apenas média do time — detalhe individual está em "Time") ──
    +'<div class="card" style="margin-bottom:12px">'
    +'<div class="card-title">🎙 MeetRox — média do time (semana)</div>'
    +(function(){
      var notas=d.bdrs.filter(function(b){return b.meetrox&&b.meetrox.nota;}).map(function(b){return b.meetrox.nota;});
      var avg=notas.length?(notas.reduce(function(s,n){return s+n;},0)/notas.length):0;
      var totalConv=d.bdrs.reduce(function(s,b){return s+((b.meetrox&&b.meetrox.conversas)||0);},0);
      var col=avg>=8?'var(--green)':avg>=6?'var(--amber)':'var(--red)';
      return '<div style="display:flex;align-items:center;justify-content:space-around;padding:12px 0">'
        +'<div style="text-align:center"><div style="font-size:32px;font-weight:700;font-family:\'Inter\',sans-serif;color:'+col+';line-height:1">'+avg.toFixed(1)+'</div><div style="font-size:10px;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:.06em">Nota média</div></div>'
        +'<div style="text-align:center"><div style="font-size:32px;font-weight:700;font-family:\'Inter\',sans-serif;color:var(--text);line-height:1">'+totalConv+'</div><div style="font-size:10px;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:.06em">Conversas avaliadas</div></div>'
        +'<div style="text-align:center"><div style="font-size:32px;font-weight:700;font-family:\'Inter\',sans-serif;color:var(--text);line-height:1">'+notas.length+'/'+d.bdrs.length+'</div><div style="font-size:10px;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:.06em">BDRs avaliados</div></div>'
        +'</div>'
        +'<div style="font-size:11px;color:var(--text3);text-align:center;padding-top:10px;border-top:1px solid var(--border)">Detalhe individual por BDR → aba <strong style="color:var(--text2)">Time</strong></div>';
    })()
    +'</div>';

  // Build funnel
  buildFunnel('res-funil-bars',[
    {name:'Novo Lead',        val:d.funil.novoLead,          max:d.funil.novoLead||1, color:'#6366f1'},
    {name:'Abord. Iniciada',  val:d.funil.abordagemIniciada, max:d.funil.novoLead||1, color:'#6366f1'},
    {name:'Lead Conectado',   val:d.funil.leadConectado,     max:d.funil.novoLead||1, color:'#14b8a6'},
    {name:'Reunião Ag.',      val:d.funil.reuniaoAgendada,   max:d.funil.novoLead||1, color:'#f59e0b'},
    {name:'Oportunidades',    val:d.funil.oportunidades,     max:d.funil.novoLead||1, color:'#22c55e'},
    {name:'Desqualificados',  val:d.funil.desqualificados,   max:d.funil.desqualificados||1, color:'#4b5563'},
  ]);

  // Populate semanas forecast + WoW funil table
  (async function(){
    try{
      var allSems=await supaFetch('gp_semanas','order=id.asc');
      if(!allSems||allSems.length===0) return;
      // Forecast per semana
      for(var si=0;si<allSems.length;si++){
        var sem=allSems[si];
        var fcsts=await supaFetch('gp_forecast','semana_id=eq.'+sem.id);
        var totalFcst=fcsts?fcsts.reduce(function(s,f){return s+(f.fcst_op||0);},0):0;
        var el=document.getElementById('sem-fcst-'+sem.sem_atual);
        if(el&&totalFcst>0){
          el.innerHTML='<span style="font-size:9px;color:var(--text3)">fcst:</span> <strong>'+totalFcst+'</strong>';
        }
      }
      // WoW funil — visual por colunas (semanas)
      var wowEl=document.getElementById('res-wow-funil');
      if(!wowEl||allSems.length<1) return;
      var stages=['abordagem_iniciada','lead_conectado','reuniao_agendada','oportunidades','desqualificados'];
      var labels=['Abord. Iniciada','Lead Conectado','Reunião Ag.','Oportunidades','Desqualificados'];
      var colors=['#6366f1','#14b8a6','#f59e0b','#22c55e','#4b5563'];
      // Override com dados locais DATA.mesAbril.semanas (mais atualizados que Supabase para algumas semanas)
      var localSemMap={};
      ((DATA.mesAbril&&DATA.mesAbril.semanas)||[]).forEach(function(ls){
        localSemMap[ls.sem]={
          reuniao_agendada: ls.ras,
          oportunidades: ls.opps,
          abordagem_iniciada: ls.abordagemIniciada,
          lead_conectado: ls.leadConectado,
          desqualificados: ls.desqualificados
        };
      });
      function valFor(s,st){
        var local=localSemMap[s.sem_atual];
        if(local && local[st]!=null) return local[st];
        return s[st]||0;
      }
      // Find max value across all semanas for bar sizing
      var maxVal=1;
      allSems.forEach(function(s){stages.forEach(function(st){var v=valFor(s,st); if(v>maxVal) maxVal=v;});});
      var html='<div style="display:grid;grid-template-columns:repeat('+allSems.length+',1fr);gap:8px">';
      allSems.forEach(function(s,si){
        var isCurrent=s.sem_atual===DATA.semAtual;
        html+='<div style="border-radius:var(--radius-sm);padding:10px 8px;background:var(--bg2);border:'+(isCurrent?'2px solid var(--accent)':'1px solid var(--border)')+'">';
        html+='<div style="font-size:11px;font-weight:700;color:'+(isCurrent?'var(--accent)':'var(--text2)')+';text-align:center;margin-bottom:8px">S'+s.sem_atual+'</div>';
        stages.forEach(function(stage,idx){
          var val=valFor(s,stage);
          var pct=Math.round((val/maxVal)*100);
          var prevVal=si>0?valFor(allSems[si-1],stage):null;
          var arrow=prevVal!==null?(val>prevVal?' ▲':val<prevVal?' ▼':''):'';
          var arrowCol=prevVal!==null?(val>prevVal?'var(--green)':val<prevVal?'var(--red)':'var(--text3)'):'';
          html+='<div style="margin-bottom:6px">';
          html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px">';
          html+='<span style="font-size:9px;color:var(--text3)">'+labels[idx].split(' ')[0]+'</span>';
          html+='<span style="font-size:11px;font-weight:700;font-family:\'Inter\',sans-serif;color:var(--text)">'+val+'<span style="font-size:8px;color:'+arrowCol+'">'+arrow+'</span></span>';
          html+='</div>';
          html+='<div style="height:4px;background:var(--bg3);border-radius:2px;overflow:hidden">';
          html+='<div style="width:'+Math.max(pct,3)+'%;height:100%;background:'+colors[idx]+';border-radius:2px"></div>';
          html+='</div></div>';
        });
        html+='</div>';
      });
      html+='</div>';
      wowEl.innerHTML=html;
    }catch(e){console.warn('WoW funil:',e);}
  })();

  // ═══ Painel de Desqualificações com filtros (BDR/Motivo/Canal/Período) ═══
  (function(){
    if(!DATA.desqDetalhe||!DATA.desqDetalhe.length) return;
    var card=document.createElement('div');
    card.className='card';
    card.style.cssText='margin-top:12px;padding:14px';
    card.innerHTML='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'
      +'<div style="font-size:13px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px">🚫 Desqualificações · Análise</div>'
      +'<div style="font-size:10px;color:var(--text3)">filtre por BDR, motivo, canal ou período</div>'
      +'</div>'
      +'<div id="desq-panel-gestor"></div>';
    pane.appendChild(card);
    buildDesqPanel(document.getElementById('desq-panel-gestor'), {});
  })();

  // Load forecast analysis async
  buildForecastAnalysis();
}

// RESUMO = Nova Home — Diagnóstico Estratégico
// ─── HOME ACIONÁVEL (segunda-feira de manhã) ──────────────────
// PR1 · Mudança 1: substitui o Resumo por uma tela orientada a ações.
// A lógica original permanece em buildDiagnosticoSemana (renderizada no card colapsado abaixo).
function buildResumo(pane){
  const d=DATA;
  const now=new Date();
  const weekDays=['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
  const months=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  const dataFmt=weekDays[now.getDay()]+', '+now.getDate()+' de '+months[now.getMonth()]+' de '+now.getFullYear();
  const hora=now.getHours();
  const sauda=hora<12?'Bom dia':hora<18?'Boa tarde':'Boa noite';

  // Reuniões atrasadas
  const r=d.reunioes||{};
  const atTA=(r.atrasadasTA||[]).map(a=>Object.assign({},a,{tipo:'TA'}));
  const atTM=(r.atrasadasTM||[]).map(a=>Object.assign({},a,{tipo:'TM'}));
  const today=new Date(); today.setHours(0,0,0,0);
  function diasDesde(dmdd){
    if(!dmdd) return 0;
    const p=String(dmdd).split('/');
    if(p.length<2) return 0;
    const yr=today.getFullYear();
    const dt=new Date(yr,parseInt(p[1],10)-1,parseInt(p[0],10));
    if(dt>today) dt.setFullYear(yr-1);
    return Math.max(0,Math.floor((today-dt)/86400000));
  }
  const atAll=atTA.concat(atTM).map(a=>Object.assign({},a,{dias:diasDesde(a.data)}))
    .sort((a,b)=>b.dias-a.dias);
  const totalAt=atAll.length;
  const top5At=atAll.slice(0,5);

  // BDRs fora do pace — usa computePacing (dias úteis) · critério: <50% do pace esperado
  const foraPace=(d.bdrs||[]).map(b=>{
    const cur=b.oppsMes!=null?b.oppsMes:(b.opps||0);
    const bp=computePacing(cur,d.metaBDR);
    const ratio=bp.paceEsperado>0?(cur/bp.paceEsperado):1;
    return Object.assign({},b,{pacing:Math.round(ratio*100),paceRatio:ratio,paceInfo:bp});
  }).filter(b=>b.paceRatio<0.5).sort((a,b)=>a.paceRatio-b.paceRatio);

  // ── HERO: ATINGIMENTO DA OPERAÇÃO (espelha o hero do BDR, com números da operação) ──
  const teamOppsMes=d.mesAbril.opps;
  const teamRAsMes=d.mesAbril.ras;
  const teamLigMes=d.mesAbril.lig;
  const teamAtivMes=d.mesAbril.ativ;
  const META_OP=d.meta;
  const pcOp=computePacing(teamOppsMes,META_OP);
  const pctMetaOp=pcOp.pctAtingimento;
  const pctPaceIdealOp=pcOp.pctPaceIdeal;
  // Cor do hero pelo pace ratio (atingimento/paceIdeal):
  //   <50% pace = red · 51-80% = amber · 81%+ = green
  const paceRatioOp=pctPaceIdealOp>0?(pctMetaOp/pctPaceIdealOp)*100:100;
  const paceColorState=paceRatioOp>=81?'green':paceRatioOp>=51?'amber':'red';
  const paceGradOp=paceColorState==='green'?'linear-gradient(135deg,#16a34a 0%,#15803d 100%)'
    :paceColorState==='amber'?'linear-gradient(135deg,#d97706 0%,#b45309 100%)'
    :'linear-gradient(135deg,#dc2626 0%,#991b1b 100%)';
  const paceAccentOp=paceColorState==='green'?'#bbf7d0':paceColorState==='amber'?'#fde68a':'#fecaca';
  let gapBigOp,gapSubOp;
  if(pcOp.state==='above'){
    if(teamOppsMes>=META_OP) gapBigOp='+'+(teamOppsMes-META_OP)+' opps acima da meta';
    else gapBigOp='+'+Math.round(pcOp.gapPace)+' opps acima do pace';
    gapSubOp='Time acima do ritmo esperado.';
  } else if(pcOp.state==='ontrack'){
    gapBigOp='Time no pace 🎯';
    gapSubOp='Ritmo alinhado com a meta do mês.';
  } else {
    gapBigOp=`Faltam ${pcOp.gapMeta} opps para a meta`;
    gapSubOp=pcOp.diasUteisRestantes>0?`Restam ${pcOp.diasUteisRestantes} dias úteis no mês — pace ideal hoje: ${pcOp.paceEsperado}.`:'Fim do ciclo — precisamos fechar a meta.';
  }
  const fcstPendentesCount=foraPace.length; // updated async after fcst load

  pane.innerHTML=`
    <!-- HEADER DINÂMICO -->
    <div style="margin-bottom:16px">
      <div style="font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px">${dataFmt}</div>
      <div style="font-size:20px;font-weight:700;color:var(--text);letter-spacing:-.02em">${sauda}, líder.</div>
    </div>

    <!-- HERO: ATINGIMENTO DA OPERAÇÃO (espelha o hero do BDR) -->
    <div style="margin-bottom:12px;background:${paceGradOp};border-radius:var(--radius);padding:20px 18px;box-shadow:0 4px 20px rgba(0,0,0,0.12)">
      <div style="font-size:11px;font-weight:600;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">Atingimento da operação · Abril 2026</div>
      <div style="font-size:48px;font-weight:700;font-family:'Inter',sans-serif;color:${paceAccentOp};line-height:1.05;letter-spacing:-.02em;margin-bottom:6px">${gapBigOp}</div>
      <div style="font-size:20px;font-weight:600;font-family:'Inter',sans-serif;color:#fff;line-height:1.2;margin-bottom:12px">${teamOppsMes} de ${META_OP} opps · ${pctMetaOp}%</div>
      <div style="height:10px;background:rgba(0,0,0,0.28);border-radius:5px;overflow:hidden;position:relative;margin-bottom:5px">
        <div style="position:absolute;left:0;top:0;height:100%;width:${pctPaceIdealOp}%;background:rgba(255,255,255,0.22);border-radius:5px"></div>
        <div style="position:absolute;left:0;top:0;height:100%;width:${pctMetaOp}%;background:${paceAccentOp};border-radius:5px;transition:width .3s"></div>
      </div>
      <div style="font-size:10px;color:rgba(255,255,255,.7);margin-bottom:14px;letter-spacing:.02em">Pace ideal: ${pctPaceIdealOp}% · Atual: ${pctMetaOp}%</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px">
        <div style="background:rgba(0,0,0,0.2);border-radius:10px;padding:10px 6px;text-align:center">
          <div style="font-size:22px;font-weight:700;font-family:'Inter',sans-serif;color:#fff">${teamOppsMes}</div>
          <div style="font-size:9px;color:rgba(255,255,255,.65);margin-top:2px;text-transform:uppercase;letter-spacing:.04em">Opps</div>
        </div>
        <div style="background:rgba(0,0,0,0.2);border-radius:10px;padding:10px 6px;text-align:center">
          <div style="font-size:22px;font-weight:700;font-family:'Inter',sans-serif;color:#fff">${teamRAsMes}</div>
          <div style="font-size:9px;color:rgba(255,255,255,.65);margin-top:2px;text-transform:uppercase;letter-spacing:.04em">RAs</div>
        </div>
        <div style="background:rgba(0,0,0,0.2);border-radius:10px;padding:10px 6px;text-align:center">
          <div style="font-size:22px;font-weight:700;font-family:'Inter',sans-serif;color:#fff">${teamLigMes}</div>
          <div style="font-size:9px;color:rgba(255,255,255,.65);margin-top:2px;text-transform:uppercase;letter-spacing:.04em">Lig.</div>
        </div>
        <div style="background:rgba(0,0,0,0.2);border-radius:10px;padding:10px 6px;text-align:center">
          <div style="font-size:22px;font-weight:700;font-family:'Inter',sans-serif;color:#fff">${(teamAtivMes/1000).toFixed(1)}k</div>
          <div style="font-size:9px;color:rgba(255,255,255,.65);margin-top:2px;text-transform:uppercase;letter-spacing:.04em">Ativ.</div>
        </div>
      </div>
      <div style="margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.1);font-size:11px;color:rgba(255,255,255,.6)">
        ${(d.bdrs||[]).length} BDRs · ${totalAt} reuniões venceram · ${foraPace.length} fora do pace
      </div>
      <div style="font-size:10px;color:rgba(255,255,255,.55);margin-top:6px">${gapSubOp}</div>
    </div>

    <!-- DIAGNÓSTICO DA SEMANA (logo abaixo do hero, expandido) -->
    <div id="resumo-diag-body" style="margin-bottom:12px"></div>

    <!-- Weekly email CTA -->
    <div onclick="previewWeeklyEmail();track('home_weekly_preview')" style="cursor:pointer;width:100%;text-align:center;padding:13px 14px;background:var(--accent);color:#fff;border-radius:10px;font-size:13px;font-weight:700;box-shadow:var(--shadow-lg);transition:opacity .15s;margin-bottom:12px" onmouseenter="this.style.opacity='.9'" onmouseleave="this.style.opacity='1'">📧 Preparar weekly por email</div>
  `;

  // Populate diagnostic (expandido logo abaixo do hero)
  var diagBody=document.getElementById('resumo-diag-body');
  if(diagBody) buildDiagnosticoSemana(diagBody);

  // Forecast pendente loading (kept as no-op stub since Ações pendentes was removed)
  (async function(){
    var el=document.getElementById('home-fcst-pendente');
    if(!el) return;
    try{
      var sems=await supaFetch('gp_semanas','order=id.asc');
      var curSem=sems&&sems.length?sems.find(function(s){return s.sem_atual===DATA.semAtual;}):null;
      var semId=curSem?curSem.id:(sems&&sems.length?sems[sems.length-1].id:null);
      var fcsts=semId?await supaFetch('gp_forecast','semana_id=eq.'+semId):[];
      var hasFcst={};
      (fcsts||[]).forEach(function(f){ if((f.fcst_op||0)>0 || (f.fcst_ra||0)>0) hasFcst[f.bdr_id]=true; });
      var pendentes=(DATA.bdrs||[]).filter(function(b){return !hasFcst[b.id];});
      if(pendentes.length===0){
        el.innerHTML='<div style="font-size:11px;color:var(--green);padding:4px 0">Todos os BDRs enviaram forecast. ✓</div>';
        return;
      }
      el.innerHTML=pendentes.map(function(b){
        var first=(b.name||'').split(' ')[0];
        var msg='Oi '+first+', tudo bem? Preciso do seu forecast da semana até amanhã 12h. Obrigado!';
        var waHref='https://wa.me/?text='+encodeURIComponent(msg);
        var av=b.photo
          ? '<img src="'+b.photo+'" style="width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0">'
          : '<div style="width:28px;height:28px;border-radius:50%;background:'+b.bg+';color:'+b.color+';display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0">'+b.id+'</div>';
        return '<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)">'
          +'<div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0">'+av
          +'<span style="font-size:12px;font-weight:600;color:var(--text)">'+first+'</span></div>'
          +'<a href="'+waHref+'" target="_blank" rel="noopener" onclick="track(\'home_cobrar_fcst\',\''+b.id+'\')" style="font-size:10px;font-weight:700;color:var(--accent);background:var(--accent-light);border:1px solid var(--accent-mid);border-radius:8px;padding:6px 10px;text-decoration:none;flex-shrink:0">Cobrar</a>'
          +'</div>';
      }).join('');
    }catch(e){
      el.innerHTML='<div style="font-size:11px;color:var(--text3);padding:4px 0">Forecast indisponível offline.</div>';
    }
  })();
}


// ─── DIAGNÓSTICO DA SEMANA ────────────────────────────────────
// (Antigo buildResumo — mantido como função interna, renderizado dentro
//  do card colapsado da Home pelo novo buildResumo acima.)
function buildDiagnosticoSemana(pane){
  const d=DATA;

  // ── Cálculos base (usa acumulado do mês + dias úteis) ──
  const oppsAcumMes=d.mesAbril?d.mesAbril.opps:d.funil.oportunidades;
  // Dias úteis abril 2026: S1(31mar-4abr)=3du, S2(7-11)=4du, S3(14-17)=4du, S4(22-25)=4du + extras
  // User conta: 7 dias úteis passados até agora, 21 totais no mês
  const diasUteisPorSem=[0,3,4,4,4]; // index 0=unused, 1=S1, 2=S2, 3=S3, 4=S4
  // Pacing padronizado (dias úteis reais via computePacing)
  const pcTime=computePacing(oppsAcumMes,d.meta);
  const diasUteisPassados=pcTime.diasUteisPassados;
  const diasUteisTotais=pcTime.diasUteisTotais;
  const diasUteisRestantes=pcTime.diasUteisRestantes;
  const mediaDiariaUtil=oppsAcumMes/Math.max(diasUteisPassados,1);
  const proj=Math.round(mediaDiariaUtil*diasUteisTotais);
  const gap=oppsAcumMes-d.meta;
  const gapProj=proj-d.meta;
  const pctAtual=pcTime.pctAtingimento;
  const pctProj=Math.min(Math.round((proj/d.meta)*100),100);
  const paceEsp=Math.round(pcTime.paceEsperado);

  // ── Conversões reais ──
  const conv={
    aiLc:{real:74,hist:74,meta:57},
    lcRa:{real:26,hist:37,meta:37},  // hist = média histórica
    raOp:{real:30,hist:75,meta:75},
  };

  // ── Alerta: conversão caiu >5pp vs histórico ──
  const alertas=[];
  const bf=d.bdrFunil||{};
  if(conv.lcRa.hist-conv.lcRa.real>=5){
    const impacto=Math.round((conv.lcRa.hist-conv.lcRa.real)/100*d.funil.leadConectado);
    // Per-BDR LC->RA conversion
    const bdrConvs=d.bdrs.map(b=>{const f=bf[b.id]||{};const lc=f.lc||0;return{name:b.name.split(' ')[0],conv:lc>0?Math.round((b.ras/lc)*100):0};}).sort((a,b)=>a.conv-b.conv);
    const bottom2=bdrConvs.slice(0,2).map(b=>`${b.name} (${b.conv}%)`).join(', ');
    const top2=bdrConvs.slice(-2).reverse().map(b=>`${b.name} (${b.conv}%)`).join(', ');
    alertas.push({
      tipo:'LC→RA',label:'LC → RA',
      antes:conv.lcRa.hist,agora:conv.lcRa.real,
      delta:-(conv.lcRa.hist-conv.lcRa.real),
      impacto:-impacto,
      msg:`−${impacto} opps estimadas`,
      bdrDown:bottom2,bdrUp:top2
    });
  }
  if(conv.raOp.hist-conv.raOp.real>=5){
    const impacto=Math.round((conv.raOp.hist-conv.raOp.real)/100*d.funil.reuniaoAgendada);
    const bdrConvs=d.bdrs.filter(b=>b.ras>0).map(b=>({name:b.name.split(' ')[0],conv:Math.round((b.opps/b.ras)*100)})).sort((a,b)=>a.conv-b.conv);
    const bdrZero=d.bdrs.filter(b=>b.ras>0&&b.opps===0).map(b=>b.name.split(' ')[0]);
    const bottom2=(bdrZero.length>0?bdrZero:bdrConvs.slice(0,2).map(b=>b.name)).slice(0,2).join(', ');
    const top2=bdrConvs.slice(-2).reverse().map(b=>`${b.name} (${b.conv}%)`).join(', ');
    alertas.push({
      tipo:'RA→OP',label:'RA → OP',
      antes:conv.raOp.hist,agora:conv.raOp.real,
      delta:-(conv.raOp.hist-conv.raOp.real),
      impacto:-impacto,
      msg:`−${impacto} opps estimadas`,
      bdrDown:bottom2,bdrUp:top2
    });
  }

  // ── Diagnóstico: BDRs abaixo da média ──
  const mediaConvLigRa=Math.round(d.bdrs.reduce((s,b)=>s+(b.lig>0?b.ras/b.lig:0),0)/d.bdrs.length*100);
  const bdrsBaixos=[...d.bdrs]
    .filter(b=>b.lig>3)
    .map(b=>({...b,conv:b.lig>0?Math.round((b.ras/b.lig)*100):0}))
    .filter(b=>b.conv<mediaConvLigRa-5)
    .sort((a,b)=>a.conv-b.conv)
    .slice(0,3);

  // ── Alavancas ──
  const totalLig=d.bdrs.reduce((s,b)=>s+b.lig,0);
  const alavancas=[
    {label:'+10% LC→RA',detail:`(${conv.lcRa.real}% → ${conv.lcRa.real+10}%)`,opps:Math.round(d.funil.leadConectado*0.10*0.3),cor:'var(--green)'},
    {label:'+15% volume lig.',detail:`(${totalLig} → ${totalLig+Math.round(totalLig*0.15)} ligações)`,opps:Math.round(totalLig*0.15*0.26*0.3),cor:'var(--accent)'},
    {label:'−10% desqualif.',detail:`(${d.funil.desqualificados} → ${d.funil.desqualificados-Math.round(d.funil.desqualificados*0.10)})`,opps:Math.round(d.funil.desqualificados*0.10*0.15),cor:'var(--teal)'},
  ].sort((a,b)=>b.opps-a.opps);

  // ── Funil conversões ──
  const funnelConvs=[
    {de:'Abord.',para:'Conexão',pct:conv.aiLc.real,meta:conv.aiLc.meta},
    {de:'Conexão',para:'Reunião',pct:conv.lcRa.real,meta:conv.lcRa.meta},
    {de:'Reunião',para:'Oport.',pct:conv.raOp.real,meta:conv.raOp.meta},
  ];
  const piorEtapa=funnelConvs.reduce((w,c)=>((c.meta-c.pct)>(w.meta-w.pct)?c:w));

  pane.innerHTML=`

    <!-- ═══ BLOCO 1: FORECAST DA SEMANA (Meta Abril removida — já no hero do topo) ═══ -->
    <div style="background:linear-gradient(145deg,#6366f1 0%,#a855f7 40%,#1a1a26 100%);border-radius:var(--radius);padding:14px 18px;box-shadow:var(--shadow-lg);margin-bottom:14px">
      <div style="font-size:10px;font-weight:700;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px">Forecast · Semana ${d.semAtual}</div>
      <div id="resumo-fcst-semana" style="text-align:center;color:rgba(255,255,255,.5);font-size:11px">Carregando...</div>
    </div>

    <!-- ═══ BLOCO 2: ALERTAS CRÍTICOS ═══ -->
    ${alertas.length>0?`
    <div style="margin-bottom:12px">
      <div style="font-size:10px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;display:flex;align-items:center;gap:5px">
        <div style="width:8px;height:8px;border-radius:50%;background:var(--red);animation:pulse 1.5s infinite"></div>
        Alertas críticos
      </div>
      ${alertas.map(a=>`
      <div onclick="(function(){document.querySelectorAll('.nav-item').forEach(function(b){if(b.textContent.trim().indexOf('Funil')>=0||b.textContent.trim().indexOf('Resultado')>=0)b.click();});})()" style="border-bottom:1px solid var(--border);padding:8px 0;cursor:pointer;transition:opacity .15s" onmouseenter="this.style.opacity='.7'" onmouseleave="this.style.opacity='1'">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span style="font-size:12px;font-weight:600;color:var(--text)">${a.label}</span>
          <span style="font-size:11px;color:var(--text)">${a.antes}%</span>
          <span style="font-size:11px;color:var(--red)">→ ${a.agora}%</span>
          <span style="font-size:10px;font-weight:600;color:var(--red)">${a.delta}pp</span>
          <span style="font-size:10px;color:var(--text3);margin-left:auto">${a.msg} →</span>
        </div>
        <div style="display:flex;gap:12px;margin-top:3px;font-size:10px">
          <span style="color:var(--red)">▼ ${a.bdrDown}</span>
          <span style="color:var(--green)">▲ ${a.bdrUp}</span>
        </div>
      </div>`).join('')}
    </div>`:''}

    <!-- ═══ BLOCO 3: DIAGNÓSTICO ═══ -->
    <div class="card" style="margin-bottom:12px;border-left:3px solid var(--amber)">
      <div class="collapsible-header" onclick="toggleCard('res-diag-body',this)" style="display:flex;align-items:center;justify-content:space-between">
        <div style="display:flex;align-items:center;gap:6px">
          <div style="width:8px;height:8px;border-radius:50%;background:var(--amber)"></div>
          <div style="font-size:10px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:.08em">Diagnóstico</div>
        </div>
        <span class="collapse-icon" style="font-size:14px;color:var(--text3)">▾</span>
      </div>
      <div id="res-diag-body">

      <div style="font-size:11px;font-weight:600;color:var(--text2);margin-bottom:8px">BDRs abaixo da média (conv. Lig→RA)</div>
      ${bdrsBaixos.length>0?bdrsBaixos.map(b=>{
        const bdrData=d.bdrs.find(x=>x.id===b.id);
        return `<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)">
          <div style="display:flex;align-items:center;gap:8px">
            ${bdrData&&bdrData.photo?`<img src="${bdrData.photo}" style="width:26px;height:26px;border-radius:50%;object-fit:cover">`:`<div style="width:26px;height:26px;border-radius:50%;background:${b.bg};color:${b.color};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700">${b.id}</div>`}
            <span style="font-size:12px;font-weight:600">${b.name.split(' ')[0]}</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:12px;font-family:\'Inter\',sans-serif;font-weight:700;color:var(--red)">${b.conv}%</span>
            <span style="font-size:10px;color:var(--text3)">média: ${mediaConvLigRa}%</span>
          </div>
        </div>`;
      }).join(''):`<div style="font-size:12px;color:var(--green)">Todos acima da média de conversão.</div>`}

      <div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--border)">
        <div style="font-size:11px;font-weight:600;color:var(--text2);margin-bottom:6px">Pior etapa do funil</div>
        <div style="display:flex;align-items:center;justify-content:space-between;background:var(--red-bg);border-radius:8px;padding:10px 12px">
          <div style="font-size:12px;font-weight:700;color:var(--red)">${piorEtapa.de} → ${piorEtapa.para}</div>
          <div style="text-align:right">

async function loadGestorForecast(forceSemId){
  const tbody=document.getElementById('forecast-table-body');
  if(!tbody) return;
  try{
    const allSemanas=await supaFetch('gp_semanas','order=id.asc');
    if(!allSemanas||!allSemanas.length){tbody.innerHTML='<tr><td colspan="5" style="padding:12px;text-align:center;font-size:12px;color:var(--text3)">Sem semana ativa.</td></tr>';return;}
    const semId=forceSemId||allSemanas.find(s=>s.sem_atual===DATA.semAtual)?.id||allSemanas[allSemanas.length-1].id;
    // Render semana selector above the table
    var selectorEl=document.getElementById('gestor-fcst-selector');
    if(selectorEl){
      selectorEl.innerHTML=allSemanas.map(s=>{
        const isActive=s.id===semId;
        const isCur=s.sem_atual===DATA.semAtual;
        return `<button onclick="loadGestorForecast(${s.id})" style="font-size:11px;font-weight:${isActive?'700':'500'};padding:5px 12px;border-radius:20px;border:${isActive?'2px solid var(--accent)':'1px solid var(--border)'};background:${isActive?'var(--accent-light)':'transparent'};color:${isActive?'var(--accent)':'var(--text3)'};cursor:pointer;font-family:'Inter',sans-serif">S${s.sem_atual}${isCur?' ●':''}</button>`;
      }).join('');
    }
    const forecasts=await supaFetch('gp_forecast',`semana_id=eq.${semId}&order=bdr_nome.asc`);

    if(!forecasts||forecasts.length===0){
      tbody.innerHTML='<tr><td colspan="7" style="padding:16px;text-align:center;font-size:12px;color:var(--text3)">Nenhum BDR enviou o forecast ainda.</td></tr>';
      return;
    }

    // Map real opps from DATA
    tbody.innerHTML='';
    let totalFcstOp=0, totalFcstLc=0, totalFcstRa=0, totalRealOp=0;
    DATA.bdrs.forEach(bdr=>{
      const f=forecasts.find(x=>x.bdr_id===bdr.id);
      const realOp=bdr.opps||0;
      if(f){ totalFcstOp+=f.fcst_op||0; totalFcstLc+=f.fcst_lc||0; totalFcstRa+=f.fcst_ra||0; }
      totalRealOp+=realOp;
      const ating=f&&f.fcst_op>0?Math.round((realOp/f.fcst_op)*100):null;
      const atingColor=ating===null?'var(--text3)':ating>=100?'var(--green)':ating>=70?'var(--amber)':'var(--red)';
      const photoHtml=bdr.photo

      <td style="padding:8px 6px;text-align:center"></td>
    </tr>`;

    // Render S1-S4 forecast grid (estilo Meu Resultado)

        var allSems=await supaFetch('gp_semanas','order=id.asc');

        var allResults=[];

          gh+='<div style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:7px 4px;text-align:center;margin-bottom:4px">';
          gh+='<div style="font-size:8px;color:var(--text3);margin-bottom:2px">Real</div>';
          gh+='<div style="font-size:20px;font-weight:700;font-family:\'Inter\',sans-serif;color:var(--text)">'+(isFuture?'—':totalReal)+'</div>';
          gh+='</div>';

            gh+='<div style="font-size:13px;font-weight:700;font-family:\'Inter\',sans-serif;color:'+diffCol+'">'+(diff>=0?'+':'')+diff+'</div>';
          }
          gh+='</div>';
        }
        gh+='</div>';
        gridEl.innerHTML=gh;
      }catch(e){gridEl.innerHTML='<div style="font-size:11px;color:var(--text3);text-align:center">Indisponível</div>';}
    }

    // Populate ranking fcst cells
    DATA.bdrs.forEach(function(bdr){
      const f=forecasts.find(function(x){return x.bdr_id===bdr.id;});
      const el=document.getElementById('fcst-rank-'+bdr.id);
      if(!el) return;
      if(f){
        const diff=bdr.opps-(f.fcst_op||0);
        const col=diff>=0?'var(--green)':diff>=-2?'var(--amber)':'var(--red)';

      note.textContent=`${pending} BDR(s) ainda não enviaram o forecast desta semana.`;
      document.querySelector('#forecast-table-body')?.closest('.card')?.appendChild(note);

  }catch(e){
    tbody.innerHTML=`<tr><td colspan="7" style="padding:12px;text-align:center;font-size:12px;color:var(--text3)">Forecast indisponível offline.</td></tr>`;
  }
}

// ── Forecast History WoW ──
async function loadForecastHistory(){
  const el=document.getElementById('forecast-history-table');
  if(!el) return;
  try{
    const allSems=await supaFetch('gp_semanas','order=id.asc');
    if(!allSems||allSems.length===0){el.innerHTML='Sem dados.';return;}
    // Fetch forecasts and results for all semanas
    const allData=[];
    for(const sem of allSems){
      const fcsts=await supaFetch('gp_forecast',`semana_id=eq.${sem.id}`);
      const results=await supaFetch('gp_bdr_resultados',`semana_id=eq.${sem.id}`);
      allData.push({sem,fcsts:fcsts||[],results:results||[]});
    }
    // Score BDRs for ranking
    const scored=[...DATA.bdrs].map(b=>{
      let totalFcst=0,totalReal=0;
      allData.forEach(d=>{
        const f=d.fcsts.find(x=>x.bdr_id===b.id);
        const r=d.results.find(x=>x.bdr_id===b.id);
        if(f) totalFcst+=f.fcst_op||0;
        if(r) totalReal+=r.opps||0;
      });
      return {...b,totalFcst,totalReal,acc:totalFcst>0?Math.round((totalReal/totalFcst)*100):0};
    }).sort((a,b)=>b.acc-a.acc);

    var html='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;min-width:400px;font-family:\'Inter\',sans-serif">';
    html+='<thead><tr style="background:var(--bg3);border-bottom:2px solid var(--border)">';
    html+='<th style="padding:8px 10px;text-align:left;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-weight:600">BDR</th>';
    allData.forEach(d=>{
      const isCur=d.sem.sem_atual===DATA.semAtual;
      html+=`<th style="padding:8px 4px;text-align:center;font-size:9px;color:${isCur?'var(--accent)':'var(--text3)'};text-transform:uppercase;letter-spacing:.05em;font-weight:${isCur?'700':'600'}">S${d.sem.sem_atual} Fcst</th>`;
      html+=`<th style="padding:8px 4px;text-align:center;font-size:9px;color:${isCur?'var(--accent)':'var(--text3)'};text-transform:uppercase;letter-spacing:.05em;font-weight:${isCur?'700':'600'}">S${d.sem.sem_atual} Real</th>`;
    });
    html+='<th style="padding:8px 8px;text-align:center;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-weight:600">Acur.</th>';
    html+='</tr></thead><tbody>';
    scored.forEach((bdr,i)=>{
      const isTop=i<3,isBot=i>=scored.length-3;
      const rowBg=isTop?'rgba(34,197,94,0.06)':isBot?'rgba(248,113,113,0.05)':'';
      const photoHtml=bdr.photo
        ?`<img src="${bdr.photo}" style="width:22px;height:22px;border-radius:50%;object-fit:cover;flex-shrink:0">`
        :`<div style="width:22px;height:22px;border-radius:50%;background:${bdr.bg};color:${bdr.color};display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0">${bdr.id}</div>`;
      html+=`<tr style="border-bottom:1px solid var(--border);background:${rowBg}">`;
      html+=`<td style="padding:8px 10px"><div style="display:flex;align-items:center;gap:6px">${photoHtml}<span style="font-size:11px;font-weight:600;color:${isTop?'var(--green)':isBot?'var(--red)':'var(--text)'}">${bdr.name.split(' ')[0]}</span></div></td>`;
      allData.forEach(d=>{
        const f=d.fcsts.find(x=>x.bdr_id===bdr.id);
        const r=d.results.find(x=>x.bdr_id===bdr.id);
        const fcst=f?f.fcst_op:null;
        const real=r?r.opps:null;
        const col=fcst!==null&&real!==null?(real>=fcst?'var(--green)':'var(--red)'):'var(--text3)';
        html+=`<td style="padding:8px 4px;text-align:center;font-size:12px;font-weight:600;color:var(--accent)">${fcst!==null?fcst:'—'}</td>`;
        html+=`<td style="padding:8px 4px;text-align:center;font-size:12px;font-weight:700;color:${col}">${real!==null?real:'—'}</td>`;
      });
      const accCol=bdr.acc>=100?'var(--green)':bdr.acc>=50?'var(--amber)':'var(--red)';
      html+=`<td style="padding:8px 8px;text-align:center"><span style="font-size:11px;font-weight:700;padding:2px 6px;border-radius:8px;background:${bdr.acc>=100?'var(--green-bg)':bdr.acc>=50?'var(--amber-bg)':'var(--red-bg)'};color:${accCol}">${bdr.totalFcst>0?bdr.acc+'%':'—'}</span></td>`;
      html+='</tr>';
    });
    html+='</tbody></table></div>';
    el.innerHTML=html;
  }catch(e){el.innerHTML='Indisponível offline.';console.warn('Forecast history:',e);}
}

// ── Keep Forecast (BDR chooses to keep after "reflita") ──
async function keepForecast(forecastId, bdrId){
  try{
    await fetch(`${SUPA_URL}/rest/v1/gp_forecast?id=eq.${forecastId}`,{
      method:'PATCH',
      headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({status:'aguardando',justificativa:null,status_changed_at:new Date().toISOString(),status_changed_by:bdrId})
    });
    var bdr=DATA.bdrs.find(b=>b.id===bdrId);
    if(bdr) loadBDRForecast(bdr);
  }catch(e){console.warn('Keep forecast error:',e);}
}

// ── Approve All Forecasts (from Resumo card) ──
async function approveAllForecasts(semId){
  if(!confirm('Aprovar o forecast de todos os BDRs para esta semana?')) return;
  try{
    const fcsts=await supaFetch('gp_forecast',`semana_id=eq.${semId}`);
    if(!fcsts) return;
    for(const f of fcsts){
      if(f.status!=='aprovado'){
        await fetch(`${SUPA_URL}/rest/v1/gp_forecast?id=eq.${f.id}`,{
          method:'PATCH',
          headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},
          body:JSON.stringify({status:'aprovado',status_changed_at:new Date().toISOString(),status_changed_by:currentUser?currentUser.id:'GESTOR'})
        });
      }
    }
    var btn=document.getElementById('btn-approve-all-fcst');
    if(btn) btn.outerHTML='<div style="font-size:10px;color:#bbf7d0;font-weight:600">✅ Forecast aprovado</div>';
  }catch(e){console.warn('Approve all error:',e);}
}

      method:'PATCH',
      headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},

function showReflectInput(forecastId, bdrId){
  var el=document.getElementById('reflect-input-'+bdrId);
  if(!el) return;
  el.style.display='block';
  el.innerHTML=`<textarea id="reflect-text-${bdrId}" placeholder="Justificativa..." style="width:80px;height:40px;font-size:9px;border:1px solid var(--border);border-radius:4px;padding:3px;resize:none;font-family:'Inter',sans-serif"></textarea>
    <button onclick="submitReflection(${forecastId},'${bdrId}')" style="font-size:8px;padding:2px 6px;background:var(--red);color:white;border:none;border-radius:4px;cursor:pointer;margin-top:2px;width:100%">Enviar</button>`;
}

async function submitReflection(forecastId, bdrId){track('forecast_reflect',bdrId);
  var text=(document.getElementById('reflect-text-'+bdrId)||{}).value||'';
  if(!text.trim()){alert('Justificativa obrigatória');return;}
  try{
    // Fetch existing messages
    var existing=await supaFetch('gp_forecast',`id=eq.${forecastId}`);
    var msgs=[];
    if(existing&&existing[0]&&existing[0].justificativa){
      try{msgs=JSON.parse(existing[0].justificativa);}catch(e){msgs=[{autor:existing[0].status_changed_by||'?',texto:existing[0].justificativa,data:existing[0].status_changed_at||''}];}
    }
    msgs.push({autor:currentUser?currentUser.id:'GESTOR',texto:text.trim(),data:new Date().toISOString()});
    await fetch(`${SUPA_URL}/rest/v1/gp_forecast?id=eq.${forecastId}`,{
      method:'PATCH',
      headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({status:'reflita',justificativa:JSON.stringify(msgs),status_changed_at:new Date().toISOString(),status_changed_by:currentUser?currentUser.id:'GESTOR'})
    });
    loadGestorForecast();
  }catch(e){console.warn('Reflect error:',e);}
}

// Add message to forecast conversation (BDR tréplica or Gestor reply)
async function addForecastMessage(forecastId, bdrId, text){
  if(!text||!text.trim()) return;
  try{
    var existing=await supaFetch('gp_forecast',`id=eq.${forecastId}`);
    var msgs=[];
    if(existing&&existing[0]&&existing[0].justificativa){
      try{msgs=JSON.parse(existing[0].justificativa);}catch(e){msgs=[{autor:'?',texto:existing[0].justificativa,data:''}];}
    }
    msgs.push({autor:currentUser?currentUser.id:(bdrId||'?'),texto:text.trim(),data:new Date().toISOString()});
    await fetch(`${SUPA_URL}/rest/v1/gp_forecast?id=eq.${forecastId}`,{
      method:'PATCH',
      headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({justificativa:JSON.stringify(msgs),status_changed_at:new Date().toISOString()})
    });
    var bdr=DATA.bdrs.find(b=>b.id===bdrId);
    if(bdr) loadBDRForecast(bdr);
    loadGestorForecast();
  }catch(e){console.warn('Add message error:',e);}
}

// Render conversation bubbles (horizontal scroll)
function renderForecastConversation(justificativa, forecastId, bdrId, compact){
  var msgs=[];
  if(justificativa){
    try{msgs=JSON.parse(justificativa);}catch(e){msgs=[{autor:'GESTOR',texto:justificativa,data:''}];}
  }
  if(!msgs.length) return '';
  var isGestor=currentUser&&currentUser.isGestor;
  var bubblesHtml=msgs.map(function(m){
    var isMe=(currentUser&&currentUser.id===m.autor);
    var autorLabel=m.autor==='GESTOR'?'Gabriel':DATA.bdrs.find(b=>b.id===m.autor)?.name?.split(' ')[0]||m.autor;
    var dt=m.data?new Date(m.data).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'';
    var bg=m.autor==='GESTOR'?'rgba(37,99,235,0.08)':'rgba(34,197,94,0.10)';
    var border=m.autor==='GESTOR'?'rgba(37,99,235,0.2)':'rgba(34,197,94,0.2)';
    var col=m.autor==='GESTOR'?'var(--accent)':'var(--green)';
    return '<div style="flex-shrink:0;width:'+(compact?'200px':'240px')+';padding:8px 10px;background:'+bg+';border:1px solid '+border+';border-radius:10px">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">'
      +'<span style="font-size:9px;font-weight:700;color:'+col+'">'+autorLabel+'</span>'
      +'<span style="font-size:8px;color:var(--text3)">'+dt+'</span>'
      +'</div>'
      +'<div style="font-size:11px;color:var(--text);line-height:1.4">'+m.texto+'</div>'
      +'</div>';
  }).join('');
  // Reply input
  var replyHtml='<div style="flex-shrink:0;display:flex;flex-direction:column;gap:4px;width:'+(compact?'160px':'200px')+'">'
    +'<textarea id="fcst-reply-'+bdrId+'" placeholder="Responder..." style="width:100%;height:50px;border:1px solid var(--border);border-radius:8px;padding:6px;font-size:10px;font-family:\'Inter\',sans-serif;resize:none;box-sizing:border-box"></textarea>'
    +'<button onclick="(function(){var t=document.getElementById(\'fcst-reply-'+bdrId+'\').value;addForecastMessage('+forecastId+',\''+bdrId+'\',t)})()" style="font-size:9px;padding:4px 8px;background:var(--accent);color:white;border:none;border-radius:6px;cursor:pointer;font-family:\'Inter\',sans-serif">Enviar</button>'
    +'</div>';
  return '<div style="overflow-x:auto;-webkit-overflow-scrolling:touch;margin-top:6px">'
    +'<div style="display:flex;gap:6px;min-width:max-content;padding-bottom:4px">'
    +bubblesHtml+replyHtml
    +'</div></div>';
}

function addKBItem(){
  var cat=document.getElementById('kb-new-cat').value;
  var title=document.getElementById('kb-new-title').value.trim();
  var link=document.getElementById('kb-new-link').value.trim();
  var desc=document.getElementById('kb-new-desc').value.trim();
  var pinned=document.getElementById('kb-new-pinned').checked;
  if(!title){alert('Título obrigatório.');return;}
  var items=JSON.parse(localStorage.getItem('kb_items')||'[]');
  items.push({id:Date.now(),cat:cat,title:title,link:link,desc:desc,pinned:pinned,createdAt:Date.now()});
  localStorage.setItem('kb_items',JSON.stringify(items));
  document.getElementById('kb-new-title').value='';
  document.getElementById('kb-new-link').value='';
  document.getElementById('kb-new-desc').value='';
  document.getElementById('kb-new-pinned').checked=false;
  renderKBItems();
}

function removeKBItem(id){
  if(!confirm('Remover este material?')) return;
  var items=JSON.parse(localStorage.getItem('kb_items')||'[]').filter(i=>i.id!==id);
  localStorage.setItem('kb_items',JSON.stringify(items));
  renderKBItems();
}

function togglePinKB(id){
  var items=JSON.parse(localStorage.getItem('kb_items')||'[]');
  var item=items.find(i=>i.id===id);
  if(item) item.pinned=!item.pinned;
  localStorage.setItem('kb_items',JSON.stringify(items));
  renderKBItems();
}

function filterKB(cat){
  document.querySelectorAll('[id^="kb-filter-"]').forEach(b=>{
    b.style.border='1px solid var(--border)';b.style.background='transparent';b.style.color='var(--text3)';b.style.fontWeight='500';
  });
  var btn=document.getElementById('kb-filter-'+cat);
  if(btn){btn.style.border='2px solid var(--accent)';btn.style.background='var(--accent-light)';btn.style.color='var(--accent)';btn.style.fontWeight='600';}
  renderKBItems(cat==='all'?null:cat);
}

function renderKBItems(filterCat){
  var el=document.getElementById('kb-items-list');
  if(!el) return;
  var items=JSON.parse(localStorage.getItem('kb_items')||'[]');
  if(filterCat) items=items.filter(i=>i.cat===filterCat);
  // Sort: pinned first, then by date desc
  items.sort((a,b)=>{if(a.pinned&&!b.pinned) return -1;if(!a.pinned&&b.pinned) return 1;return b.createdAt-a.createdAt;});
  var catConfig={cadencias:{icon:'🎯',color:'#6366f1'},playbooks:{icon:'📋',color:'#16a34a'},treinamentos:{icon:'🎓',color:'#8b5cf6'},links:{icon:'🔗',color:'#14b8a6'},comunicados:{icon:'📢',color:'#dc2626'}};
  var weekMs=7*24*60*60*1000;
  var now=Date.now();
  var isGestor=currentUser&&currentUser.isGestor;
  if(items.length===0){el.innerHTML='<div style="text-align:center;padding:24px;color:var(--text3);font-size:12px">Nenhum material adicionado ainda.'+(isGestor?' Use o formulário abaixo para adicionar.':'')+'</div>';return;}
  el.innerHTML=items.map(function(item){
    var c=catConfig[item.cat]||{icon:'📄',color:'var(--text3)'};
    var isNew=(now-item.createdAt)<weekMs;
    return '<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:10px;margin-bottom:6px;background:'+(item.pinned?'rgba(37,99,235,0.03)':'white')+'">'
      +'<div style="font-size:18px;flex-shrink:0;margin-top:2px">'+c.icon+'</div>'
      +'<div style="flex:1;min-width:0">'
      +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">'
      +(item.link?'<a href="'+item.link+'" target="_blank" style="font-size:13px;font-weight:600;color:var(--text);text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+item.title+'</a>':'<span style="font-size:13px;font-weight:600;color:var(--text)">'+item.title+'</span>')
      +(item.pinned?'<span style="font-size:8px;color:var(--accent)">📌</span>':'')
      +(isNew?'<span style="font-size:8px;font-weight:700;color:white;background:var(--green);padding:1px 5px;border-radius:6px">NOVO</span>':'')
      +'</div>'
      +(item.desc?'<div style="font-size:11px;color:var(--text3);line-height:1.4">'+item.desc+'</div>':'')
      +'<div style="font-size:9px;color:var(--text3);margin-top:3px"><span style="color:'+c.color+';font-weight:600">'+item.cat+'</span>'+(item.link?' · <a href="'+item.link+'" target="_blank" style="color:var(--accent);text-decoration:none">abrir →</a>':'')+'</div>'
      +'</div>'
      +(isGestor?'<div style="display:flex;flex-direction:column;gap:2px;flex-shrink:0">'
        +'<button onclick="togglePinKB('+item.id+')" style="background:none;border:none;font-size:12px;cursor:pointer;padding:2px" title="'+(item.pinned?'Desafixar':'Fixar')+'">'+(item.pinned?'📌':'📎')+'</button>'
        +'<button onclick="removeKBItem('+item.id+')" style="background:none;border:none;font-size:12px;cursor:pointer;padding:2px;color:var(--text3)" title="Remover">✕</button>'
        +'</div>':'')
      +'</div>';
  }).join('');
}

function buildMRRGestor(pane){
  const m=DATA.mrrTrimestre;
  const q=DATA.q1;

  const maxTotal=sorted[0]?sorted[0].ta+sorted[0].tm:1;
  const q1sorted=[...DATA.bdrs].map(b=>({...b,...(q.bdrs[b.id]||{})})).sort((a,b)=>(b.opps||0)-(a.opps||0));
  const maxOppsQ1=q1sorted[0]?q1sorted[0].opps||0:1;

  pane.innerHTML=`
    <div style="font-size:12px;color:var(--text3);margin-bottom:12px;font-family:\'Inter\',sans-serif">${m.periodo} · MRR gerado + Performance</div>

        <div style="font-size:22px;font-weight:700;font-family:\'Inter\',sans-serif;color:var(--teal)">R$${(m.totalTM/1000).toFixed(0)}k</div>

            :`<div style="width:20px;height:20px;border-radius:50%;background:${b.bg};color:${b.color};display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700">${b.id}</div>`;
          return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">
            <div style="font-size:9px;font-weight:700;color:${color};font-family:\'Inter\',sans-serif">${opps}</div>
            <div style="width:100%;height:${pct}%;background:${color};border-radius:3px 3px 0 0;min-height:4px;transition:height .4s ease"></div>
          </div>`;
        }).join('')}
      </div>
      <!-- Meta line label -->
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">

              <th style="padding:8px 12px;text-align:center;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;font-weight:600">vs Meta</th>
            </tr>
          </thead>
          <tbody>
            ${q1sorted.map((b,i)=>{
              const opps=b.opps||0;
              const pct=Math.round((opps/q.metaOpps)*100);
              const pc=pct>=100?'var(--green)':pct>=70?'var(--amber)':'var(--red)';
              const bdrData=DATA.bdrs.find(x=>x.id===b.id);
              const photoEl=bdrData&&bdrData.photo
                ?`<img src="${bdrData.photo}" style="width:26px;height:26px;border-radius:50%;object-fit:cover;flex-shrink:0;">`

                <td style="padding:10px 8px;text-align:center;font-size:13px;font-family:\'Inter\',sans-serif;color:var(--text2)">${b.ativ||'—'}</td>
                <td style="padding:10px 12px">
                  <div style="display:flex;flex-direction:column;align-items:center;gap:2px">

                    </div>

          </tbody>
        </table>
      </div>
    </div>

    <!-- MRR ranking -->
    <div class="card">
      <div class="card-title">MRR gerado — ${m.periodo}</div>
      ${sorted.map((b,i)=>{
        const bdrData=DATA.bdrs.find(x=>x.id===b.id);
        const total=b.ta+b.tm;
        const pct=maxTotal>0?Math.round((total/maxTotal)*100):0;
        const barColor=i===0?'var(--green)':i===1?'var(--accent)':i===2?'var(--teal)':'var(--text3)';

              }

              <div style="font-size:13px;font-weight:700;font-family:\'Inter\',sans-serif;color:${total>0?barColor:'var(--text3)'}">${total>0?fmt(total):'—'}</div>

            </div>
          </div>
          ${total>0?`<div style="height:4px;background:var(--bg3);border-radius:2px;overflow:hidden">
            <div style="width:${pct}%;height:100%;background:${barColor};border-radius:2px"></div>
          </div>`:''}
        </div>`;
      }).join('')}
    </div>`;

function buildMRRBDR(pane,bdr){
  const m=DATA.mrrTrimestre;
  const q2=DATA.q2Metas;
  const myMrr=m.bdrs.find(b=>b.id===bdr.id)||{ta:0,tm:0};

            ${d.pulses.tendencia.map((v,i)=>{

function buildReunioes(pane){
  const r=DATA.reunioes;
  const totAt=r.atrasadasTA.reduce((s,a)=>s+a.n,0)+r.atrasadasTM.reduce((s,a)=>s+a.n,0);
  const totalFut=r.futuras.reduce((s,d)=>s+d.ta.length+d.tm.length,0);
  pane.innerHTML=`
    <div class="metrics-grid" style="margin-bottom:12px">
      <div class="metric-card mc-blue"><div class="metric-label">Futuras TA+TM</div><div class="metric-val">${totalFut}</div></div>
      <div class="metric-card mc-red"><div class="metric-label">Atrasadas</div><div class="metric-val">${totAt}</div><div class="metric-sub"><span class="pill pill-red">30 dias</span></div></div>
    </div>

    ${(function(){
      // ═══ Reuniões do Mês — Summary + Timeline unificada ═══
      var all=getReunioesDoMes();
      var summary=computeReunioesSummary();
      var slCfg=getReuniaoStatusCfg();
      var slLabels=getReuniaoStatusLabels();
      var pastelPills=[
        {k:'total',label:'Total',val:summary.total,color:'var(--text)',bg:'var(--bg3)'},
        {k:'futura',label:slLabels.futura,val:summary.futura,color:slCfg.futura.color,bg:slCfg.futura.bg},
        {k:'aconteceu',label:slLabels.aconteceu,val:summary.aconteceu,color:slCfg.aconteceu.color,bg:slCfg.aconteceu.bg},
        {k:'virou_op',label:slLabels.virou_op,val:summary.virou_op,color:slCfg.virou_op.color,bg:slCfg.virou_op.bg},
        {k:'no_show',label:slLabels.no_show,val:summary.no_show,color:slCfg.no_show.color,bg:slCfg.no_show.bg},
        {k:'desqualificada',label:slLabels.desqualificada,val:summary.desqualificada,color:slCfg.desqualificada.color,bg:slCfg.desqualificada.bg},
        {k:'reagendada',label:slLabels.reagendada,val:summary.reagendada,color:slCfg.reagendada.color,bg:slCfg.reagendada.bg}
      ];
      // Agrupar reuniões por data efetiva (aplicando overrides de reagendamento)
      var today=new Date(); today.setHours(0,0,0,0);
      function parseData(s){var p=s.split('/');return new Date(2026,parseInt(p[1])-1,parseInt(p[0]));}
      var byDate={};
      all.forEach(function(m){
        var origKey=m.tipo+'|'+m.empresa+'|'+m.data;
        var effDate=getReuniaoDateOverride(origKey)||m.data;
        m._origData=m.data; m._effData=effDate;
        m._status=getReuniaoStatusEffective(m);
        var d=parseData(effDate); d.setHours(0,0,0,0);
        m._time=d>today?'futura':'passada';
        m._bdrId=getBdrIdByNome(m.bdrNome);
        if(!byDate[effDate]) byDate[effDate]={date:effDate,day:m.day||'',items:[]};
        byDate[effDate].items.push(m);
      });
      var days=Object.values(byDate).sort(function(a,b){return parseData(a.date)-parseData(b.date);});
      // Dia da semana PT para casos sem day
      var dowPT=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
      days.forEach(function(d){if(!d.day){var x=parseData(d.date);d.day=dowPT[x.getDay()];}});
      // BDRs para filtro
      var bdrsSet=new Set(); all.forEach(function(m){bdrsSet.add(m.bdrNome);});

      function renderCard(m){
        var stCfg=slCfg[m._status]||slCfg.aconteceu;
        var stLabel=slLabels[m._status]||m._status;
        var tipoCor=m.tipo==='TA'?'var(--accent)':'var(--teal)';
        var tipoBg=m.tipo==='TA'?'var(--accent-light)':'rgba(13,148,136,0.1)';
        var origKeySafe=(m.tipo+'|'+m.empresa+'|'+m._origData).replace(/"/g,'&quot;');
        var bdrShort=(m.bdrNome||'').split(' ')[0];
        var wasReagendada=m._effData!==m._origData;
        return '<div class="reu-card" data-bdr="'+(m.bdrNome||'').replace(/"/g,'&quot;')+'" data-status="'+m._status+'" data-time="'+m._time+'" '
          +'style="border-radius:var(--radius-xs);padding:8px;background:'+(m.tipo==='TA'?'rgba(99,102,241,0.06)':'rgba(20,184,166,0.06)')+';border:1px solid '+(m.tipo==='TA'?'rgba(99,102,241,0.18)':'rgba(20,184,166,0.18)')+';'+(m._time==='passada'?'opacity:.92;':'')+'">'
          +'<div style="display:flex;align-items:center;gap:5px;margin-bottom:4px">'
            +'<span style="font-size:8px;font-weight:700;color:'+tipoCor+';background:'+tipoBg+';padding:1px 5px;border-radius:3px;flex-shrink:0">'+m.tipo+'</span>'
            +'<span style="font-size:10px;color:var(--text2);white-space:nowrap;font-weight:600">'+bdrShort+'</span>'
            +(wasReagendada?'<span style="font-size:8px;color:var(--purple);background:rgba(168,85,247,0.12);padding:1px 4px;border-radius:3px">de '+m._origData+'</span>':'')
          +'</div>'
          +'<div style="font-size:11px;font-weight:600;color:var(--text);line-height:1.3;word-break:break-word;margin-bottom:6px">'+m.empresa+'</div>'
          +'<div>'+renderReuniaoStatus(m)+'</div>'
          +(m._status==='virou_op'&&m._bdrId?'<div onclick="showOppsModal(\''+m._bdrId+'\')" style="margin-top:5px;font-size:9px;color:#22c55e;cursor:pointer;text-decoration:underline;font-weight:600">ver opp →</div>':'')
          +'</div>';
      }
      var pillsHTML=pastelPills.map(function(p,i){

// ─── LEAD TIME AGENDAMENTO (data agendamento → data reunião) ────────────
// Quanto menor, mais "quente" o lead. Lead time alto = maior risco de no-show/cancel.
function buildLeadTimeAgendamentoPanel(pane){
  var lt = (DATA.leadTime && DATA.leadTime.agendamento) || null;
  if(!lt) return;
  var mes = lt.mesAtual, q1 = lt.q1;
  var avgMes = mes.totalDias && mes.reunioes ? (mes.totalDias / mes.reunioes) : 0;
  var avgQ1 = q1.totalDias && q1.reunioes ? (q1.totalDias / q1.reunioes) : 0;
  var delta = avgQ1 ? Math.round(((avgMes - avgQ1) / avgQ1) * 100) : 0;
  var melhorou = delta < 0;
  var deltaColor = melhorou ? 'var(--green)' : (delta > 0 ? 'var(--red)' : 'var(--text2)');
  var deltaArrow = melhorou ? '↓' : (delta > 0 ? '↑' : '→');
  // Régua: compara mes vs Q1 lado a lado, max=Q1*1.2
  var maxScale = Math.max(avgMes, avgQ1) * 1.2;
  var pctMes = (avgMes / maxScale) * 100;
  var pctQ1 = (avgQ1 / maxScale) * 100;
  var corMes = avgMes <= 3 ? 'var(--green)' : avgMes <= 7 ? 'var(--amber)' : 'var(--red)';

  var el = document.createElement('div');
  el.style.cssText = 'margin-top:16px';
  el.innerHTML = '<div style="font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px;padding-bottom:7px;border-bottom:2px solid var(--accent-light);display:flex;align-items:center;gap:6px">'
    + '<span>📅</span> Lead Time de Agendamento — comparativo Q1'
    + '</div>'
    // Cards resumo
    + '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">'
    + '<div class="metric-card" style="text-align:center;padding:12px 8px;border-top:3px solid '+corMes+'">'
    + '<div style="font-size:9px;color:var(--text3);text-transform:uppercase;font-weight:600;margin-bottom:4px">Mês atual</div>'
    + '<div style="font-size:28px;font-weight:700;font-family:\'Inter\',sans-serif;color:'+corMes+';line-height:1">'+avgMes.toFixed(1)+'d</div>'
    + '<div style="font-size:9px;color:var(--text3);margin-top:3px">'+mes.reunioes+' reuniões</div>'
    + '</div>'
    + '<div class="metric-card" style="text-align:center;padding:12px 8px;border-top:3px solid var(--text3)">'
    + '<div style="font-size:9px;color:var(--text3);text-transform:uppercase;font-weight:600;margin-bottom:4px">Q1 (referência)</div>'

function getReunioesDoMes(){
  var out=[];
  (DATA.reunioes.futuras||[]).forEach(function(d){
    (d.ta||[]).forEach(function(m){ out.push({tipo:'TA',bdrNome:m.bdr,empresa:m.empresa,data:d.date,day:d.day,source:'futura'}); });
    (d.tm||[]).forEach(function(m){ out.push({tipo:'TM',bdrNome:m.bdr,empresa:m.empresa,data:d.date,day:d.day,source:'futura'}); });
  });
  (DATA.reunioes.atrasadasTA||[]).forEach(function(a){ out.push({tipo:'TA',bdrNome:a.name,empresa:a.empresa,ae:a.ae,data:a.data,source:'atrasada',bg:a.bg,color:a.color,id:a.id}); });
  (DATA.reunioes.atrasadasTM||[]).forEach(function(a){ out.push({tipo:'TM',bdrNome:a.name,empresa:a.empresa,ae:a.ae,data:a.data,source:'atrasada',bg:a.bg,color:a.color,id:a.id}); });
  // Dedup por (tipo|empresa|data)
  var seen={}; return out.filter(function(m){var k=m.tipo+'|'+m.empresa+'|'+m.data; if(seen[k]) return false; seen[k]=true; return true;});
}
function getReuniaoDateOverride(key){

  try{var map=JSON.parse(localStorage.getItem('reuniao_date_overrides')||'{}');map[key]=newDate;localStorage.setItem('reuniao_date_overrides',JSON.stringify(map));}catch(e){}
}
function getReuniaoStatusOverride(key){

}
function setReuniaoStatus(key,status){
  try{

    if(status==='auto') delete map[key]; else map[key]=status;
    localStorage.setItem('reuniao_status',JSON.stringify(map));

  }catch(e){}

function empresaTemOpp(empresa){
  if(!empresa||empresa==='—') return false;
  var e=(empresa||'').toLowerCase().trim();
  return (DATA.oppsDetalhe||[]).some(function(o){return (o.empresa||'').toLowerCase().trim()===e;});
}
function getReuniaoStatusEffective(m){
  // Usa data efetiva (override de reagendamento)
  var origKey=m.tipo+'|'+m.empresa+'|'+m.data;
  var override=getReuniaoStatusOverride(origKey);
  if(override) return override;
  if(empresaTemOpp(m.empresa)) return 'virou_op';
  var pts=m.data.split('/'); var d=new Date(2026,parseInt(pts[1])-1,parseInt(pts[0]));
  var hoje=new Date(); hoje.setHours(0,0,0,0); d.setHours(0,0,0,0);
  return d>hoje?'futura':'aconteceu';
}
function promptReagendar(key){
  var nova=prompt('Nova data da reunião (DD/MM):','');
  if(!nova) return;
  nova=nova.trim();
  if(!/^\d{2}\/\d{2}$/.test(nova)){alert('Formato inválido. Use DD/MM (ex: 22/04)');return;}
  setReuniaoDateOverride(key,nova);
  setReuniaoStatus(key,'reagendada');
}
function getReuniaoStatusLabels(){
  return {futura:'⏳ Ainda não aconteceu',aconteceu:'✅ Aconteceu',virou_op:'🚀 Virou oportunidade',no_show:'👻 No-show',desqualificada:'🚫 Desqualificada',reagendada:'📅 Reagendada'};
}
function getReuniaoStatusCfg(){
  return {
    futura:{color:'var(--accent)',bg:'var(--accent-light)'},
    aconteceu:{color:'var(--green)',bg:'rgba(34,197,94,0.12)'},
    virou_op:{color:'#22c55e',bg:'rgba(34,197,94,0.18)'},
    no_show:{color:'var(--amber)',bg:'rgba(245,158,11,0.15)'},

  };
}
function renderReuniaoStatus(m){
  var key=m.tipo+'|'+m.empresa+'|'+m.data;
  var current=getReuniaoStatusEffective(m);
  var labels=getReuniaoStatusLabels();
  var cfg=getReuniaoStatusCfg(); var c=cfg[current]||cfg.aconteceu;
  var safeKey=key.replace(/"/g,'&quot;');
  var opts=['futura','aconteceu','virou_op','no_show','desqualificada','reagendada'].map(function(s){

  }).join('')+'<option value="auto">↺ Auto-detectar</option>';
  return '<select data-reu-key="'+safeKey+'" onchange="if(this.value===&quot;reagendada&quot;){promptReagendar(this.dataset.reuKey);}else{setReuniaoStatus(this.dataset.reuKey,this.value);}" style="font-size:9px;padding:3px 5px;border-radius:5px;border:1px solid var(--border);background:'+c.bg+';color:'+c.color+';font-weight:600;cursor:pointer;font-family:\'Inter\',sans-serif;max-width:180px;width:100%">'+opts+'</select>';
}

function addManualAtrasada(){
  var tipo=document.getElementById('atr-new-tipo').value;
  var bdrId=document.getElementById('atr-new-bdr').value;
  var empresa=(document.getElementById('atr-new-empresa').value||'').trim();
  var ae=(document.getElementById('atr-new-ae').value||'').trim();
  var dataRaw=(document.getElementById('atr-new-data').value||'').trim();
  if(!empresa||!dataRaw){alert('Empresa e data são obrigatórios.');return;}
  // Date picker returns YYYY-MM-DD → convert to DD/MM
  var dateParts=dataRaw.split('-');
  if(dateParts.length!==3){alert('Data inválida.');return;}
  var data=dateParts[2]+'/'+dateParts[1];
  var bdr=DATA.bdrs.find(function(b){return b.id===bdrId;});
  if(!bdr) return;
  var item={
    name:bdr.name,bg:bdr.bg,color:bdr.color,id:bdr.id,n:1,
    empresa:empresa,ae:ae||bdr.name,data:data,_manual:true
  };
  // Save to localStorage
  try{
    var manualList=JSON.parse(localStorage.getItem('atrasadas_manual')||'{"TA":[],"TM":[]}');
    manualList[tipo].push(item);
    localStorage.setItem('atrasadas_manual',JSON.stringify(manualList));
    // Add to DATA in memory
    if(tipo==='TA') DATA.reunioes.atrasadasTA.push(item);
    else DATA.reunioes.atrasadasTM.push(item);
    track('atrasada_manual_add',tipo+'|'+bdrId+'|'+empresa);
  }catch(e){console.warn('Save error',e);}
  // Reset form and refresh
  toggleAddAtrasadaForm();
  // Rebuild Reunioes pane
  var pane=document.getElementById('pane-reunioes');
  if(pane){pane.dataset.built='';pane.innerHTML='';buildReunioes(pane);pane.dataset.built='1';}
}

  var table=thEl.closest('table');
  if(!table) return;
  var tbody=table.querySelector('tbody');
  if(!tbody) return;
  var rows=Array.from(tbody.querySelectorAll('tr.atr-row'));
  rows.sort(function(a,b){
    var da=parseInt(a.getAttribute('data-dias')||'0',10);
    var db=parseInt(b.getAttribute('data-dias')||'0',10);
    return newDir==='desc'?db-da:da-db;
  });
  rows.forEach(function(r){tbody.appendChild(r);});
  thEl.dataset.sort=newDir;
  var arrow=thEl.querySelector('.sort-arrow');
  if(arrow) arrow.textContent=newDir==='desc'?'▼':'▲';
}

function filterFuturasByBDR(bdr){

    b.style.border=active?'1.5px solid var(--accent)':'1px solid var(--border)';

function buildLeadTimePanel(pane){
  const r=DATA.reunioes;
  const today=new Date();

  function diasAtraso(data){
    const pts=data.split('/');
    const d=new Date(2026,parseInt(pts[1])-1,parseInt(pts[0]));
    return Math.floor((today-d)/(1000*60*60*24));
  }

  function statusInfo(dias){
    if(dias<=1) return {label:'No SLA',col:'var(--green)',bg:'var(--green-bg)',icon:'✅'};
    if(dias<=6) return {label:'Atenção',col:'var(--amber)',bg:'var(--amber-bg)',icon:'⚠️'};
    if(dias<=13) return {label:'Crítico',col:'var(--red)',bg:'var(--red-bg)',icon:'🔴'};
    return {label:'Grave',col:'#7c3aed',bg:'#ede9fe',icon:'💀'};
  }

  // Build unified list (deduplicate TA+TM by empresa+bdr)
  var allMeetings=[];
  var seen={};
  [...r.atrasadasTA,...r.atrasadasTM].forEach(function(a){
    var key=a.empresa+a.id;
    if(!seen[key]){
      seen[key]=true;
      var dias=diasAtraso(a.data);
      allMeetings.push({...a, dias, status:statusInfo(dias)});
    }
  });
  allMeetings.sort(function(a,b){return b.dias-a.dias;});

  // Metrics

  var avgDias=totalMeet>0?Math.round(allMeetings.reduce(function(s,m){return s+m.dias;},0)/totalMeet):0;
  var criticas=allMeetings.filter(function(m){return m.dias>=14;}).length;
  var noSla=allMeetings.filter(function(m){return m.dias<=1;}).length;
  var maxDias=allMeetings[0]?allMeetings[0].dias:1;

  // Group by AE

  allMeetings.forEach(function(m){
    var ae=m.ae.split(' ')[0]+' '+m.ae.split(' ')[1];
    if(!byAE[ae]) byAE[ae]={name:ae,count:0,totalDias:0,items:[]};
    byAE[ae].count++;
    byAE[ae].totalDias+=m.dias;
