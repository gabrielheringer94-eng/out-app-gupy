<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="LOBXS HUNTER">
<meta name="theme-color" content="#ffffff">
<link rel="manifest" href="manifest.json">
<title>LOBXS HUNTER · Pre Vendas</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  /* ── Gupy Brand System ── */
  /* Backgrounds */
  --bg:#f5f7fa;
  --bg2:#ffffff;
  --bg3:#f0f2f6;
  --bg4:#e8ecf2;
  /* Borders */
  --border:rgba(0,18,47,0.08);
  --border2:rgba(0,18,47,0.14);
  /* Text — Gupy Navy scale */
  --text:#00122f;
  --text2:#3d5077;
  --text3:#7a8eaa;
  /* Accent — Azul Impulso */
  --accent:#003cfd;
  --accent-light:rgba(0,60,253,0.08);
  --accent-mid:rgba(0,60,253,0.14);
  --accent-dim:rgba(0,60,253,0.06);
  /* Gupy Navy */
  --navy:#00122f;
  --navy-light:rgba(0,18,47,0.06);
  /* Status — refined palette */
  --green:#16a34a;  --green-bg:rgba(22,163,74,0.08);
  --amber:#d97706;  --amber-bg:rgba(217,119,6,0.08);
  --red:#dc2626;    --red-bg:rgba(220,38,38,0.08);
  --purple:#7c3aed; --purple-bg:rgba(124,58,237,0.08);
  --teal:#0d9488;
  /* Gupy Brand Accents */
  --gupy-green:#cdff82;
  --gupy-lilac:#9e88ff;
  --gupy-orange:#ff5c1d;
  /* Shadows — clean, modern */
  --shadow:0 1px 4px rgba(0,18,47,0.06),0 4px 16px rgba(0,18,47,0.06);
  --shadow-sm:0 1px 3px rgba(0,18,47,0.08);
  --shadow-lg:0 4px 24px rgba(0,60,253,0.12);
  /* Layout */
  --radius:16px; --radius-sm:12px; --radius-xs:8px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --bottom-nav-h:64px;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:\'Inter\',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;overscroll-behavior:none;}

/* ── Tipografia Inter — hierarquia ── */
.t-title   {font-family:\'Inter\',sans-serif;font-weight:700;font-size:16px;color:var(--text);letter-spacing:-.01em;}
.t-subtitle{font-family:\'Inter\',sans-serif;font-weight:400;font-size:13px;color:var(--text2);}
.t-label   {font-family:\'Inter\',sans-serif;font-weight:600;font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;}
.t-caption {font-family:\'Inter\',sans-serif;font-weight:400;font-size:11px;color:var(--text3);}
.t-tag     {font-family:\'Inter\',sans-serif;font-weight:500;font-size:10px;}
.card-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px;font-family:'Inter',sans-serif;letter-spacing:-.01em}

.screen{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden;}
.screen.active{display:flex;}

/* ── LOGIN ──────────────────────────────────────── */
#screen-login{
  background:linear-gradient(160deg,#003cfd 0%,#00122f 40%,#1e3a8a 100%);
  align-items:center;justify-content:flex-start;
  padding:0;overflow-y:auto;
}
.login-header{
  width:100%;padding:52px 28px 28px;
  display:flex;flex-direction:column;align-items:center;
}
.login-wave{
  position:absolute;bottom:0;left:0;right:0;
  height:72%;background:var(--bg);
  border-radius:32px 32px 0 0;
}
.login-content{
  position:relative;z-index:1;
  width:100%;padding:24px 20px 40px;
  display:flex;flex-direction:column;
}
.login-section-label{
  font-size:10px;font-weight:600;color:var(--text3);
  text-transform:uppercase;letter-spacing:.1em;
  margin-bottom:12px;padding-left:4px;
}
.login-card{
  display:flex;align-items:center;gap:14px;
  background:var(--bg2);border-radius:var(--radius-sm);
  padding:14px 16px;margin-bottom:10px;
  box-shadow:var(--shadow-sm);
  border:1.5px solid transparent;
  cursor:pointer;transition:all .18s;
}
.login-card:active{transform:scale(.98);border-color:var(--accent);}
.login-card-photo{
  width:46px;height:46px;border-radius:50%;
  object-fit:cover;flex-shrink:0;
  background:var(--bg3);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:600;
  overflow:hidden;
}
.login-card-info{flex:1;}
.login-card-name{font-size:15px;font-weight:600;color:var(--text);}
.login-card-role{font-size:12px;color:var(--text2);margin-top:1px;}
.login-card-arrow{color:var(--accent);font-size:18px;font-weight:300;}

/* ── APP SHELL ──────────────────────────────────── */
#screen-app{background:var(--bg);}

/* Header */
.app-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;padding-top:calc(16px + var(--safe-top));
  flex-shrink:0;
  background:var(--bg2);
  box-shadow:var(--shadow-sm);
  border-bottom:1px solid var(--border);
}
.app-header-left{display:flex;align-items:center;gap:12px;}
.app-avatar{
  width:38px;height:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:600;
  overflow:hidden;flex-shrink:0;
  box-shadow:0 0 0 2px var(--accent-light);
}
.app-user-name{font-size:14px;font-weight:600;color:var(--text);}
.app-user-role{font-size:11px;color:var(--text2);margin-top:1px;}
.app-header-right{display:flex;align-items:center;gap:8px;}
.update-chip{
  font-size:10px;color:var(--text2);
  font-family:'Inter',sans-serif;
  background:var(--bg3);padding:4px 9px;
  border-radius:20px;border:1px solid var(--border);
}
.logout-btn{
  width:32px;height:32px;border-radius:50%;
  background:var(--bg3);border:1px solid var(--border);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:14px;color:var(--text2);
}

/* Bottom navigation */
.bottom-nav{
  display:flex;align-items:center;justify-content:space-around;
  height:calc(var(--bottom-nav-h) + var(--safe-bottom));
  padding-bottom:var(--safe-bottom);
  background:var(--bg2);
  border-top:1px solid var(--border);
  box-shadow:0 -2px 12px rgba(0,0,0,0.06);
  flex-shrink:0;
}
.nav-item{
  display:flex;flex-direction:column;align-items:center;gap:0;
  padding:10px 8px;cursor:pointer;flex:1;
  color:var(--text3);transition:color .15s;
  background:none;border:none;font-family:\'Inter\',sans-serif;
}
.nav-item.active{color:var(--accent);}
.nav-icon{display:none;}
.nav-label{font-size:10px;font-weight:400;}
.nav-item.active .nav-icon-dot{
  width:4px;height:4px;border-radius:50%;
  background:var(--accent);margin:0 auto;
}

/* Content panes */
.tab-content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.tab-pane{display:none;padding:16px 16px 24px;}
.tab-pane.active{display:block;animation:fadeUp .22s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── CARDS ──────────────────────────────────────── */
.card{
  background:var(--bg2);border-radius:var(--radius);
  padding:16px;box-shadow:var(--shadow);
  border:1px solid var(--border);
}
.card+.card,.card+.metrics-grid,.metrics-grid+.card{margin-top:12px;}
.card-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px;font-family:'Inter',sans-serif;letter-spacing:-.01em}

/* Metric cards */
.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.metrics-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px;}
.metric-card{
  background:var(--bg2);border-radius:var(--radius-sm);
  padding:10px 12px 8px;box-shadow:var(--shadow-sm);
  border:1px solid var(--border);
  position:relative;overflow:hidden;
}
.metric-icon{
  width:32px;height:32px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;margin-bottom:8px;
}
.metric-label{font-size:12px;color:var(--text2);font-weight:600;margin-bottom:3px;}
.metric-val{font-size:26px;font-weight:700;color:var(--text);line-height:1;font-family:'Inter',sans-serif;}
.metric-sub{font-size:12px;color:var(--text2);margin-top:4px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.metric-progress{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:10px;}
.metric-progress-fill{height:100%;border-radius:2px;}

/* Icon bg variants */
.mi-blue{background:var(--accent-light);color:var(--accent);}
.mi-green{background:#dcfce7;color:var(--green);}
.mi-amber{background:#fef3c7;color:var(--amber);}
.mi-red{background:#fee2e2;color:var(--red);}
.mi-purple{background:#ede9fe;color:var(--purple);}
.mi-teal{background:#ccfbf1;color:var(--teal);}

/* Backward compat */
.mc-green .metric-icon,.mc-blue .metric-icon{display:none;}
.mc-green::before,.mc-amber::before,.mc-red::before,.mc-blue::before,.mc-purple::before{display:none;}

/* Pills */
.pill{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;}
.pill-green{background:var(--green-bg);color:var(--green);}
.pill-amber{background:var(--amber-bg);color:var(--amber);}
.pill-red{background:var(--red-bg);color:var(--red);}
.pill-blue{background:var(--accent-light);color:var(--accent);}

/* Funnel */
.funnel{display:flex;flex-direction:column;gap:6px;}
.funnel-row{display:flex;align-items:center;gap:8px;}
.funnel-name{font-size:11px;color:var(--text2);width:110px;flex-shrink:0;text-align:right;}
.funnel-track{flex:1;height:26px;background:var(--bg3);border-radius:6px;overflow:hidden;}
.funnel-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:9px;}
.funnel-fill span{font-size:11px;font-weight:600;font-family:'Inter',sans-serif;color:rgba(255,255,255,.95);}
.funnel-num{font-size:11px;font-family:'Inter',sans-serif;color:var(--text);width:28px;text-align:right;font-weight:600;}

/* Conv list */
.conv-list{display:flex;flex-direction:column;}
.conv-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
.conv-item:last-child{border-bottom:none;}
.conv-tag{font-size:10px;font-family:'Inter',sans-serif;background:var(--bg3);color:var(--text2);padding:3px 7px;border-radius:5px;flex-shrink:0;font-weight:600;}
.conv-lbl{font-size:11px;color:var(--text2);margin-left:8px;flex:1;}
.conv-right{display:flex;align-items:center;gap:6px;}
.conv-pct{font-size:15px;font-weight:700;font-family:'Inter',sans-serif;}
.conv-meta{font-size:10px;color:var(--text3);}
.delta-pos{font-size:11px;font-family:'Inter',sans-serif;font-weight:600;color:var(--green);}
.delta-neg{font-size:11px;font-family:'Inter',sans-serif;font-weight:600;color:var(--red);}

/* Insight block */
.insight-block{margin-top:14px;border-top:1px solid var(--border);padding-top:14px;}
.insight-title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;display:flex;align-items:center;gap:5px;}
.insight-title span{color:var(--accent);}
.insight-item{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;line-height:1.55;}
.insight-item:last-child{border-bottom:none;}
.insight-arrow{font-size:13px;flex-shrink:0;margin-top:1px;font-weight:700;}
.insight-arrow.up{color:var(--green);}
.insight-arrow.down{color:var(--red);}
.insight-arrow.warn{color:var(--amber);}
.insight-text{color:var(--text);}
.insight-text strong{font-weight:600;}

/* Alert banners */
.alert-banner{border-radius:var(--radius-sm);padding:11px 14px;font-size:12px;border:1px solid;margin-bottom:10px;display:flex;gap:9px;align-items:flex-start;line-height:1.55;}
.ab-red{background:#fff5f5;border-color:#fecaca;color:var(--text);}
.ab-amber{background:#fffbeb;border-color:#fde68a;color:var(--text);}
.ab-green{background:#f0fdf4;border-color:#bbf7d0;color:var(--text);}
.ab-blue{background:var(--accent-light);border-color:rgba(26,86,219,0.25);color:var(--text);}

/* Highlights */
.hl-pair{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
.hl-box{border-radius:var(--radius-sm);padding:12px 14px;}
.hl-green{background:#f0fdf4;border:1px solid #bbf7d0;}
.hl-red{background:#fff5f5;border:1px solid #fecaca;}
.hl-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;display:flex;align-items:center;gap:4px;}
.hl-green .hl-title{color:var(--green);}
.hl-red .hl-title{color:var(--red);}
.hl-dot{width:5px;height:5px;border-radius:50%;}
.hl-green .hl-dot{background:var(--green);}
.hl-red .hl-dot{background:var(--red);}
.hl-item{font-size:11px;color:var(--text);padding:4px 0;border-bottom:1px solid;display:flex;gap:5px;}
.hl-green .hl-item{border-color:rgba(22,163,74,0.12);}
.hl-red .hl-item{border-color:rgba(220,38,38,0.12);}
.hl-item:last-child{border-bottom:none;}

/* Progress */
.prog-row{margin-bottom:10px;}
.prog-meta{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;}
.prog-name{color:var(--text);font-weight:500;}
.prog-num{color:var(--text2);font-family:'Inter',sans-serif;}
.prog-track{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;border-radius:3px;}

/* BDR list */
.bdr-list{display:flex;flex-direction:column;}
.bdr-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border);}
.bdr-row:last-child{border-bottom:none;}
.bdr-left{display:flex;align-items:center;gap:10px;}
.bdr-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;overflow:hidden;}
.bdr-info-name{font-size:13px;font-weight:600;color:var(--text);}
.bdr-info-sub{font-size:10px;color:var(--text2);}
.bdr-right{display:flex;align-items:center;gap:10px;}
.bdr-stat{text-align:right;}
.bdr-stat-val{font-size:13px;font-family:'Inter',sans-serif;font-weight:600;display:block;color:var(--text);}
.bdr-stat-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* Pace */
.pace-list{display:flex;flex-direction:column;}
.pace-row{padding:10px 0;border-bottom:1px solid var(--border);}
.pace-row:last-child{border-bottom:none;}
.pace-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.pace-name{font-size:12px;font-weight:500;display:flex;align-items:center;gap:7px;color:var(--text);}
.pace-right{display:flex;align-items:center;gap:6px;}
.pace-needed{font-size:10px;color:var(--text3);}
.pace-track{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.pace-fill{height:100%;border-radius:3px;}
.pace-pill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;}
.pp-green{background:var(--green-bg);color:var(--green);}
.pp-amber{background:var(--amber-bg);color:var(--amber);}
.pp-red{background:var(--red-bg);color:var(--red);}

/* Proj */
.proj-big{font-size:40px;font-weight:700;font-family:'Inter',sans-serif;line-height:1;color:var(--text);}
.proj-track{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;margin:10px 0 6px;}
.proj-bar{height:100%;border-radius:4px;}

.divider{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin:16px 0 10px;padding-bottom:7px;border-bottom:1px solid var(--border);}

/* BDR hero */
.bdr-hero{background:linear-gradient(135deg,var(--accent) 0%,#00122f 100%);border-radius:var(--radius);padding:20px;margin-bottom:12px;text-align:center;box-shadow:var(--shadow-lg);}
.bdr-hero-av{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;margin:0 auto 10px;border:3px solid rgba(255,255,255,.3);overflow:hidden;}
.bdr-hero-name{font-size:17px;font-weight:700;margin-bottom:2px;color:#fff;}
.bdr-hero-role{font-size:11px;color:rgba(255,255,255,.7);}
.bdr-metrics-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px;}
.bdr-metric-mini{background:var(--bg2);border-radius:var(--radius-sm);padding:12px 8px;text-align:center;box-shadow:var(--shadow-sm);}
.bdr-metric-mini .val{font-size:22px;font-weight:700;font-family:'Inter',sans-serif;line-height:1;color:var(--text);}
.bdr-metric-mini .lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-top:4px;}
.bdr-metric-mini .sub{font-size:10px;margin-top:2px;color:var(--text2);}

/* Reunion chips */
.reun-date-block{margin-bottom:14px;}
.reun-date-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.reun-chips{display:flex;flex-wrap:wrap;gap:6px;}
.reun-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid;}
.rc-ta{background:#eff6ff;border-color:#bfdbfe;color:#003cfd;}
.rc-tm{background:#f0fdfa;border-color:#99f6e4;color:#0f766e;}
.rc-dot{width:5px;height:5px;border-radius:50%;}
.rc-ta .rc-dot{background:#003cfd;}
.rc-tm .rc-dot{background:#0f766e;}

/* Motivos */
.motivo-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.motivo-lbl{font-size:11px;color:var(--text);width:130px;flex-shrink:0;text-align:right;line-height:1.35;font-weight:500;}
.motivo-track{flex:1;height:18px;background:var(--bg3);border-radius:4px;overflow:hidden;}
.motivo-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:7px;}
.motivo-fill span{font-size:10px;font-family:'Inter',sans-serif;color:rgba(255,255,255,.95);font-weight:600;}
.motivo-n{font-size:10px;font-family:'Inter',sans-serif;color:var(--text2);width:22px;text-align:right;font-weight:600;}

.etapa-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:12px;}
.etapa-box{background:var(--bg3);border-radius:var(--radius-sm);padding:12px;text-align:center;}
.etapa-box .ev{font-size:24px;font-weight:700;font-family:'Inter',sans-serif;color:var(--text);}
.etapa-box .el{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-top:3px;}
.etapa-box .ep{font-size:10px;margin-top:3px;color:var(--text2);}

/* ── TICKER ─────────────────────────────────────── */
.ticker-bar{display:none;}
.ticker-label{
  font-size:10px;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;
  background:rgba(0,0,0,.2);
  padding:0 12px;height:100%;
  display:flex;align-items:center;
  white-space:nowrap;flex-shrink:0;
}
.ticker-track{flex:1;overflow:hidden;position:relative;height:100%;}
.ticker-inner{
  display:flex;align-items:center;height:100%;
  white-space:nowrap;
  animation:ticker-scroll 32s linear infinite;
}
.ticker-inner:hover{animation-play-state:paused;}
@keyframes ticker-scroll{
  0%{transform:translateX(100%);}
  100%{transform:translateX(-100%);}
}
.ticker-item{
  font-size:11px;font-weight:500;
  padding:0 24px;
  display:inline-flex;align-items:center;gap:6px;
}
.ticker-sep{opacity:.4;margin:0 4px;}


.collapsible-header{cursor:pointer;user-select:none;}
.collapsible-header:active{opacity:.8;}
.collapse-icon{transition:transform .2s ease;display:inline-block;}

@media(max-width:360px){
  .funnel-name{width:85px;}
  .motivo-lbl{width:100px;}
  .metrics-grid{grid-template-columns:1fr 1fr;}
}

   GUPY BRAND SYSTEM — Design Upgrade
   ═══════════════════════════════════════ */

/* Base typography — Inter */
body, button, input, select, textarea {
  font-family: 'Inter', sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* App header — Gupy navy accent */
#app-header {
  background: #ffffff;
  border-bottom: 1.5px solid rgba(0,18,47,0.08);
  box-shadow: 0 1px 8px rgba(0,18,47,0.05);
}

#app-role {
  font-size: 11px;
  font-weight: 500;
  color: var(--text3);
  letter-spacing: .02em;
}

/* Bottom nav — clean white with navy accent */
#bottom-nav {
  background: #ffffff;
  border-top: 1.5px solid rgba(0,18,47,0.08);
  box-shadow: 0 -2px 16px rgba(0,18,47,0.06);
}

.nav-item {
  font-family: 'Inter', sans-serif;
  transition: all .15s ease;
}

.nav-item.active {
  color: var(--accent) !important;
}

.nav-item.active .nav-label {
  font-weight: 700;
  color: var(--accent);
}

.nav-item:not(.active):hover {
  color: var(--text2);
}

/* Cards — refined */
.card {
  background: #ffffff;
  border: 1px solid rgba(0,18,47,0.08);
  border-radius: var(--radius);
  box-shadow: 0 1px 4px rgba(0,18,47,0.05), 0 2px 8px rgba(0,18,47,0.03);
}

.card-title {
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -.01em;
  margin-bottom: 12px;
}

/* Login screen — Gupy navy gradient */
#screen-login {
  background: linear-gradient(160deg, #00122f 0%, #001a4a 40%, #003cfd 100%);
}

/* Photo buttons on login */
.photo-grid-item span {
  font-family: 'Inter', sans-serif;
  font-weight: 600;
}

/* Pill/badge components */
.pill {
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  border-radius: 20px;
  font-size: 11px;
  padding: 3px 9px;
}

/* Tab content background */
.tab-pane {
  background: var(--bg);
}

/* Scrollbar — subtle */
.tab-pane::-webkit-scrollbar { width: 3px; }
.tab-pane::-webkit-scrollbar-track { background: transparent; }
.tab-pane::-webkit-scrollbar-thumb { background: rgba(0,18,47,0.12); border-radius: 3px; }

/* Buttons — Inter */
button {
  font-family: 'Inter', sans-serif;
}

/* Progress bars */
.progress-fill, [style*="background:var(--accent)"] {
  background: var(--accent) !important;
}

/* Data mono — keep Inter for numbers */
.mono, [style*="Inter"] {
  font-family: 'Inter', monospace;
}

/* Perf blocks white bg */
.perf-blk {
  background: #ffffff !important;
  border: 1px solid rgba(0,18,47,0.08) !important;
  border-radius: var(--radius) !important;
}

.perf-blk:hover {
  border-color: rgba(0,60,253,0.2) !important;
}

/* Sem chips — S1/S2/S3 */
.sem-chip {
  font-family: 'Inter', sans-serif !important;
}

/* Hero gradient on BDR home — Gupy navy */
/* (Updated via JS inline styles — CSS vars cascade) */

/* Forecast inputs */
input[type="number"] {
  font-family: 'Inter', monospace;
  border-radius: var(--radius-sm);
  border: 1.5px solid rgba(0,18,47,0.14);
  background: #ffffff;
  color: var(--text);
}

input[type="number"]:focus {
  border-color: var(--accent);
  outline: none;
  box-shadow: 0 0 0 3px rgba(0,60,253,0.1);
}

/* Accent light override */
.accent-bg, [style*="var(--accent-light)"] {
  background: rgba(0,60,253,0.07) !important;
}

/* Green accent — Gupy Verde Aurora for positive signals */
.stat-positive {
  color: #16a34a;
}

/* Timeline columns */
.timeline-col {
  border-right: 1px solid rgba(0,18,47,0.07);
}

/* Drag handle */
.drag-handle {
  color: rgba(0,18,47,0.2) !important;
  cursor: grab;
}

.drag-handle:hover {
  color: var(--accent) !important;
}

/* MRR BDR panel */
#mrr-bdr-pane .card-title {
  color: var(--navy);
}

/* Notification dot */
.notif-dot {
  background: var(--gupy-orange);
}

function calcTrofeus(bdrId){
  const hist=DATA.metaHistorico&&DATA.metaHistorico[bdrId];
  if(!hist) return {count:0,streak:0};
  // Count consecutive months ending at most recent
  const months=['mar','fev','jan'];
  let streak=0;
  for(const m of months){
    if(hist[m]) streak++; else break;
  }
  // Total months with meta
  const count=months.filter(m=>hist[m]).length;
  return {count,streak};
}

  const h=new Date().getHours();
  const greet=h<12?'Bom dia! ☀️':h<18?'Boa tarde! 👋':'Boa noite! 🌙';
  const el=document.getElementById('login-greeting');
  if(el) el.textContent=greet;
  const content=document.getElementById('login-content');
  if(!content) return;
  content.innerHTML='';

  // Grid of person cards
  const label=document.createElement('div');
  label.className='login-section-label';
  label.textContent='Quem é você?';
  content.appendChild(label);

  const grid=document.createElement('div');
  grid.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:10px;';
  USERS.forEach(u=>{
    const card=document.createElement('button');
    card.style.cssText=`
      background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);
      padding:16px 10px;cursor:pointer;transition:all .18s;
      display:flex;flex-direction:column;align-items:center;gap:10px;
      box-shadow:var(--shadow-sm);font-family:\'Inter\',sans-serif;
      text-align:center;
    `;
    const photoEl=u.photo
      ?`<img src="${u.photo}" style="width:60px;height:60px;border-radius:50%;object-fit:cover;border:2.5px solid var(--accent-dim);">`
      :`<div style="width:60px;height:60px;border-radius:50%;background:${u.bg};color:${u.color};display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;border:2.5px solid var(--accent-dim);">${u.av}</div>`;
    card.innerHTML=`
      ${photoEl}
      <div>
        <div style="font-size:13px;font-weight:600;color:var(--text);line-height:1.3">${u.name.split(' ')[0]}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:2px">${u.isGestor?'Líder':'BDR'}</div>
      </div>`;
    card.addEventListener('touchstart',()=>{ card.style.transform='scale(.96)'; card.style.borderColor='var(--accent)'; },{passive:true});
    card.addEventListener('touchend',()=>{ card.style.transform=''; card.style.borderColor=''; },{passive:true});
    card.onclick=()=>{ currentUser=u; doLogin(); };
    grid.appendChild(card);
  });
  content.appendChild(grid);
}

function doLogin(){
  if(!currentUser) return;
  try{localStorage.setItem('gupypulse_session',JSON.stringify({userId:currentUser.id}));}catch(e){}
  document.getElementById('screen-login').classList.remove('active');
  document.getElementById('screen-app').classList.add('active');
  setupApp();
}

function doLogout(){
  try{localStorage.removeItem('gupypulse_session');}catch(e){}
  currentUser=null;
  document.getElementById('screen-app').classList.remove('active');
  document.getElementById('screen-login').classList.add('active');
  document.getElementById('bottom-nav').innerHTML='';
  document.getElementById('tab-content').innerHTML='';
}

// ─── APP SETUP ────────────────────────────────────────────────
function setupApp(){
  const u=currentUser;
  const av=document.getElementById('app-av');
  if(u.photo){
    av.innerHTML=`<img src="${u.photo}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
    av.style.background='transparent';
  } else {
    av.innerHTML='';
    av.style.background=u.bg;
    av.style.color=u.color;
    av.textContent=u.av;
  }
  // Apply saved display name pref
  const prefsKey='gpulse-prefs-'+(u.id||'');
  let savedPrefs={};
  try{ savedPrefs=JSON.parse(localStorage.getItem(prefsKey)||'{}'); }catch(e){}
  const displayName=savedPrefs.nomeApp||u.name.split(' ')[0];
  document.getElementById('app-name').textContent=displayName;

  if(u.isGestor){
    document.getElementById('app-role').textContent='Líder · Pre Vendas';
  } else {
    // Build role line with senioridade + badges
    const prefs=savedPrefs;
    const nivel=prefs.nivel||'';
    const trofeus=calcTrofeus(u.id);
    const espec=getEspecialidades(u.id);

    // Role line: "BDR · Pre Vendas · Pleno"
    const roleEl=document.getElementById('app-role');
    const roleText='BDR · Pre Vendas'+(nivel?' · '+nivel:'');
    roleEl.textContent=roleText;

    // Badges row — trophies + specialties
    const badgesEl=document.getElementById('app-badges');
    if(badgesEl){
      let html='';
      // Trophies
      if(trofeus.streak>0){
        const trofLabel=trofeus.streak>=3?'🏆'.repeat(trofeus.streak):'🏅'.repeat(trofeus.streak);
        const trofTitle=trofeus.streak>=3?trofeus.streak+' meses seguidos — conquista especial!':trofeus.streak+' mes(es) batendo meta';
        html+=`<span title="${trofTitle}" style="font-size:13px;letter-spacing:1px">${trofLabel}</span>`;
      }
      // Specialties
      espec.forEach(function(e){
        const cfg=ESPECIALIDADE_CONFIG[e]||{icon:'⭐',color:'var(--accent)',bg:'var(--accent-light)'};
        html+=`<span title="Especialista: ${e}" style="display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;color:${cfg.color};background:${cfg.bg};padding:2px 7px;border-radius:10px;font-family:'Inter',sans-serif">${cfg.icon} ${e}</span>`;
      });
      badgesEl.innerHTML=html;
      badgesEl.style.display=html?'flex':'none';
    }
  }
  // Update timestamp chip — show last data update
  const chip=document.getElementById('last-update-chip');
  if(chip){
    const ts=DATA.ultimaAtualizacao?new Date(DATA.ultimaAtualizacao):new Date();
    const day=ts.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}).replace('.','');
    const time=ts.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    chip.textContent=`Atualizado: ${day} ${time}`;
    chip.title='Última atualização dos dados';
  }
  buildTicker(u);
  if(u.isGestor) buildGestorApp();
  else buildBDRApp(u);
  // Apply saved preferences
  applyUserPrefs(u.id);
  // Check daily alerts after login
  setTimeout(checkDailyAlerts, 2000);
}

function buildTicker(user){
  const ticker=document.getElementById('ticker-inner');
  if(!ticker) return;
  const d=DATA;
  let items=[];

  if(user.isGestor){
    const pctMeta=Math.round((d.funil.oportunidades/d.meta)*100);
    const proj=Math.round((d.funil.oportunidades/d.semAtual)*d.semTotal);
    items=[
      {icon:'▲',text:`Time · ${d.funil.oportunidades} opps de ${d.meta} · ${pctMeta}% da meta`},
      {icon:'—',text:`Projeção de fechamento: ${proj} opps`},
      {icon:'▲',text:`AI→LC em 74% · meta 57% · +17pp acima`},
      {icon:'▼',text:`LC→RA em 26% · meta 37% · −11pp abaixo`},
      {icon:'—',text:`${d.funil.reuniaoAgendada} reuniões agendadas na semana`},
      {icon:'▼',text:`${d.funil.desqualificados} leads desqualificados · 115 esta semana`},
      {icon:'▲',text:`MeetRox time · média 8.1 esta semana · 8.4 em março`},
    ];
  } else {
    const bdr=d.bdrs.find(b=>b.id===user.id);
    if(!bdr) return;
    const META=d.metaBDR;
    const pct=Math.round((bdr.opps/META)*100);
    const SEMR=d.semTotal-d.semAtual;
    const needed=SEMR>0?Math.ceil((META-bdr.opps)/SEMR):META-bdr.opps;
    const m=bdr.meetrox;
    items=[
      {icon:'—',text:`${bdr.name.split(' ')[0]} · ${bdr.opps} opps de ${META} · ${pct}% da meta`},
      {icon:'—',text:`${bdr.ras} reuniões agendadas · ${bdr.lig} ligações conectadas esta semana`},
      {icon:'—',text:`Precisa de ${needed} opps/semana nas próximas ${SEMR} semanas`},
      ...(m&&m.nota?[{icon:m.nota>=8?'▲':'▼',text:`MeetRox · nota ${m.nota} esta semana · M-1: ${m.notaMes}`}]:[]),
      {icon:'—',text:`${bdr.desq} leads desqualificados · principal motivo: ${d.bdrFunil[bdr.id]?.topMotivo||'—'}`},
    ];
  }

  ticker.innerHTML=items.map(item=>`
    <span class="ticker-item">
      <span style="opacity:.6">${item.icon}</span>
      ${item.text}
    </span>
    <span class="ticker-sep">·</span>
  `).join('') + items.map(item=>`
    <span class="ticker-item">
      <span style="opacity:.6">${item.icon}</span>
      ${item.text}
    </span>
    <span class="ticker-sep">·</span>
  `).join(''); // duplicate for seamless loop
}

// ─── DRAG & DROP CARDS ────────────────────────────────────────
function makePaneDraggable(pane, storageKey){
  // Wait a tick for innerHTML to settle
  setTimeout(function(){
    var cards=Array.from(pane.querySelectorAll(':scope > .card'));
    if(cards.length < 2) return; // nothing to reorder

    // Restore saved order
    try{
      var saved=JSON.parse(localStorage.getItem(storageKey));
      if(saved && Array.isArray(saved) && saved.length === cards.length){
        // Give each card a stable index based on position
        cards.forEach(function(c,i){ c.dataset.dragIdx=String(i); });
        var reordered=[];
        saved.forEach(function(idx){
          var c=pane.querySelector(':scope > .card[data-drag-idx="'+idx+'"]');
          if(c) reordered.push(c);
        });
        // append any missing
        cards.forEach(function(c){
          if(!reordered.includes(c)) reordered.push(c);
        });
        reordered.forEach(function(c){ pane.appendChild(c); });
        cards=reordered;
      }
    }catch(e){}

    // Tag cards with index
    cards.forEach(function(c,i){ c.dataset.dragIdx=String(i); });

    function saveOrder(){
      var order=Array.from(pane.querySelectorAll(':scope > .card')).map(function(c){return c.dataset.dragIdx;});
      try{ localStorage.setItem(storageKey,JSON.stringify(order)); }catch(e){}
    }

    var dragSrc=null;

    cards.forEach(function(card){
      // Add drag handle to card
      var existingHandle=card.querySelector('.drag-handle');
      if(existingHandle) return;

      var handle=document.createElement('div');
      handle.className='drag-handle';
      handle.innerHTML='⠿';
      handle.title='Arrastar para reordenar';
      handle.style.cssText='position:absolute;top:10px;right:40px;font-size:14px;color:var(--border2);cursor:grab;padding:2px 6px;border-radius:4px;transition:color .15s;z-index:2;user-select:none;touch-action:none';
      handle.onmouseenter=function(){ handle.style.color='var(--text2)'; };
      handle.onmouseleave=function(){ handle.style.color='var(--border2)'; };

      // Make card relative for handle positioning
      if(getComputedStyle(card).position==='static') card.style.position='relative';
      card.appendChild(handle);
      card.draggable=true;

      // Desktop drag
      card.addEventListener('dragstart',function(e){
        // Only if drag started from handle area
        dragSrc=card;
        card.style.opacity='0.45';
        e.dataTransfer.effectAllowed='move';
      });
      card.addEventListener('dragend',function(){
        dragSrc=null;
        card.style.opacity='1';
        Array.from(pane.querySelectorAll(':scope > .card')).forEach(function(c){
          c.style.borderTop=''; c.style.borderBottom='';
        });
        saveOrder();
      });
      card.addEventListener('dragover',function(e){
        e.preventDefault();
        if(!dragSrc||dragSrc===card) return;
        Array.from(pane.querySelectorAll(':scope > .card')).forEach(function(c){
          c.style.borderTop=''; c.style.borderBottom='';
        });
        var rect=card.getBoundingClientRect();
        var mid=rect.top+rect.height/2;
        if(e.clientY<mid) card.style.borderTop='2px solid var(--accent)';
        else card.style.borderBottom='2px solid var(--accent)';
      });
      card.addEventListener('dragleave',function(){
        card.style.borderTop=''; card.style.borderBottom='';
      });
      card.addEventListener('drop',function(e){
        e.preventDefault();
        card.style.borderTop=''; card.style.borderBottom='';
        if(!dragSrc||dragSrc===card) return;
        var rect=card.getBoundingClientRect();
        var mid=rect.top+rect.height/2;
        if(e.clientY<mid) pane.insertBefore(dragSrc,card);
        else pane.insertBefore(dragSrc,card.nextSibling);
        saveOrder();
      });

      // Touch drag
      var touchClone=null, touchOffY=0;
      handle.addEventListener('touchstart',function(e){
        e.stopPropagation();
        dragSrc=card;
        var t=e.touches[0];
        touchOffY=t.clientY-card.getBoundingClientRect().top;
        touchClone=card.cloneNode(true);
        touchClone.style.cssText='position:fixed;left:'+card.getBoundingClientRect().left+'px;top:'+(t.clientY-touchOffY)+'px;width:'+card.offsetWidth+'px;opacity:.6;z-index:9999;pointer-events:none;box-shadow:0 8px 30px rgba(0,0,0,.25)';
        document.body.appendChild(touchClone);
        card.style.opacity='0.35';
      },{passive:true});
      handle.addEventListener('touchmove',function(e){
        if(!touchClone) return;
        e.preventDefault();
        var t=e.touches[0];
        touchClone.style.top=(t.clientY-touchOffY)+'px';
        touchClone.style.display='none';
        var el=document.elementFromPoint(t.clientX,t.clientY);
        touchClone.style.display='';
        var target=el?el.closest('.card'):null;
        Array.from(pane.querySelectorAll(':scope > .card')).forEach(function(c){
          c.style.borderTop=''; c.style.borderBottom='';
        });
        if(target&&target!==card&&pane.contains(target)){
          var rect=target.getBoundingClientRect();
          if(t.clientY<rect.top+rect.height/2) target.style.borderTop='2px solid var(--accent)';
          else target.style.borderBottom='2px solid var(--accent)';
        }
      },{passive:false});
      handle.addEventListener('touchend',function(e){
        if(touchClone){ touchClone.remove(); touchClone=null; }
        card.style.opacity='1';
        Array.from(pane.querySelectorAll(':scope > .card')).forEach(function(c){
          c.style.borderTop=''; c.style.borderBottom='';
        });
        if(!dragSrc) return;
        var t=e.changedTouches[0];
        var el=document.elementFromPoint(t.clientX,t.clientY);
        var target=el?el.closest('.card'):null;
        if(target&&target!==card&&pane.contains(target)){
          var rect=target.getBoundingClientRect();
          if(t.clientY<rect.top+rect.height/2) pane.insertBefore(card,target);
          else pane.insertBefore(card,target.nextSibling);
        }
        dragSrc=null;
        saveOrder();
      });
    });
  },80);
}

function buildTabs(tabs,builders){
  const nav=document.getElementById('bottom-nav');
  const content=document.getElementById('tab-content');
  nav.innerHTML=''; content.innerHTML='';
  tabs.forEach((t,i)=>{
    // Nav button
    const btn=document.createElement('button');
    btn.className='nav-item'+(i===0?' active':'');
    btn.dataset.idx=i;
    const iconKey=t.id.replace('-','_');
    btn.innerHTML=`<span class="nav-icon">${NAV_ICONS[iconKey]||'◦'}</span><span class="nav-label">${NAV_LABELS[iconKey]||t.label}</span>`;
    btn.onclick=()=>{
      document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
      btn.classList.add('active');
      const pane=document.getElementById('pane-'+t.id);
      pane.classList.add('active');
      if(!pane.dataset.built){
        pane.dataset.built='1';
        builders[i](pane);
        makePaneDraggable(pane,'drag-order-'+t.id+'-'+(currentUser?currentUser.id:'g'));
      }
    };
    nav.appendChild(btn);
    // Pane
    const pane=document.createElement('div');
    pane.className='tab-pane'+(i===0?' active':'');
    pane.id='pane-'+t.id;
    content.appendChild(pane);
    if(i===0){
      pane.dataset.built='1';
      builders[0](pane);
      makePaneDraggable(pane,'drag-order-'+t.id+'-'+(currentUser?currentUser.id:'g'));
    }
  });
}

// ─── RESULTADO GESTOR ─────────────────────────────────────────
function buildResultadoGestor(pane){
  var d=DATA;
  var mes=d.mesAbril;
  var metaMes=d.meta;
  var semAtual=d.semAtual;
  var semTotal=d.semTotal;

  // Acumulado do mês
  var oppsAcum=mes.opps;
  var rasAcum=mes.ras;
  var ligAcum=mes.lig;
  var pctMes=Math.min(Math.round((oppsAcum/metaMes)*100),100);
  var proj=semTotal>0?Math.round((oppsAcum/semAtual)*semTotal):0;
  var gapProj=proj-metaMes;
  var paceEsp=Math.round((metaMes/semTotal)*semAtual);

  // Pacing color
  var pacingCol=pctMes>=70?'var(--green)':pctMes>=40?'var(--amber)':'var(--red)';

  // Forecast analysis
  function buildForecastAnalysis(){
    var totalFcstEl=document.getElementById('fcst-resultado-total');
    if(!totalFcstEl) return;
    supaFetch('gp_semanas','order=id.desc&limit=1').then(function(sems){
      if(!sems||!sems[0]) return;
      var semId=sems[0].id;
      return supaFetch('gp_forecast','semana_id=eq.'+semId);
    }).then(function(forecasts){
      if(!forecasts) return;
      var totalFcstOp=forecasts.reduce(function(s,f){return s+(f.fcst_op||0);},0);
      var totalFcstRa=forecasts.reduce(function(s,f){return s+(f.fcst_ra||0);},0);
      var semRestantes=semTotal-semAtual;
      var opsNecessarias=Math.max(0,metaMes-oppsAcum);
      var paceMtd=Math.round((metaMes/semTotal)*semAtual);
      var gapPace=oppsAcum-paceMtd;
      var opsNeedWeek=semRestantes>0?Math.ceil(opsNecessarias/semRestantes):opsNecessarias;
      var rasNeedWeek=Math.ceil(opsNeedWeek/0.3); // ~30% RA→OP
      var fcstSuficiente=totalFcstOp>=opsNeedWeek;
      var gap=totalFcstOp-opsNeedWeek;
      var icone=fcstSuficiente?'✅':'⚠️';
      var paceMsg=gapPace>=0
        ?'No pace ('+oppsAcum+'/'+paceMtd+' MTD). Precisa de <strong>'+opsNeedWeek+' opps/semana</strong> para manter.'
        :'Abaixo do pace (<strong>'+oppsAcum+'/'+paceMtd+' MTD</strong>). Precisa de <strong>'+opsNeedWeek+' opps</strong> ou <strong>'+rasNeedWeek+' RAs</strong> no forecast semanal para voltar ao pace (meta: '+metaMes+').';

      // Find BDRs with low forecast
      var lowFcstBdrs=[];
      DATA.bdrs.forEach(function(bdr){
        var f=forecasts.find(function(x){return x.bdr_id===bdr.id;});
        var needPerBdr=Math.max(0,Math.ceil(opsNeedWeek/DATA.bdrs.length));
        if(!f||(f.fcst_op||0)<needPerBdr){
          lowFcstBdrs.push(bdr.name.split(' ')[0]+(f?(' (fcst '+f.fcst_op+')'):'(sem forecast)'));
        }
      });

      totalFcstEl.innerHTML='<div style="border-radius:var(--radius-sm);padding:12px 14px;background:'+(fcstSuficiente?'var(--green-bg)':'var(--red-bg)')+';border:1px solid '+(fcstSuficiente?'rgba(22,163,74,0.2)':'rgba(220,38,38,0.2)')+';">'
        +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">'
        +'<div style="font-size:12px;font-weight:700;color:'+(fcstSuficiente?'var(--green)':'var(--red)')+'">'+icone+' Forecast semanal do time</div>'
        +'<div style="font-size:13px;font-weight:700;font-family:\'Inter\',sans-serif;color:'+(fcstSuficiente?'var(--green)':'var(--red)')+'">'+totalFcstOp+' opps · '+totalFcstRa+' RAs</div>'
        +'</div>'
        +'<div style="font-size:11px;color:var(--text);line-height:1.5;margin-bottom:'+(lowFcstBdrs.length>0?'8':'0')+'px">'+paceMsg+'</div>'
        +(lowFcstBdrs.length>0?'<div style="font-size:10px;color:'+(fcstSuficiente?'var(--green)':'var(--red)')+'">BDRs abaixo: '+lowFcstBdrs.join(', ')+'</div>':'')
        +'</div>';
    }).catch(function(){
      totalFcstEl.innerHTML='<div style="font-size:11px;color:var(--text3);padding:8px">Forecast indisponível offline.</div>';
    });
  }

  // Semanas breakdown — colunas lado a lado
  var semsHtml='<div style="display:grid;grid-template-columns:repeat('+mes.semanas.length+',1fr);gap:6px">';
  mes.semanas.forEach(function(s){
    var p=metaMes>0?Math.round((s.opps/(metaMes/semTotal))*100):0;
    var c=p>=100?'var(--green)':p>=60?'var(--amber)':'var(--red)';
    var isFuture=s.sem>semAtual;
    var isCurrent=s.sem===semAtual;
    semsHtml+='<div style="background:var(--bg2);border-radius:var(--radius-sm);padding:10px 8px;text-align:center;border:'+(isCurrent?'2px solid var(--accent)':'1px solid var(--border)');+'">'
      +'<div style="font-size:11px;font-weight:700;color:'+(isCurrent?'var(--accent)':'var(--text2)')+';margin-bottom:2px">'+s.label+'</div>'
      +'<div style="font-size:9px;color:var(--text3);margin-bottom:8px">'+s.datas+'</div>'
      +'<div style="font-size:22px;font-weight:700;font-family:\'Inter\',sans-serif;color:'+(isFuture?'var(--text3)':c)+';line-height:1">'+s.opps+'</div>'
      +'<div style="font-size:9px;color:var(--text3);margin-top:2px">opps</div>'
      +'<div id="sem-fcst-'+s.sem+'" style="margin-top:6px;font-size:10px;color:var(--accent)"></div>'
      +'</div>';
  });
  semsHtml+='</div>';

  pane.innerHTML='<div style="font-size:11px;color:var(--text3);margin-bottom:12px;font-family:\'Inter\',sans-serif">Abril 2026 · Semana '+semAtual+' de '+semTotal+'</div>'

    // ── Hero: resultado do mês ──

          var arrow=prevVal!==null?(val>prevVal?' ▲':val<prevVal?' ▼':''):'';

          html+='<div style="width:'+Math.max(pct,3)+'%;height:100%;background:'+colors[idx]+';border-radius:2px"></div>';
          html+='</div></div>';
        });
        html+='</div>';
      });
      html+='</div>';
      wowEl.innerHTML=html;
    }catch(e){console.warn('WoW funil:',e);}
  })();

  // Load forecast analysis async
  buildForecastAnalysis();

// RESUMO = Nova Home — Diagnóstico Estratégico
function buildResumo(pane){
  const d=DATA;

  // ── Cálculos base (usa acumulado do mês + dias úteis) ──
  const oppsAcumMes=d.mesAbril?d.mesAbril.opps:d.funil.oportunidades;
  // Dias úteis abril 2026: S1(31mar-4abr)=3du, S2(7-11)=4du, S3(14-17)=4du, S4(22-25)=4du + extras
  // User conta: 7 dias úteis passados até agora, 21 totais no mês
  const diasUteisPorSem=[0,3,4,4,4]; // index 0=unused, 1=S1, 2=S2, 3=S3, 4=S4
  const diasUteisPassados=diasUteisPorSem.slice(1,DATA.semAtual).reduce((s,v)=>s+v,0); // S1+S2=7
  const diasUteisTotais=21; // dias úteis de abril 2026
  const diasUteisRestantes=diasUteisTotais-diasUteisPassados;
  const mediaDiariaUtil=oppsAcumMes/Math.max(diasUteisPassados,1);
  const proj=Math.round(mediaDiariaUtil*diasUteisTotais);
  const gap=oppsAcumMes-d.meta;
  const gapProj=proj-d.meta;
  const pctAtual=Math.min(Math.round((oppsAcumMes/d.meta)*100),100);
  const pctProj=Math.min(Math.round((proj/d.meta)*100),100);
  const paceEsp=Math.round((d.meta/diasUteisTotais)*diasUteisPassados);

  // ── Conversões reais ──
  const conv={
    aiLc:{real:74,hist:74,meta:57},
    lcRa:{real:26,hist:37,meta:37},  // hist = média histórica
    raOp:{real:30,hist:75,meta:75},
  };

  // ── Alerta: conversão caiu >5pp vs histórico ──
  const alertas=[];
  const bf=d.bdrFunil||{};
  if(conv.lcRa.hist-conv.lcRa.real>=5){
    const impacto=Math.round((conv.lcRa.hist-conv.lcRa.real)/100*d.funil.leadConectado);
    // Per-BDR LC->RA conversion
    const bdrConvs=d.bdrs.map(b=>{const f=bf[b.id]||{};const lc=f.lc||0;return{name:b.name.split(' ')[0],conv:lc>0?Math.round((b.ras/lc)*100):0};}).sort((a,b)=>a.conv-b.conv);
    const bottom2=bdrConvs.slice(0,2).map(b=>`${b.name} (${b.conv}%)`).join(', ');
    const top2=bdrConvs.slice(-2).reverse().map(b=>`${b.name} (${b.conv}%)`).join(', ');
    alertas.push({
      tipo:'LC→RA',label:'LC → RA',
      antes:conv.lcRa.hist,agora:conv.lcRa.real,
      delta:-(conv.lcRa.hist-conv.lcRa.real),
      impacto:-impacto,
      msg:`−${impacto} opps estimadas`,
      bdrDown:bottom2,bdrUp:top2
    });
  }
  if(conv.raOp.hist-conv.raOp.real>=5){
    const impacto=Math.round((conv.raOp.hist-conv.raOp.real)/100*d.funil.reuniaoAgendada);
    const bdrConvs=d.bdrs.filter(b=>b.ras>0).map(b=>({name:b.name.split(' ')[0],conv:Math.round((b.opps/b.ras)*100)})).sort((a,b)=>a.conv-b.conv);
    const bdrZero=d.bdrs.filter(b=>b.ras>0&&b.opps===0).map(b=>b.name.split(' ')[0]);
    const bottom2=(bdrZero.length>0?bdrZero:bdrConvs.slice(0,2).map(b=>b.name)).slice(0,2).join(', ');
    const top2=bdrConvs.slice(-2).reverse().map(b=>`${b.name} (${b.conv}%)`).join(', ');
    alertas.push({
      tipo:'RA→OP',label:'RA → OP',
      antes:conv.raOp.hist,agora:conv.raOp.real,
      delta:-(conv.raOp.hist-conv.raOp.real),
      impacto:-impacto,
      msg:`−${impacto} opps estimadas`,
      bdrDown:bottom2,bdrUp:top2
    });
  }

  // ── Diagnóstico: BDRs abaixo da média ──
  const mediaConvLigRa=Math.round(d.bdrs.reduce((s,b)=>s+(b.lig>0?b.ras/b.lig:0),0)/d.bdrs.length*100);
  const bdrsBaixos=[...d.bdrs]
    .filter(b=>b.lig>3)
    .map(b=>({...b,conv:b.lig>0?Math.round((b.ras/b.lig)*100):0}))
    .filter(b=>b.conv<mediaConvLigRa-5)
    .sort((a,b)=>a.conv-b.conv)
    .slice(0,3);

  // ── Alavancas ──
  const totalLig=d.bdrs.reduce((s,b)=>s+b.lig,0);
  const alavancas=[
    {label:'+10% LC→RA',detail:`(${conv.lcRa.real}% → ${conv.lcRa.real+10}%)`,opps:Math.round(d.funil.leadConectado*0.10*0.3),cor:'var(--green)'},

    {label:'−10% desqualif.',detail:`(${d.funil.desqualificados} → ${d.funil.desqualificados-Math.round(d.funil.desqualificados*0.10)})`,opps:Math.round(d.funil.desqualificados*0.10*0.15),cor:'var(--teal)'},
  ].sort((a,b)=>b.opps-a.opps);

  // ── Funil conversões ──
  const funnelConvs=[

    {de:'Conexão',para:'Reunião',pct:conv.lcRa.real,meta:conv.lcRa.meta},
    {de:'Reunião',para:'Oport.',pct:conv.raOp.real,meta:conv.raOp.meta},

    <div style="background:linear-gradient(145deg,${gapProj>=0?'#16a34a 0%,#0f766e 50%,#15803d':'#dc2626 0%,#991b1b 50%,#7f1d1d'} 100%);border-radius:var(--radius);padding:14px 18px;box-shadow:var(--shadow-lg)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div style="font-size:10px;font-weight:700;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.07em">Meta Abril · ${d.meta} opps</div>
        <div style="font-size:10px;font-weight:700;color:rgba(255,255,255,.9);background:rgba(255,255,255,.2);padding:2px 8px;border-radius:20px">${gapProj>=0?'No pace ▲':'Risco ▼'}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px;text-align:center">
        <div>
          <div onclick="showOppsModal()" style="cursor:pointer;font-size:24px;font-weight:700;font-family:\'Inter\',sans-serif;color:white;line-height:1;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:3px">${oppsAcumMes}</div>
          <div style="font-size:9px;color:rgba(255,255,255,.6);margin-top:2px">Atual (mês)</div>
        </div>
        <div style="border-left:1px solid rgba(255,255,255,.2);border-right:1px solid rgba(255,255,255,.2)">
          <div style="font-size:24px;font-weight:700;font-family:\'Inter\',sans-serif;color:white;line-height:1">${proj}</div>
          <div style="font-size:9px;color:rgba(255,255,255,.6);margin-top:2px">Projeção</div>
        </div>
        <div>
          <div style="font-size:24px;font-weight:700;font-family:\'Inter\',sans-serif;color:${gapProj>=0?'#bbf7d0':'#fecaca'};line-height:1">${gapProj>=0?'+':''}${gapProj}</div>

        </div>
      </div>
      <div style="height:5px;background:rgba(255,255,255,.2);border-radius:3px;overflow:hidden;position:relative;margin-bottom:4px">
        <div style="position:absolute;left:0;top:0;height:100%;width:${Math.round((paceEsp/d.meta)*100)}%;background:rgba(255,255,255,.3);border-radius:3px"></div>
        <div style="position:absolute;left:0;top:0;height:100%;width:${pctAtual}%;background:white;border-radius:3px"></div>

      <div style="display:flex;justify-content:space-between;font-size:9px;color:rgba(255,255,255,.5)">

    <!-- FORECAST DA SEMANA -->

    <!-- ═══ BLOCO 2: ALERTAS CRÍTICOS ═══ -->
    ${alertas.length>0?`

  const scored=[...d.bdrs].map(b=>({
    ...b,
    score: b.opps*4 + b.ras*2 + b.lig/10 + b.ativ/100,
    pacing: Math.min(Math.round((b.opps/META)*100),100),
    needed: SEMR>0?Math.ceil((META-b.opps)/SEMR):META-b.opps,

  const top3=scored.slice(0,3);

  // Determina o indicador crítico de cada BDR

    if(b.lig<=4) return {icon:'📞',msg:'Volume crítico de ligações',color:'var(--red)'};

    if(b.opps===0&&b.ras>=3) return {icon:'🤝',msg:'RAs não virando oportunidade — alinhar com AE',color:'var(--amber)'};
    if(b.pacing<25) return {icon:'⚡',msg:`Pace crítico — precisa ${b.needed} opps/sem`,color:'var(--red)'};

              <th style="padding:8px 8px;text-align:center;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-weight:600;white-space:nowrap">RA Ag.</th>
              <th style="padding:8px 8px;text-align:center;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-weight:600;white-space:nowrap">RA Pend.</th>
              <th style="padding:8px 8px;text-align:center;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-weight:600;white-space:nowrap">AI→OP%</th>
              <th style="padding:8px 8px;text-align:center;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-weight:600">Lig.</th>
              <th style="padding:8px 8px;text-align:center;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-weight:600">Ativ.</th>
              <th style="padding:8px 10px;text-align:center;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-weight:600">Pacing</th>
            </tr>
          </thead>
          <tbody id="ranking-rows"></tbody>
        </table>
      </div>

    </div>`;

  // Ranking table
  const rkEl=document.getElementById('ranking-rows');
  scored.forEach((b,i)=>{
    const pc=b.pacing>=70?'var(--green)':b.pacing>=30?'var(--amber)':'var(--red)';
    const isTop=i<3, isBot=i>=scored.length-3;
    const bdrData=DATA.bdrs.find(x=>x.id===b.id);
    const raPend=DATA.raPendentes?DATA.raPendentes[b.id]||0:0;
    // AI→OP conversion: opps / abordagemIniciada * 100 (using bdrFunil)
    const funil=DATA.bdrFunil[b.id]||{};
    const aiOp=funil.ai>0?((funil.opps||b.opps)/funil.ai*100).toFixed(1):'—';
    const rowBg=isTop?'rgba(22,163,74,0.04)':isBot?'rgba(220,38,38,0.04)':'';
    const photoHtml=bdrData&&bdrData.photo
      ?`<img src="${bdrData.photo}" style="width:24px;height:24px;border-radius:50%;object-fit:cover;flex-shrink:0;">`
      :`<div style="width:24px;height:24px;border-radius:50%;background:${b.bg};color:${b.color};display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0">${b.id}</div>`;
    rkEl.innerHTML+=`<tr style="border-bottom:1px solid var(--border);background:${rowBg}">
      <td style="padding:10px 10px;font-size:10px;color:var(--text3);font-weight:600">${i+1}</td>
      <td style="padding:10px 10px">
        <div style="display:flex;align-items:center;gap:7px">
          ${photoHtml}
          <span style="font-size:12px;font-weight:600;color:${isTop?'var(--green)':isBot?'var(--red)':'var(--text)'}">${b.name.split(' ')[0]}</span>
        </div>
      </td>
      <td onclick="showOppsModal('${b.id}')" style="cursor:pointer;padding:10px 8px;text-align:center;font-size:13px;font-family:\'Inter\',sans-serif;font-weight:700;color:${b.opps>0?'var(--green)':'var(--text3)'};text-decoration:${b.opps>0?'underline':'none'};text-decoration-style:dotted">${b.opps||'—'}</td>
      <td style="padding:10px 8px;text-align:center" id="fcst-rank-${b.id}"><span style="font-size:10px;color:var(--text3)">…</span></td>
      <td style="padding:10px 8px;text-align:center;font-size:13px;font-family:\'Inter\',sans-serif;font-weight:700;color:${b.ras>=3?'var(--green)':b.ras>=1?'var(--amber)':'var(--red)'}">${b.ras}</td>
      <td style="padding:10px 8px;text-align:center;font-size:13px;font-family:\'Inter\',sans-serif;font-weight:700;color:${raPend>0?'var(--amber)':'var(--text3)'}">${raPend>0?raPend:'—'}</td>
      <td style="padding:10px 8px;text-align:center;font-size:12px;font-family:\'Inter\',sans-serif;font-weight:600;color:${aiOp!=='—'&&parseFloat(aiOp)>=5?'var(--green)':aiOp!=='—'?'var(--amber)':'var(--text3)'}">${aiOp!=='—'?aiOp+'%':aiOp}</td>
      <td style="padding:10px 8px;text-align:center;font-size:13px;font-family:\'Inter\',sans-serif;font-weight:700;color:${b.lig>=20?'var(--green)':b.lig>=10?'var(--amber)':'var(--red)'}">${b.lig}</td>
      <td style="padding:10px 8px;text-align:center;font-size:12px;font-family:\'Inter\',sans-serif;color:var(--text2)">${b.ativ}</td>
      <td style="padding:10px 10px">
        <div style="display:flex;flex-direction:column;align-items:center;gap:2px">
          <div style="height:4px;width:44px;background:var(--bg3);border-radius:2px;overflow:hidden">
            <div style="width:${b.pacing}%;height:100%;background:${pc};border-radius:2px"></div>
          </div>
          <span style="font-size:9px;font-family:\'Inter\',sans-serif;color:${pc};font-weight:700">${b.pacing}%</span>
        </div>
      </td>
    </tr>`;
  });

  // Load forecast table async
  loadGestorForecast();
  loadForecastHistory();
}

async function loadGestorForecast(forceSemId){
  const tbody=document.getElementById('forecast-table-body');
  if(!tbody) return;
  try{
    const allSemanas=await supaFetch('gp_semanas','order=id.asc');
    if(!allSemanas||!allSemanas.length){tbody.innerHTML='<tr><td colspan="5" style="padding:12px;text-align:center;font-size:12px;color:var(--text3)">Sem semana ativa.</td></tr>';return;}
    const semId=forceSemId||allSemanas.find(s=>s.sem_atual===DATA.semAtual)?.id||allSemanas[allSemanas.length-1].id;
    // Render semana selector above the table
    var selectorEl=document.getElementById('gestor-fcst-selector');
    if(selectorEl){
      selectorEl.innerHTML=allSemanas.map(s=>{
        const isActive=s.id===semId;
        const isCur=s.sem_atual===DATA.semAtual;
        return `<button onclick="loadGestorForecast(${s.id})" style="font-size:11px;font-weight:${isActive?'700':'500'};padding:5px 12px;border-radius:20px;border:${isActive?'2px solid var(--accent)':'1px solid var(--border)'};background:${isActive?'var(--accent-light)':'transparent'};color:${isActive?'var(--accent)':'var(--text3)'};cursor:pointer;font-family:'Inter',sans-serif">S${s.sem_atual}${isCur?' ●':''}</button>`;
      }).join('');
    }
    const forecasts=await supaFetch('gp_forecast',`semana_id=eq.${semId}&order=bdr_nome.asc`);

    if(!forecasts||forecasts.length===0){
      tbody.innerHTML='<tr><td colspan="5" style="padding:16px;text-align:center;font-size:12px;color:var(--text3)">Nenhum BDR enviou o forecast ainda.</td></tr>';
      return;
    }

    // Map real opps from DATA
    tbody.innerHTML='';
    let totalFcstOp=0, totalRealOp=0;
    DATA.bdrs.forEach(bdr=>{
      const f=forecasts.find(x=>x.bdr_id===bdr.id);
      const realOp=bdr.opps||0;
      if(f) totalFcstOp+=f.fcst_op||0;
      totalRealOp+=realOp;
      const ating=f&&f.fcst_op>0?Math.round((realOp/f.fcst_op)*100):null;
      const atingColor=ating===null?'var(--text3)':ating>=100?'var(--green)':ating>=70?'var(--amber)':'var(--red)';
      const photoHtml=bdr.photo
        ?`<img src="${bdr.photo}" style="width:24px;height:24px;border-radius:50%;object-fit:cover;flex-shrink:0;">`
        :`<div style="width:24px;height:24px;border-radius:50%;background:${bdr.bg};color:${bdr.color};display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0">${bdr.id}</div>`;
      tbody.innerHTML+=`<tr style="border-bottom:1px solid var(--border)">
        <td style="padding:10px 12px">
          <div style="display:flex;align-items:center;gap:8px">
            ${photoHtml}
            <span style="font-size:12px;font-weight:600;color:var(--text)">${bdr.name.split(' ')[0]}</span>
            ${!f?`<span style="font-size:9px;color:var(--text3);background:var(--bg3);padding:1px 6px;border-radius:10px">pendente</span>`:''}
          </div>
        </td>
        <td style="padding:10px 8px;text-align:center">
          <span style="font-size:13px;font-family:\'Inter\',sans-serif;font-weight:700;color:${f?'var(--accent)':'var(--text3)'}">${f?f.fcst_op:'—'}</span>
          ${f&&f.editado_apos_planejamento?'<div style="font-size:8px;font-weight:700;color:var(--amber);margin-top:1px">✎ editado</div>':''}
        </td>
        <td style="padding:10px 8px;text-align:center;font-size:13px;font-family:\'Inter\',sans-serif;font-weight:700;color:${realOp>0?'var(--green)':'var(--text3)'}">${realOp||'—'}</td>
        <td style="padding:10px 10px;text-align:center">
          ${ating!==null
            ?`<span style="font-size:12px;font-weight:700;font-family:\'Inter\',sans-serif;color:${atingColor}">${ating}%</span>`
            :'<span style="font-size:12px;color:var(--text3)">—</span>'}
        </td>
        <td style="padding:6px 6px;text-align:center" id="fcst-status-${bdr.id}">
          ${f?`<div style="display:flex;flex-direction:column;align-items:center;gap:3px">
            <span style="font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;background:${(f.status||'aguardando')==='aprovado'?'var(--green-bg)':((f.status||'aguardando')==='reflita'?'var(--red-bg)':'var(--amber-bg)')};color:${(f.status||'aguardando')==='aprovado'?'var(--green)':((f.status||'aguardando')==='reflita'?'var(--red)':'var(--amber)')}">${(f.status||'aguardando')==='aprovado'?'Aprovado':(f.status||'aguardando')==='reflita'?'Reflita':'Aguardando'}</span>
            <div style="display:flex;gap:3px">
              <button onclick="approveForecast(${f.id},'${bdr.id}')" style="font-size:8px;padding:2px 5px;border:1px solid var(--green);color:var(--green);background:transparent;border-radius:6px;cursor:pointer" title="Aprovar">✓</button>
              <button onclick="showReflectInput(${f.id},'${bdr.id}')" style="font-size:8px;padding:2px 5px;border:1px solid var(--red);color:var(--red);background:transparent;border-radius:6px;cursor:pointer" title="Pedir reflexão">↺</button>
              <button onclick="resetForecast(${f.id},'${bdr.id}')" style="font-size:8px;padding:2px 5px;border:1px solid var(--text3);color:var(--text3);background:transparent;border-radius:6px;cursor:pointer" title="Zerar forecast">🗑</button>
            </div>
            ${(f.status||'aguardando')==='reflita'&&f.justificativa?`<div style="font-size:8px;color:var(--red);max-width:80px;word-wrap:break-word;margin-top:2px">"${f.justificativa}"</div>`:''}
            <div id="reflect-input-${bdr.id}" style="display:none"></div>
          </div>`:'<span style="font-size:9px;color:var(--text3)">—</span>'}
        </td>
      </tr>`;
    });

    // Total row
    const totalAting=totalFcstOp>0?Math.round((totalRealOp/totalFcstOp)*100):0;
    tbody.innerHTML+=`<tr style="background:var(--bg3);border-top:2px solid var(--border)">
      <td style="padding:10px 12px;font-size:11px;font-weight:700;color:var(--text)">TOTAL</td>
      <td style="padding:10px 8px;text-align:center;font-size:13px;font-weight:700;font-family:\'Inter\',sans-serif;color:var(--accent)">${totalFcstOp}</td>
      <td style="padding:10px 8px;text-align:center;font-size:13px;font-weight:700;font-family:\'Inter\',sans-serif;color:var(--green)">${totalRealOp}</td>
      <td style="padding:10px 10px;text-align:center;font-size:12px;font-weight:700;font-family:\'Inter\',sans-serif;color:${totalAting>=100?'var(--green)':totalAting>=70?'var(--amber)':'var(--red)'}">${totalAting}%</td>
      <td style="padding:10px 6px;text-align:center"></td>
    </tr>`;

    // Render S1-S4 forecast grid (estilo Meu Resultado)
    var gridEl=document.getElementById('forecast-semanas-grid');
    if(gridEl){
      try{
        var allSems=await supaFetch('gp_semanas','order=id.asc');
        var allFcsts=[];
        var allResults=[];
        for(var s of (allSems||[])){
          var fc=await supaFetch('gp_forecast','semana_id=eq.'+s.id);
          var rs=await supaFetch('gp_bdr_resultados','semana_id=eq.'+s.id);
          allFcsts.push({sem:s,fcsts:fc||[]});
          allResults.push({sem:s,results:rs||[]});
        }
        var semTotal=DATA.semTotal;
        var gh='<div style="display:grid;grid-template-columns:repeat('+semTotal+',1fr);gap:6px">';
        for(var si=1;si<=semTotal;si++){
          var semData=allFcsts.find(x=>x.sem.sem_atual===si);
          var resData=allResults.find(x=>x.sem.sem_atual===si);
          var isCurrent=si===DATA.semAtual;
          var isFuture=si>DATA.semAtual;
          var totalFcst=semData?semData.fcsts.reduce((s,f)=>s+(f.fcst_op||0),0):0;
          var totalReal=resData?resData.results.reduce((s,r)=>s+(r.opps||0),0):0;
          var diff=totalReal-totalFcst;
          var diffCol=diff>=0?'var(--green)':'var(--red)';
          gh+='<div style="background:var(--bg2);border-radius:var(--radius-sm);padding:10px 8px;text-align:center;border:'+(isCurrent?'2px solid var(--accent)':'1px solid var(--border)')+'">';
          gh+='<div style="font-size:11px;font-weight:700;color:'+(isCurrent?'var(--accent)':'var(--text2)')+';margin-bottom:6px">S'+si+'</div>';
          gh+='<div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 4px;text-align:center;margin-bottom:4px">';
          gh+='<div style="font-size:8px;color:var(--text3);margin-bottom:2px">Fcst</div>';
          gh+='<div style="font-size:20px;font-weight:700;font-family:\'Inter\',sans-serif;color:var(--text)">'+(isFuture&&totalFcst===0?'—':totalFcst)+'</div>';
          gh+='</div>';
          gh+='<div style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:7px 4px;text-align:center;margin-bottom:4px">';
          gh+='<div style="font-size:8px;color:var(--text3);margin-bottom:2px">Real</div>';
          gh+='<div style="font-size:20px;font-weight:700;font-family:\'Inter\',sans-serif;color:var(--text)">'+(isFuture?'—':totalReal)+'</div>';
          gh+='</div>';
          if(!isFuture){
            gh+='<div style="font-size:13px;font-weight:700;font-family:\'Inter\',sans-serif;color:'+diffCol+'">'+(diff>=0?'+':'')+diff+'</div>';
          }
          gh+='</div>';
        }
        gh+='</div>';
        gridEl.innerHTML=gh;
      }catch(e){gridEl.innerHTML='<div style="font-size:11px;color:var(--text3);text-align:center">Indisponível</div>';}
    }

    // Populate ranking fcst cells
    DATA.bdrs.forEach(function(bdr){
      const f=forecasts.find(function(x){return x.bdr_id===bdr.id;});
      const el=document.getElementById('fcst-rank-'+bdr.id);
      if(!el) return;
      if(f){
        const diff=bdr.opps-(f.fcst_op||0);
        const col=diff>=0?'var(--green)':diff>=-2?'var(--amber)':'var(--red)';
        el.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;gap:1px">'
          +'<span style="font-size:12px;font-family:\'Inter\',sans-serif;font-weight:700;color:var(--accent)">'+f.fcst_op+'</span>'
          +'<span style="font-size:9px;font-family:\'Inter\',sans-serif;color:'+col+'">'+(diff>=0?'+':'')+diff+'</span>'
          +'</div>';
      } else {
        el.innerHTML='<span style="font-size:10px;color:var(--text3)">—</span>';
      }
    });

    // Show how many submitted
    const pending=DATA.bdrs.length-forecasts.length;
    if(pending>0){
      const note=document.createElement('div');
      note.style.cssText='font-size:11px;color:var(--amber);padding:8px 12px;background:#fffbeb;border-top:1px solid #fde68a;text-align:center';
      note.textContent=`${pending} BDR(s) ainda não enviaram o forecast desta semana.`;
      document.querySelector('#forecast-table-body')?.closest('.card')?.appendChild(note);
    }
  }catch(e){
    tbody.innerHTML=`<tr><td colspan="7" style="padding:12px;text-align:center;font-size:12px;color:var(--text3)">Forecast indisponível offline.</td></tr>`;
  }
}

// ── Forecast History WoW ──
async function loadForecastHistory(){
  const el=document.getElementById('forecast-history-table');
  if(!el) return;
  try{
    const allSems=await supaFetch('gp_semanas','order=id.asc');
    if(!allSems||allSems.length===0){el.innerHTML='Sem dados.';return;}
    // Fetch forecasts and results for all semanas
    const allData=[];
    for(const sem of allSems){
      const fcsts=await supaFetch('gp_forecast',`semana_id=eq.${sem.id}`);
      const results=await supaFetch('gp_bdr_resultados',`semana_id=eq.${sem.id}`);
      allData.push({sem,fcsts:fcsts||[],results:results||[]});
    }
    // Score BDRs for ranking
    const scored=[...DATA.bdrs].map(b=>{
      let totalFcst=0,totalReal=0;
      allData.forEach(d=>{
        const f=d.fcsts.find(x=>x.bdr_id===b.id);
        const r=d.results.find(x=>x.bdr_id===b.id);
        if(f) totalFcst+=f.fcst_op||0;
        if(r) totalReal+=r.opps||0;
      });
      return {...b,totalFcst,totalReal,acc:totalFcst>0?Math.round((totalReal/totalFcst)*100):0};
    }).sort((a,b)=>b.acc-a.acc);

    var html='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;min-width:400px;font-family:\'Inter\',sans-serif">';
    html+='<thead><tr style="background:var(--bg3);border-bottom:2px solid var(--border)">';
    html+='<th style="padding:8px 10px;text-align:left;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-weight:600">BDR</th>';
    allData.forEach(d=>{
      const isCur=d.sem.sem_atual===DATA.semAtual;
      html+=`<th style="padding:8px 4px;text-align:center;font-size:9px;color:${isCur?'var(--accent)':'var(--text3)'};text-transform:uppercase;letter-spacing:.05em;font-weight:${isCur?'700':'600'}">S${d.sem.sem_atual} Fcst</th>`;
      html+=`<th style="padding:8px 4px;text-align:center;font-size:9px;color:${isCur?'var(--accent)':'var(--text3)'};text-transform:uppercase;letter-spacing:.05em;font-weight:${isCur?'700':'600'}">S${d.sem.sem_atual} Real</th>`;
    });
    html+='<th style="padding:8px 8px;text-align:center;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-weight:600">Acur.</th>';
    html+='</tr></thead><tbody>';
    scored.forEach((bdr,i)=>{
      const isTop=i<3,isBot=i>=scored.length-3;
      const rowBg=isTop?'rgba(22,163,74,0.04)':isBot?'rgba(220,38,38,0.04)':'';
      const photoHtml=bdr.photo
        ?`<img src="${bdr.photo}" style="width:22px;height:22px;border-radius:50%;object-fit:cover;flex-shrink:0">`
        :`<div style="width:22px;height:22px;border-radius:50%;background:${bdr.bg};color:${bdr.color};display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0">${bdr.id}</div>`;
      html+=`<tr style="border-bottom:1px solid var(--border);background:${rowBg}">`;
      html+=`<td style="padding:8px 10px"><div style="display:flex;align-items:center;gap:6px">${photoHtml}<span style="font-size:11px;font-weight:600;color:${isTop?'var(--green)':isBot?'var(--red)':'var(--text)'}">${bdr.name.split(' ')[0]}</span></div></td>`;
      allData.forEach(d=>{
        const f=d.fcsts.find(x=>x.bdr_id===bdr.id);
        const r=d.results.find(x=>x.bdr_id===bdr.id);
        const fcst=f?f.fcst_op:null;
        const real=r?r.opps:null;
        const col=fcst!==null&&real!==null?(real>=fcst?'var(--green)':'var(--red)'):'var(--text3)';
        html+=`<td style="padding:8px 4px;text-align:center;font-size:12px;font-weight:600;color:var(--accent)">${fcst!==null?fcst:'—'}</td>`;
        html+=`<td style="padding:8px 4px;text-align:center;font-size:12px;font-weight:700;color:${col}">${real!==null?real:'—'}</td>`;
      });
      const accCol=bdr.acc>=100?'var(--green)':bdr.acc>=50?'var(--amber)':'var(--red)';
      html+=`<td style="padding:8px 8px;text-align:center"><span style="font-size:11px;font-weight:700;padding:2px 6px;border-radius:8px;background:${bdr.acc>=100?'var(--green-bg)':bdr.acc>=50?'var(--amber-bg)':'var(--red-bg)'};color:${accCol}">${bdr.totalFcst>0?bdr.acc+'%':'—'}</span></td>`;
      html+='</tr>';
    });
    html+='</tbody></table></div>';
    el.innerHTML=html;
  }catch(e){el.innerHTML='Indisponível offline.';console.warn('Forecast history:',e);}
}

// ── Keep Forecast (BDR chooses to keep after "reflita") ──
async function keepForecast(forecastId, bdrId){
  try{
    await fetch(`${SUPA_URL}/rest/v1/gp_forecast?id=eq.${forecastId}`,{
      method:'PATCH',
      headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({status:'aguardando',justificativa:null,status_changed_at:new Date().toISOString(),status_changed_by:bdrId})
    });
    var bdr=DATA.bdrs.find(b=>b.id===bdrId);
    if(bdr) loadBDRForecast(bdr);
  }catch(e){console.warn('Keep forecast error:',e);}
}

// ── Approve All Forecasts (from Resumo card) ──
async function approveAllForecasts(semId){
  if(!confirm('Aprovar o forecast de todos os BDRs para esta semana?')) return;
  try{
    const fcsts=await supaFetch('gp_forecast',`semana_id=eq.${semId}`);
    if(!fcsts) return;
    for(const f of fcsts){
      if(f.status!=='aprovado'){
        await fetch(`${SUPA_URL}/rest/v1/gp_forecast?id=eq.${f.id}`,{
          method:'PATCH',
          headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},
          body:JSON.stringify({status:'aprovado',status_changed_at:new Date().toISOString(),status_changed_by:currentUser?currentUser.id:'GESTOR'})
        });
      }
    }
    var btn=document.getElementById('btn-approve-all-fcst');
    if(btn) btn.outerHTML='<div style="font-size:10px;color:#bbf7d0;font-weight:600">✅ Forecast aprovado</div>';
  }catch(e){console.warn('Approve all error:',e);}
}

// ── Reset Forecast ──
async function resetForecast(forecastId, bdrId){
  if(!confirm('Zerar o forecast deste BDR?')) return;
  try{
    await fetch(`${SUPA_URL}/rest/v1/gp_forecast?id=eq.${forecastId}`,{
      method:'PATCH',
      headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({fcst_lc:0,fcst_ra:0,fcst_op:0,status:'aguardando',justificativa:null,status_changed_at:new Date().toISOString(),status_changed_by:currentUser?currentUser.id:'GESTOR'})
    });

    loadForecastHistory();

async function submitReflection(forecastId, bdrId){

  try{
    await fetch(`${SUPA_URL}/rest/v1/gp_forecast?id=eq.${forecastId}`,{
      method:'PATCH',
      headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({status:'reflita',justificativa:text.trim(),status_changed_at:new Date().toISOString(),status_changed_by:currentUser?currentUser.id:'GESTOR'})
    });

  }catch(e){console.warn('Reflect error:',e);}
}

function toggleMesCard(id, hdr){

function toggleAEList(aeId){
  var list=document.getElementById('list-'+aeId);
  var btn=document.getElementById(aeId);
  if(!list||!btn) return;
  var isOpen=list.style.display!=='none';
  list.style.display=isOpen?'none':'block';

  btn.style.color=isOpen?'var(--text)':'var(--accent)';
