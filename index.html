// ─── MINHA PERFORMANCE (BDR) ─────────────────────────────────
function buildPerformanceBDR(pane, bdr){
  var h=DATA.hist3m;
  var b=h&&h.bdrs&&h.bdrs[bdr.id];
  if(!b){
    pane.innerHTML='<div style="padding:20px;text-align:center;color:#8892a0;font-family:\'Inter\',sans-serif;font-size:13px">Dados históricos não disponíveis.</div>';
    return;
  }
  var bench=DATA.benchmarks||{aiLc:57,lcRa:37,raOp:75,ligDia:10,noshow:1.5};
  var meta=h.meta||12;
  var meses=h.meses||['Fev','Mar','Abr'];
  var months=[b.m1,b.m2,b.m3];

  // Base calcs
  var pcts=months.map(function(m){return meta>0?Math.round((m.opps/meta)*100):0;});
  var avg=Math.round(pcts.reduce(function(s,p){return s+p;},0)/pcts.length);
  var best=Math.max.apply(null,pcts); var bestIdx=pcts.indexOf(best);
  var worst=Math.min.apply(null,pcts); var worstIdx=pcts.indexOf(worst);
  var trend=pcts[2]>pcts[0]?'subindo':pcts[2]<pcts[0]?'caindo':'estável';
  var trendIcon=trend==='subindo'?'↑':trend==='caindo'?'↓':'→';
  var trendCol=trend==='subindo'?'var(--green)':trend==='caindo'?'var(--red)':'var(--amber)';
  var variance=Math.sqrt(months.map(function(m,i){return Math.pow(pcts[i]-avg,2);}).reduce(function(s,v){return s+v;},0)/months.length);
  var consistency=variance<=10?'Consistente':variance<=25?'Moderado':'Instável';
  var consistencyCol=variance<=10?'var(--green)':variance<=25?'var(--amber)':'var(--red)';

  // Profile
  var profile,profileCol,profileDesc;
  if(avg>=90&&variance<=15){profile='Alta Performance Consistente';profileCol='var(--green)';profileDesc='Entrega acima da meta com regularidade. Referência para o time.';}
  else if(avg>=70&&variance>20){profile='Inconsistente com Picos';profileCol='var(--amber)';profileDesc='Tem capacidade mas não sustenta o ritmo. Foco em processos.';}
  else if(avg>=70){profile='Bom com Margem de Crescimento';profileCol='var(--accent)';profileDesc='Entrega sólida. Pequenos ajustes trazem grandes ganhos.';}
  else if(variance<=15){profile='Consistente Abaixo da Meta';profileCol='var(--red)';profileDesc='Regularidade negativa. Revisão estrutural necessária.';}
  else{profile='Em Desenvolvimento';profileCol='var(--amber)';profileDesc='Alta variação e resultado abaixo. Foco em fundamentos.';}

  // Indicators
  var indicators=[
    {label:'AI→LC',bench:bench.aiLc,vals:months.map(function(m){return m.aiLc;}),unit:'%',lower:false},
    {label:'LC→RA',bench:bench.lcRa,vals:months.map(function(m){return m.lcRa;}),unit:'%',lower:false},
    {label:'RA→OP',bench:bench.raOp,vals:months.map(function(m){return m.raOp;}),unit:'%',lower:false},
    {label:'Lig/sem',bench:40,vals:months.map(function(m){return m.lig;}),unit:'',lower:false},
    {label:'No-show',bench:bench.noshow,vals:months.map(function(m){return m.noshow;}),unit:'',lower:true},
  ];
  var gaps=indicators.filter(function(i){return !i.lower;}).map(function(ind){
    var a=Math.round(ind.vals.reduce(function(s,v){return s+v;},0)/ind.vals.length);
    return {label:ind.label,avgVal:a,bench:ind.bench,gap:a-ind.bench,unit:ind.unit};
  }).sort(function(a,b){return a.gap-b.gap;});
  var mainGap=gaps[0];

  var pdcaMap={
    'AI→LC':['Revisar pitch de abertura — primeiros 30s decisivos','Aumentar tentativas por lead (mínimo 6 touchpoints)','Escutar calls de alto AI→LC do time no MeetRox'],
    'LC→RA':['Trabalhar objeções de agendamento com role play','Criar urgência clara na conexão','Alinhar proposta de valor antes da ligação'],
    'RA→OP':['Briefing do lead antes de cada reunião','Alinhar com AE critérios de qualificação','Revisar ICP da lista de prospecção'],
    'Lig/sem':['Bloquear 2h diárias para ligações no calendário','Reduzir atividades passivas','Meta: '+bench.ligDia+' ligações conectadas por dia'],
  };
  var baseActions=pdcaMap[mainGap.label]||['Revisar processo de prospecção','Aumentar volume de atividades','Alinhar com gestor'];

  var goodMonths=months.filter(function(m){return meta>0&&(m.opps/meta)>=0.8;});
  var badMonths=months.filter(function(m){return meta>0&&(m.opps/meta)<0.6;});
  var goodPatt=goodMonths.length>0?'Nos meses bons: média de '+Math.round(goodMonths.reduce(function(s,m){return s+m.lig;},0)/goodMonths.length)+' ligações e '+Math.round(goodMonths.reduce(function(s,m){return s+m.aiLc;},0)/goodMonths.length)+'% AI→LC':'Sem meses acima de 80% no período';
  var badPatt=badMonths.length>0?'Nos meses ruins: queda em ligações e AI→LC — padrão de volume baixo':'Sem meses críticos no período';

  var actionsKey='perf-actions-'+bdr.id;

  // ── Stacked bar chart — estilo Salesforce/Gupy ──
  function buildBarChart(){
    var W=300, H=130, pL=8, pR=8, pT=22, pB=30;
    var pw=W-pL-pR, ph=H-pT-pB, n=meses.length;
    var gw=pw/n;
    var bw=Math.min(gw*0.55, 32);
    var maxV=110; // % scale

    function by(v){ return pT+ph - Math.max(0,(v/maxV))*ph; }

    // baseline
    var base='<line x1="'+pL+'" y1="'+(pT+ph)+'" x2="'+(W-pR)+'" y2="'+(pT+ph)+'" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>';

    var bars=meses.map(function(m,i){
      var cx = pL + (i+0.5)*gw;
      var bx = (cx - bw/2).toFixed(1);
      var rp = pcts[i];        // realizado %
      var mp = 100;            // meta = 100%
      var gap_pct = Math.max(0, mp - rp); // gap (não atingido)

      // stacked: bottom = realizado (azul escuro), top = gap (salmão)
      // If rp >= 100, only blue bar
      var realH = (ph * (Math.min(rp,100)/maxV)).toFixed(1);
      var realY = by(Math.min(rp,100)).toFixed(1);

      var gapH  = (ph * (gap_pct/maxV)).toFixed(1);
      var gapY  = (parseFloat(realY) - parseFloat(gapH)).toFixed(1);

      var totalH = (parseFloat(realH) + parseFloat(gapH)).toFixed(1);

      // label at top
      var labelY = (parseFloat(topY) - 5).toFixed(1);
      var labelTxt = rp+'%';
      var labelCol = rp>=100?'rgba(34,197,94,0.9)':rp>=70?'rgba(245,158,11,0.9)':'rgba(239,68,68,0.9)';

      // month label
      var mY = (pT+ph+14).toFixed(1);

      return (gap_pct>0
        ? '<rect x="'+bx+'" y="'+gapY+'" width="'+bw+'" height="'+gapH+'" rx="3 3 0 0" fill="rgba(239,99,78,0.75)"/>'
        : '')
        +'<rect x="'+bx+'" y="'+realY+'" width="'+bw+'" height="'+realH+'" rx="'+(gap_pct>0?'0':'3 3 0 0')+'" fill="rgba(45,100,160,0.82)"/>'
        +'<text x="'+cx.toFixed(1)+'" y="'+labelY+'" text-anchor="middle" font-size="6" font-weight="700" font-family="Inter,sans-serif" fill="'+labelCol+'">'+labelTxt+'</text>'
        +'<text x="'+cx.toFixed(1)+'" y="'+mY+'" text-anchor="middle" font-size="6" font-family="Inter,sans-serif" fill="rgba(156,163,175,0.75)">'+m+'</text>';
    }).join('');

    // legend
    var legY = H-4;
    var leg = '<rect x="'+pL+'" y="'+(legY-7)+'" width="8" height="8" rx="1" fill="rgba(239,99,78,0.75)"/>'
      +'<text x="'+(pL+11)+'" y="'+legY+'" font-size="6" font-family="Inter,sans-serif" fill="rgba(156,163,175,0.8)">Não atingido</text>'
      +'<rect x="'+(pL+80)+'" y="'+(legY-7)+'" width="8" height="8" rx="1" fill="rgba(45,100,160,0.82)"/>'
      +'<text x="'+(pL+93)+'" y="'+legY+'" font-size="6" font-family="Inter,sans-serif" fill="rgba(156,163,175,0.8)">Realizado</text>';

    return '<svg width="100%" viewBox="0 0 '+W+' '+H+'" style="overflow:visible">'+base+bars+leg+'</svg>';
  }

  var chartHtml=buildBarChart();

  // ── Render ──
  // ── Render with collapsible + draggable blocks ──
  var perfBlocks=[
    {
      id:'perf-ind',
      title:'Resultados & Indicadores',
      subtitle:'últimos 3 meses',
      open:true,
      html:function(){
        // Meta vs Realizado

          +'<table style="width:100%;border-collapse:collapse;margin-bottom:16px">'

          +'<th style="text-align:center;font-size:9px;color:var(--text3);padding:5px 6px;text-transform:uppercase;font-weight:600">Meta</th>'
          +'<th style="text-align:center;font-size:9px;color:var(--text3);padding:5px 6px;text-transform:uppercase;font-weight:600">Real</th>'
          +'<th style="text-align:center;font-size:9px;color:var(--accent);padding:5px 6px;text-transform:uppercase;font-weight:700">Ating.</th>'

            var bg=p>=100?'var(--green-bg)':p>=70?'var(--amber-bg)':'var(--red-bg)';
            return '<tr style="border-bottom:1px solid var(--border)">'
              +'<td style="padding:8px 6px;font-size:11px;font-weight:600;color:var(--text)">'+m+'</td>'

          +'<div style="padding:10px 12px;background:var(--green-bg);border-radius:var(--radius-sm);border-left:3px solid var(--green)">'
          +'<div style="font-size:9px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;font-family:\'Inter\',sans-serif">Meses bons</div>'
          +'<div style="font-size:12px;color:var(--text);font-family:\'Inter\',sans-serif;line-height:1.5">'+goodPatt+'</div>'
          +'</div>'
          +'<div style="padding:10px 12px;background:var(--red-bg);border-radius:var(--radius-sm);border-left:3px solid var(--red)">'
          +'<div style="font-size:9px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;font-family:\'Inter\',sans-serif">Meses ruins</div>'
          +'<div style="font-size:12px;color:var(--text);font-family:\'Inter\',sans-serif;line-height:1.5">'+badPatt+'</div>'
          +'</div>'
          +'</div>';
      }
    },
    {
      id:'perf-acoes',
      title:'3 Ações prioritárias',
      subtitle:'✦ IA',
      open:true,
      html:function(){
        return '<div style="height:5px;background:#eef0f3;border-radius:3px;overflow:hidden;margin-bottom:8px"><div id="pf-bar" style="height:100%;width:0%;background:var(--green);border-radius:3px;transition:width .4s"></div></div>'
          +'<div style="font-size:10px;color:var(--text3);margin-bottom:10px;font-family:\'Inter\',sans-serif" id="pf-txt">0 de 3 concluídas</div>'
          +'<div id="pf-actions"><div style="padding:14px;text-align:center;color:var(--text3);font-size:12px;font-family:\'Inter\',sans-serif"><div style="width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse 1s infinite;display:inline-block;margin-right:6px"></div>Gerando com IA...</div></div>';
      }
    },
  ];

  // ── Build all blocks as draggable collapsibles ──
  var perfOrderKey='perf-order-'+bdr.id;
  var savedOrder=null;
  try{savedOrder=JSON.parse(localStorage.getItem(perfOrderKey));}catch(e){}
  if(savedOrder&&Array.isArray(savedOrder)){
    var reordered=[];
    savedOrder.forEach(function(id){var b=perfBlocks.find(function(x){return x.id===id;});if(b)reordered.push(b);});
    perfBlocks.forEach(function(b){if(!reordered.find(function(x){return x.id===b.id;}))reordered.push(b);});
    perfBlocks=reordered;
  }

  pane.innerHTML='<div style="font-size:11px;color:var(--text3);margin-bottom:14px;font-family:\'Inter\',sans-serif">Performance · '+meses[0]+'–'+meses[meses.length-1]+' 2026</div>';

  var dragSrc=null;

  perfBlocks.forEach(function(blk){
    var wrap=document.createElement('div');
    wrap.className='card perf-blk';
    wrap.dataset.bid=blk.id;
    wrap.style.cssText='margin-bottom:10px;padding:0;position:relative;transition:opacity .2s;background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border)';
    wrap.draggable=true;

    // Header
    var hdr=document.createElement('div');
    hdr.style.cssText='display:flex;align-items:center;gap:8px;padding:12px 14px;cursor:pointer;user-select:none;border-bottom:1px solid var(--border)';

    // Drag handle
    var handle=document.createElement('span');
    handle.textContent='⠿';
    handle.style.cssText='font-size:14px;color:var(--border2);cursor:grab;flex-shrink:0;touch-action:none';
    handle.onmouseenter=function(){handle.style.color='var(--text2)';};
    handle.onmouseleave=function(){handle.style.color='var(--border2)';};

    var titleEl=document.createElement('span');
    titleEl.style.cssText='font-size:13px;font-weight:700;color:var(--text);flex:1;font-family:\'Inter\',sans-serif;letter-spacing:-.01em';
    titleEl.textContent=blk.title;

    var chev=document.createElement('span');
    chev.style.cssText='font-size:13px;color:var(--text3);flex-shrink:0';
    chev.textContent=blk.open?'▴':'▾';

    if(blk.subtitle){
      var sub=document.createElement('span');
      sub.style.cssText='font-size:9px;color:#8892a0;font-family:\'Inter\',sans-serif;font-weight:400';
      sub.textContent=blk.subtitle;
      hdr.appendChild(handle);
      hdr.appendChild(titleEl);
      hdr.appendChild(sub);
      hdr.appendChild(chev);
    } else {
      hdr.appendChild(handle);
      hdr.appendChild(titleEl);
      hdr.appendChild(chev);
    }

    // Body
    var body=document.createElement('div');
    body.style.cssText='padding:12px 14px 14px;background:var(--bg2);display:'+(blk.open?'block':'none');
    body.innerHTML=blk.html();

    // Toggle on header click (not handle)
    hdr.onclick=function(e){
      if(e.target===handle) return;
      var open=body.style.display!=='none';
      body.style.display=open?'none':'block';
      chev.textContent=open?'▾':'▴';
    };

    // Drag events
    wrap.addEventListener('dragstart',function(e){
      dragSrc=wrap; wrap.style.opacity='0.4'; e.dataTransfer.effectAllowed='move';
    });
    wrap.addEventListener('dragend',function(){
      dragSrc=null; wrap.style.opacity='1';
      document.querySelectorAll('.perf-blk').forEach(function(b){b.style.borderTop='';b.style.borderBottom='';});
      var order=Array.from(pane.querySelectorAll('.perf-blk')).map(function(b){return b.dataset.bid;});
      try{localStorage.setItem(perfOrderKey,JSON.stringify(order));}catch(e){}
    });
    wrap.addEventListener('dragover',function(e){
      e.preventDefault();
      if(!dragSrc||dragSrc===wrap) return;
      document.querySelectorAll('.perf-blk').forEach(function(b){b.style.borderTop='';b.style.borderBottom='';});
      var rect=wrap.getBoundingClientRect();
      if(e.clientY<rect.top+rect.height/2) wrap.style.borderTop='2px solid var(--accent)';
      else wrap.style.borderBottom='2px solid var(--accent)';
    });
    wrap.addEventListener('dragleave',function(){wrap.style.borderTop='';wrap.style.borderBottom='';});
    wrap.addEventListener('drop',function(e){
      e.preventDefault(); wrap.style.borderTop=''; wrap.style.borderBottom='';
      if(!dragSrc||dragSrc===wrap) return;
      var rect=wrap.getBoundingClientRect();
      if(e.clientY<rect.top+rect.height/2) pane.insertBefore(dragSrc,wrap);
      else pane.insertBefore(dragSrc,wrap.nextSibling);
    });

    // Touch drag via handle
    var tClone=null, tOffY=0;
    handle.addEventListener('touchstart',function(e){
      e.stopPropagation(); dragSrc=wrap;
      var t=e.touches[0]; tOffY=t.clientY-wrap.getBoundingClientRect().top;
      tClone=wrap.cloneNode(true);
      tClone.style.cssText='position:fixed;left:'+wrap.getBoundingClientRect().left+'px;top:'+(t.clientY-tOffY)+'px;width:'+wrap.offsetWidth+'px;opacity:.6;z-index:9999;pointer-events:none;box-shadow:0 8px 30px rgba(0,0,0,.25)';
      document.body.appendChild(tClone); wrap.style.opacity='0.35';
    },{passive:true});
    handle.addEventListener('touchmove',function(e){
      if(!tClone) return; e.preventDefault();
      var t=e.touches[0]; tClone.style.top=(t.clientY-tOffY)+'px';
      tClone.style.display='none';
      var el=document.elementFromPoint(t.clientX,t.clientY); tClone.style.display='';
      var target=el?el.closest('.perf-blk'):null;
      document.querySelectorAll('.perf-blk').forEach(function(b){b.style.borderTop='';b.style.borderBottom='';});
      if(target&&target!==wrap){var rect=target.getBoundingClientRect();if(t.clientY<rect.top+rect.height/2)target.style.borderTop='2px solid var(--accent)';else target.style.borderBottom='2px solid var(--accent)';}
    },{passive:false});
    handle.addEventListener('touchend',function(e){
      if(tClone){tClone.remove();tClone=null;} wrap.style.opacity='1';
      document.querySelectorAll('.perf-blk').forEach(function(b){b.style.borderTop='';b.style.borderBottom='';});
      var t=e.changedTouches[0];
      var el=document.elementFromPoint(t.clientX,t.clientY);
      var target=el?el.closest('.perf-blk'):null;
      if(target&&target!==wrap){var rect=target.getBoundingClientRect();if(t.clientY<rect.top+rect.height/2)pane.insertBefore(wrap,target);else pane.insertBefore(wrap,target.nextSibling);}
      dragSrc=null;
      var order=Array.from(pane.querySelectorAll('.perf-blk')).map(function(b){return b.dataset.bid;});
      try{localStorage.setItem(perfOrderKey,JSON.stringify(order));}catch(e){}
    });

    wrap.appendChild(hdr); wrap.appendChild(body);
    pane.appendChild(wrap);
  });


  // ── renderActions + toggle (must be after DOM is built) ──
  var impactCol={'alto':'var(--red)','medio':'var(--amber)','baixo':'var(--green)'};
  var prazoIcons={'esta semana':'📅','próximas 2 semanas':'🗓','30 dias':'📆'};

  function getDoneStates(){
    try{return JSON.parse(localStorage.getItem(actionsKey+'_done'))||[false,false,false];}
    catch(e){return [false,false,false];}
  }

  function updateProgress(){
    var done=getDoneStates().filter(Boolean).length;
    var fill=document.getElementById('pf-bar');
    var txt=document.getElementById('pf-txt');
    if(fill){fill.style.width=Math.round((done/3)*100)+'%';fill.style.background=done===3?'var(--green)':'var(--amber)';}
    if(txt) txt.textContent=done+' de 3 concluída'+(done!==1?'s':'');
  }

  function renderActions(parsed){
    var states=getDoneStates();
    var el=document.getElementById('pf-actions');
    if(!el) return;
    el.innerHTML=parsed.map(function(a,i){
      var done=states[i];
      var titulo=a.titulo||a;
      return '<div style="display:flex;gap:10px;padding:11px 0;border-bottom:1px solid var(--border);opacity:'+(done?'0.6':'1')+'">'
        +'<div style="width:24px;height:24px;border-radius:50%;background:'+(done?'var(--green)':'var(--accent)')+';color:white;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:2px">'+(done?'✓':(i+1))+'</div>'
        +'<div style="flex:1">'
        +'<div style="display:flex;align-items:center;flex-wrap:wrap;gap:5px;margin-bottom:3px">'
        +'<span style="font-size:12px;font-weight:700;color:'+(done?'var(--text3)':'var(--text)')+';font-family:\'Inter\',sans-serif;'+(done?'text-decoration:line-through':'')+'">>'+(a.titulo||a)+'</span>'
        +(a.impacto?'<span style="font-size:9px;font-weight:600;color:'+(impactCol[a.impacto]||'var(--amber)')+';background:var(--bg3);padding:1px 6px;border-radius:8px;font-family:\'Inter\',sans-serif">'+a.impacto+'</span>':'')
        +'</div>'
        +(a.descricao?'<div style="font-size:11px;color:var(--text2);font-family:\'Inter\',sans-serif;line-height:1.4;margin-bottom:4px">'+a.descricao+'</div>':'')
        +'<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px">'
        +(a.prazo?'<span style="font-size:10px;color:#8892a0;font-family:\'Inter\',sans-serif">'+(prazoIcons[a.prazo]||'⏱')+' '+a.prazo+'</span>':'')
        +(done
          ?'<div style="display:flex;align-items:center;gap:6px"><span style="font-size:10px;font-weight:600;color:var(--green);font-family:\'Inter\',sans-serif">✓ Concluído</span><button onclick="window._perfToggle('+i+')" style="font-size:10px;color:var(--text3);background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:2px 8px;cursor:pointer;font-family:\'Inter\',sans-serif">Desfazer</button></div>'
          :'<button onclick="window._perfToggle('+i+')" style="font-size:10px;font-weight:600;color:var(--accent);background:var(--accent-light);border:none;border-radius:6px;padding:3px 10px;cursor:pointer;font-family:\'Inter\',sans-serif">Marcar feito ✓</button>')
        +'</div>'
        +'</div></div>';
    }).join('');
    updateProgress();
  }

  window._perfToggle=function(idx){
    var states=getDoneStates();
    states[idx]=!states[idx];
    try{localStorage.setItem(actionsKey+'_done',JSON.stringify(states));}catch(e){}
    var cached; try{cached=JSON.parse(localStorage.getItem(actionsKey+'_data'));}catch(e){}
    if(cached) renderActions(cached);
    else renderActions(baseActions.map(function(a){return {titulo:a,impacto:'medio',descricao:'',prazo:'esta semana'};}));
  };

  // Load AI actions
  (function(){
    var cached; try{cached=JSON.parse(localStorage.getItem(actionsKey+'_data'));}catch(e){}
    if(cached){renderActions(cached);return;}
    var prompt='Coach de vendas B2B. Gere EXATAMENTE 3 ações para '+bdr.name+'. Perfil: '+profile+'. Gap: '+mainGap.label+' ('+mainGap.avgVal+'% vs bench '+mainGap.bench+'%). Responda SÓ JSON sem markdown: {"acoes":[{"titulo":"curto","impacto":"alto","descricao":"1 frase acionável","prazo":"esta semana"},{"titulo":"...","impacto":"medio","descricao":"...","prazo":"próximas 2 semanas"},{"titulo":"...","impacto":"medio","descricao":"...","prazo":"30 dias"}]}';
    fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,messages:[{role:'user',content:prompt}]})
    }).then(function(r){return r.json();})
    .then(function(d){
      var t=d.content&&d.content[0]?d.content[0].text:'';
      var p=JSON.parse(t.replace(/```json|```/g,'').trim()).acoes;
      try{localStorage.setItem(actionsKey+'_data',JSON.stringify(p));}catch(e){}
      renderActions(p);
    }).catch(function(){
      renderActions(baseActions.map(function(a,i){return {titulo:a.split(' — ')[0].substring(0,40),impacto:i===0?'alto':'medio',descricao:a,prazo:i===0?'esta semana':i===1?'próximas 2 semanas':'30 dias'};}));
    });
  })();

  // ── Histórico Anual MoM ──
  var ha=DATA.histAnual;
  if(ha&&ha.bdrs&&ha.bdrs[bdr.id]){
    var vals=ha.bdrs[bdr.id];
    var annualEl=document.createElement('div');
    annualEl.className='card';
    annualEl.style.cssText='margin-top:14px;padding:14px;overflow-x:auto;-webkit-overflow-scrolling:touch';
    var annualId='hist-anual-'+bdr.id;
    var hdr='<div class="collapsible-header" onclick="toggleCard(\''+annualId+'\',this)" style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none">'
      +'<div style="font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.08em">📊 Atingimento de metas 2025</div>'
      +'<span class="collapse-icon" style="font-size:14px;color:var(--text3);transition:transform .2s">▾</span>'
      +'</div>';
    var tbl='<table style="width:100%;border-collapse:collapse;font-family:\'Inter\',sans-serif;min-width:600px"><thead><tr style="border-bottom:2px solid var(--border)">';
    tbl+='<th style="padding:4px 6px;text-align:left;font-size:9px;color:var(--text3);font-weight:600">Mês</th>';
    ha.meses.forEach(function(m){tbl+='<th style="padding:4px 3px;text-align:center;font-size:8px;color:var(--text3);font-weight:600;white-space:nowrap">'+m.replace('25','').replace('26','')+'</th>';});
    tbl+='</tr></thead><tbody>';
    // Opps row
    tbl+='<tr><td style="padding:5px 6px;font-size:10px;font-weight:600;color:var(--text)">Opps</td>';
    vals.forEach(function(v,i){
      var meta=ha.metas[i];
      var pct=meta>0?Math.round((v/meta)*100):0;
      var col=v>=meta?'var(--green)':v>=meta*0.7?'var(--amber)':'var(--text3)';
      var bg=v>=meta?'var(--green-bg)':'transparent';
      tbl+='<td style="padding:5px 3px;text-align:center;font-size:11px;font-weight:700;color:'+col+';background:'+bg+';border-radius:4px">'+v+'</td>';
    });
    tbl+='</tr>';
    // Meta row
    tbl+='<tr style="border-top:1px solid var(--border)"><td style="padding:4px 6px;font-size:9px;color:var(--text3)">Meta</td>';
    ha.metas.forEach(function(m){tbl+='<td style="padding:4px 3px;text-align:center;font-size:9px;color:var(--text3)">'+m+'</td>';});
    tbl+='</tr>';
    // % row
    tbl+='<tr><td style="padding:4px 6px;font-size:9px;color:var(--text3)">%</td>';
    vals.forEach(function(v,i){
      var meta=ha.metas[i];
      var pct=meta>0?Math.round((v/meta)*100):0;
      var col=pct>=100?'var(--green)':pct>=70?'var(--amber)':'var(--red)';
      tbl+='<td style="padding:4px 3px;text-align:center;font-size:9px;font-weight:600;color:'+col+'">'+pct+'%</td>';
    });
    tbl+='</tr></tbody></table>';
    // Bars
    var bars='<div style="display:flex;align-items:flex-end;gap:2px;height:40px;margin-top:8px">';
    var maxV=Math.max.apply(null,vals.concat([12]));
    vals.forEach(function(v,i){
      var h=maxV>0?Math.round((v/maxV)*100):0;
      var meta=ha.metas[i];
      var col=v>=meta?'var(--green)':v>=meta*0.7?'var(--amber)':'rgba(220,38,38,0.3)';
      bars+='<div style="flex:1;background:'+col+';border-radius:2px 2px 0 0;height:'+Math.max(h,3)+'%;min-height:2px" title="'+ha.meses[i]+': '+v+' opps"></div>';
    });
    bars+='</div>';
    annualEl.innerHTML=hdr+'<div id="'+annualId+'" style="margin-top:10px">'+bars+tbl+'</div>';
    pane.appendChild(annualEl);
  }
}

function cRowDual(tag,lbl,val,meta){
  const isGood=val>=meta;
  const diff=val-meta;
  const color=isGood?'var(--green)':'var(--red)';
  const delta=(diff>=0?'+':'')+diff+'pp';
  const deltaClass=isGood?'delta-pos':'delta-neg';
  return `<div class="conv-item">
    <div style="display:flex;align-items:center"><span class="conv-tag">${tag}</span><span class="conv-lbl">${lbl}</span></div>
    <div class="conv-right">
      <span class="conv-pct" style="color:${color}">${val}%</span>
      <span class="conv-meta">meta ${meta}%</span>
      <span class="${deltaClass}">${delta}</span>
    </div>
  </div>`;
}

function buildFunnel(id,steps){
  const el=document.getElementById(id);
  if(!el)return;
  el.innerHTML='';
  steps.forEach(s=>{
    const pct=Math.round((s.val/s.max)*100);
    el.innerHTML+=`<div class="funnel-row">
      <div class="funnel-name">${s.name}</div>
      <div class="funnel-track"><div class="funnel-fill" style="width:${Math.max(pct,3)}%;background:${s.color}"><span>${s.val}</span></div></div>
      <div class="funnel-num">${s.val}</div>
    </div>`;
  });
}

function renderBars(id,data,maxVal){
  const el=document.getElementById(id);
  if(!el)return;
  el.innerHTML='';
  data.forEach(d=>{
    const pct=maxVal>0?Math.round((d.val/maxVal)*100):0;
    const color=d.hl?'#3b82f6':pct>=70?'#22c55e':pct>=30?'#f59e0b':'#ef4444';
    el.innerHTML+=`<div class="prog-row">
      <div class="prog-meta">
        <span class="prog-name" style="${d.hl?'color:var(--accent);font-weight:500':''}">${d.name}</span>
        <span class="prog-num">${d.val}</span>
      </div>
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${color}"></div></div>
    </div>`;
  });
}

async function loadDataFromSupabase(){
  // Busca a semana mais recente COM dados (não zerada)
  const allSemanas=await supaFetch('gp_semanas','order=id.desc');
  if(!allSemanas||allSemanas.length===0) throw new Error('Sem dados');
  // Prioriza semana com dados reais; se todas zeradas, usa a mais recente
  const sem=allSemanas.find(s=>s.oportunidades>0||s.abordagem_iniciada>0)||allSemanas[0];
  const bdrsDB=await supaFetch('gp_bdr_resultados',`semana_id=eq.${sem.id}&order=opps.desc`);
  const meetroxDB=await supaFetch('gp_meetrox',`semana_id=eq.${sem.id}`);

  // Atualiza DATA com valores do Supabase (mantém fotos/cores estáticas)
  DATA.meta=sem.meta; DATA.metaBDR=sem.meta_bdr;
  // semAtual vem de calcSemAtual(), não do Supabase — para não regredir
  DATA.semTotal=sem.sem_total;
  DATA.semana=sem.semana||''; DATA.periodo=sem.periodo||''; DATA.mes=sem.mes||'';
  // Se DATA.ultimaAtualizacao (hardcoded no arquivo) for MAIS RECENTE que o Supabase,
  // priorizamos os valores do arquivo (caso o gestor tenha atualizado manualmente)
  var supaTime = sem.updated_at || sem.created_at || '';
  var staticTime = DATA.ultimaAtualizacao || '';
  var staticWins = staticTime && supaTime && staticTime > supaTime;
  // Funil: só sobrescreve se Supabase tem dados E não é um update manual mais recente
  if((sem.abordagem_iniciada>0||sem.oportunidades>0) && !staticWins){
    DATA.funil={
      novoLead:sem.novo_lead, abordagemIniciada:sem.abordagem_iniciada,
      leadConectado:sem.lead_conectado, reuniaoAgendada:sem.reuniao_agendada,
      oportunidades:sem.oportunidades, desqualificados:sem.desqualificados,
    };
    DATA.conversoes={
      aiLc:{real:sem.conv_ai_lc,meta:sem.conv_ai_lc_meta},
      lcRa:{real:sem.conv_lc_ra,meta:sem.conv_lc_ra_meta},
      raOp:{real:sem.conv_ra_op,meta:sem.conv_ra_op_meta},
    };
  }
  if(bdrsDB&&bdrsDB.length>0 && !staticWins) bdrsDB.forEach(row=>{
    const b=DATA.bdrs.find(b=>b.id===row.bdr_id);
    if(!b) return;
    b.opps=row.opps; b.ras=row.ras; b.lig=row.ligacoes;
    b.ativ=row.atividades; b.desq=row.desqualificados;
  });
  meetroxDB.forEach(row=>{
    const b=DATA.bdrs.find(b=>b.id===row.bdr_id);
    if(!b) return;
    b.meetrox={nota:parseFloat(row.nota_semana)||0,conversas:row.conversas_semana||0,
      notaMes:parseFloat(row.nota_mes)||0,conversasMes:row.conversas_mes||0,gap:row.gap||''};
  });
  DATA.raPendentes={};
  bdrsDB.forEach(row=>{ DATA.raPendentes[row.bdr_id]=row.ra_pendentes||0; });
  var supaTs=sem.created_at||'';
  if(!DATA.ultimaAtualizacao||supaTs>DATA.ultimaAtualizacao) DATA.ultimaAtualizacao=supaTs||new Date().toISOString();
  console.log('✓ Supabase — semana:',sem.semana);
}

// Convert VAPID key
function urlBase64ToUint8Array(base64String){
  const padding='='.repeat((4-base64String.length%4)%4);
  const base64=(base64String+padding).replace(/-/g,'+').replace(/_/g,'/');
  const rawData=window.atob(base64);
  return Uint8Array.from([...rawData].map(c=>c.charCodeAt(0)));
}

// Request push permission and subscribe
async function requestPushPermission(){
  if(!('Notification' in window)||!('serviceWorker' in navigator)){return null;}
  const permission=await Notification.requestPermission();
  if(permission!=='granted') return null;
  try{
    const reg=await navigator.serviceWorker.ready;
    const existing=await reg.pushManager.getSubscription();
    if(existing) return existing;
    const sub=await reg.pushManager.subscribe({
      userVisibleOnly:true,
      applicationServerKey:urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
    });
    // Save subscription to Supabase
    if(currentUser){
      await fetch(`${SUPA_URL}/rest/v1/gp_push_subs`,{
        method:'POST',
        headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},
        body:JSON.stringify({user_id:currentUser.id,user_name:currentUser.name,subscription:JSON.stringify(sub),updated_at:new Date().toISOString()})
      }).catch(()=>{});
    }
    return sub;
  }catch(e){console.warn('Push subscribe error:',e);return null;}
}

// Check and trigger local alerts on app open
function checkDailyAlerts(){
  if(!currentUser||currentUser.isGestor) return;
  const bdr=DATA.bdrs.find(b=>b.id===currentUser.id);
  if(!bdr) return;

  const now=new Date();
  const dow=now.getDay(); // 0=Dom,1=Seg,...,5=Sex,6=Sab
  const hour=now.getHours();
  const todayStr=`${String(now.getDate()).padStart(2,'0')}/${String(now.getMonth()+1).padStart(2,'0')}`;
  const lastAlertKey=`gpulse-alert-${currentUser.id}-${now.toDateString()}`;

  // Only show once per day
  if(localStorage.getItem(lastAlertKey)) return;
  localStorage.setItem(lastAlertKey,'1');

  // 1. Monday 8-10h: forecast reminder
  if(dow===1&&hour>=8&&hour<=10){
    // Check if forecast already submitted
    supaFetch('gp_semanas','order=id.desc&limit=1').then(sems=>{
      if(!sems||!sems[0]) return;
      return supaFetch('gp_forecast',`semana_id=eq.${sems[0].id}&bdr_id=eq.${bdr.id}`);
    }).then(fcsts=>{
      if(!fcsts||fcsts.length===0){
        showLocalNotification(
          '📊 Forecast da semana',
          `${bdr.name.split(' ')[0]}, você ainda não enviou seu forecast desta semana. Acesse o Gupy Pulse!`
        );
      }
    }).catch(()=>{});
  }

  // 2. Reunião hoje
  const reunioesHoje=DATA.reunioes.futuras.filter(d=>{
    const [dia,mes]=d.date.split('/');
    return d.date===todayStr&&(
      d.ta.some(r=>r.bdr===bdr.name)||
      d.tm.some(r=>r.bdr===bdr.name)
    );
  });
  if(reunioesHoje.length>0&&hour>=7&&hour<=9){
    const count=reunioesHoje.reduce((s,d)=>s+d.ta.filter(r=>r.bdr===bdr.name).length+d.tm.filter(r=>r.bdr===bdr.name).length,0);
    showLocalNotification(
      '📅 Reunião hoje!',
      `Você tem ${count} reunião(ões) agendada(s) para hoje. Prepare-se!`
    );
  }

  // 3. Reuniões atrasadas
  const atrasadasMeu=[...DATA.reunioes.atrasadasTA,...DATA.reunioes.atrasadasTM].filter(a=>a.id===bdr.id);
  if(atrasadasMeu.length>0&&hour>=8&&hour<=11){
    showLocalNotification(
      `🚨 ${atrasadasMeu.length} reunião(ões) atrasada(s)`,
      `Você tem reuniões vencidas que precisam ser reagendadas. Acesse Meu Resultado.`
    );
  }

  // 4. Friday 17h: weekly summary
  if(dow===5&&hour>=16&&hour<=18){
    const pct=DATA.metaBDR>0?Math.round((bdr.opps/DATA.metaBDR)*100):0;
    showLocalNotification(
      '📊 Resumo da semana',
      `Você fechou a semana em ${pct}% da meta do mês (${bdr.oppsMes||bdr.opps}/${DATA.metaBDR} opps). Confira seu painel.`
    );
  }
}

function saveSettings(){
  if(!currentUser) return;
  const prefsKey='gpulse-prefs-'+currentUser.id;
  const prefs={
    nomeApp: document.getElementById('pref-nome')?.value?.trim()||'',
    tempoGupy: document.getElementById('pref-tempo')?.value||'',
    nivel: document.getElementById('pref-nivel')?.value||'',
  };
  localStorage.setItem(prefsKey, JSON.stringify(prefs));

  // Update displayed name if set
  if(prefs.nomeApp){
    const nameEl=document.getElementById('app-name');
    if(nameEl) nameEl.textContent=prefs.nomeApp;
  }
  // Refresh role line with new nivel
  if(currentUser&&!currentUser.isGestor){
    const roleEl=document.getElementById('app-role');
    if(roleEl){
      const nivel=prefs.nivel||'';
      roleEl.textContent='BDR · Pre Vendas'+(nivel?' · '+nivel:'');
    }
  }

  // Visual feedback
  const btn=document.querySelector('#settings-content button');
  if(btn){
    const orig=btn.textContent;
    btn.textContent='✓ Salvo!';
    btn.style.background='var(--green)';
    setTimeout(()=>{ btn.textContent=orig; btn.style.background='var(--accent)'; },2000);
  }
}

function jdcInitDefaults(){
  JDC_PEOPLE.forEach(function(p){
    if(!jdcData[p.id]) jdcData[p.id]={

      cultura:{agilidade:null,fazer_mais:null,juntos:null,paixao:null,obsessao:null,comentario:''},
      carreira:{prioridade:'',desenvolvimento:''},
      risco:{saida:null,to_indesejavel:null}
    };
  });
}
function jdcInit(){
  // Load from localStorage first (instant)
  var saved=localStorage.getItem('jdc2026_data');
  if(saved){try{jdcData=JSON.parse(saved);}catch(e){jdcData={};}}
  jdcInitDefaults();
  // Auto-push local data to Supabase (ensures cloud has latest)
  if(saved) setTimeout(function(){jdcSaveToSupabase();},2000);
  // Then try Supabase (async, merges newer data from other devices)
  jdcLoadFromSupabase();
}
async function jdcLoadFromSupabase(){
  try{
    var rows=await supaFetch('gp_jdc','order=person_id.asc');
    if(!rows||rows.length===0) return;
    var changed=false;
    rows.forEach(function(row){
      if(row.person_id&&row.data){
        var remote=typeof row.data==='string'?JSON.parse(row.data):row.data;
        // Merge: Supabase wins if has data
        var local=jdcData[row.person_id];
        if(!local||!hasJdcData(local)){
          jdcData[row.person_id]=remote;changed=true;
        } else {
          // Check if remote is newer (has more filled fields)
          if(hasJdcData(remote)&&countJdcFields(remote)>countJdcFields(local)){
            jdcData[row.person_id]=remote;changed=true;
          }
        }
      }
    });
    if(changed){
      localStorage.setItem('jdc2026_data',JSON.stringify(jdcData));
      // Re-render if JDC tab is open
      var pane=document.querySelector('[data-built]');
      if(pane&&jdcView) jdcRender(pane);
    }
  }catch(e){console.warn('JDC Supabase load:',e);}
}
function hasJdcData(d){
  if(!d) return false;
  return d.solidez&&(d.solidez.autonomia!==null||d.solidez.final!==null)||
    d.resultado&&d.resultado.nota!==null||
    d.cultura&&d.cultura.agilidade!==null;
}
function countJdcFields(d){
  var count=0;
  if(!d) return 0;
  if(d.solidez){['autonomia','complexidade','impacto','final'].forEach(function(k){if(d.solidez[k]!==null) count++;});}
  if(d.resultado&&d.resultado.nota!==null) count++;
  if(d.resultado&&d.resultado.entregas) count++;
  if(d.cultura){['agilidade','fazer_mais','juntos','paixao','obsessao'].forEach(function(k){if(d.cultura[k]!==null) count++;});}
  if(d.cultura&&d.cultura.comentario) count++;
  if(d.carreira&&d.carreira.prioridade) count++;
  if(d.carreira&&d.carreira.desenvolvimento) count++;
  if(d.risco&&d.risco.saida!==null) count++;
  if(d.risco&&d.risco.to_indesejavel!==null) count++;
  return count;
}
jdcInit();

  localStorage.setItem('jdc2026_data',JSON.stringify(jdcData));
  // Save to Supabase (async, per person)
  jdcSaveToSupabase();
}
async function jdcSaveToSupabase(){
  try{
    for(var i=0;i<JDC_PEOPLE.length;i++){
      var p=JDC_PEOPLE[i];
      var d=jdcData[p.id];
      if(!d||!hasJdcData(d)) continue;
      // Upsert via POST with on_conflict
      await fetch(SUPA_URL+'/rest/v1/gp_jdc',{
        method:'POST',
        headers:{
          'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,
          'Content-Type':'application/json',
          'Prefer':'resolution=merge-duplicates,return=minimal'
        },
        body:JSON.stringify({person_id:p.id,data:d,updated_at:new Date().toISOString(),updated_by:currentUser?currentUser.id:'gestor'})
      });
    }
  }catch(e){console.warn('JDC Supabase save:',e);}
}

function jdcColorBg(c){
  return c==='red'?'var(--red-bg)':c==='amber'?'var(--amber-bg)':c==='green'?'var(--green-bg)':'var(--purple-bg)';
}
function jdcColorFg(c){
  return c==='red'?'var(--red)':c==='amber'?'var(--amber)':c==='green'?'var(--green)':'var(--purple)';
}

function jdcInitials(name){return name.split(' ').map(function(w){return w[0];}).join('').slice(0,2);}

function jdcCompStatus(id){
  var d=jdcData[id];if(!d)return '';
  var flds=[d.solidez.autonomia,d.solidez.complexidade,d.solidez.impacto,d.solidez.final,
    d.resultado.nota,d.cultura.agilidade,d.cultura.fazer_mais,d.cultura.juntos,d.cultura.paixao,d.cultura.obsessao];
  var n=flds.filter(function(f){return f!==null;}).length;
  return n===flds.length?'done':n>0?'partial':'';
}

function jdcCalc9box(id){
  var d=jdcData[id];if(!d)return null;
  var res=d.resultado.nota;
  var cVals=[d.cultura.agilidade,d.cultura.fazer_mais,d.cultura.juntos,d.cultura.paixao,d.cultura.obsessao];
  var cF=cVals.filter(function(v){return v!==null;});
  if(!res||cF.length===0)return null;
  var cAvg=cF.reduce(function(a,b){return a+b;},0)/cF.length;
  var perf=(res*0.6)+(cAvg*0.4);
  var sol=d.solidez.final;if(!sol)return null;
  var pL=perf<2?1:perf<3?2:3;
  var sL=sol<=2?1:sol===3?2:3;
  var m={'3-1':'Q7','3-2':'Q8','3-3':'Q9','2-1':'Q4','2-2':'Q5','2-3':'Q6','1-1':'Q1','1-2':'Q2','1-3':'Q3'};
  return m[sL+'-'+pL]||null;
}
// Pontuação detalhada 0-4 de cada pilar
function jdcGetScores(id){
  var d=jdcData[id];if(!d)return null;
  var res=d.resultado.nota;
  var cVals=[d.cultura.agilidade,d.cultura.fazer_mais,d.cultura.juntos,d.cultura.paixao,d.cultura.obsessao];
  var cF=cVals.filter(function(v){return v!==null;});
  var cAvg=cF.length?Math.round(cF.reduce(function(a,b){return a+b;},0)/cF.length*10)/10:null;
  var perf=res&&cAvg!==null?Math.round((res*0.6+cAvg*0.4)*10)/10:null;
  var sol=d.solidez.final;
  return {resultado:res,cultura:cAvg,performance:perf,solidez:sol};
}

function jdcBuild9box(){
  // Scatter plot 9BOX — eixos 1-4, quadrantes coloridos, pontos por BDR
  var W=340,H=300,pL=36,pR=16,pT=16,pB=44;
  var pw=W-pL-pR, ph=H-pT-pB;
  function toX(v){return pL+((v-1)/3)*pw;}
  function toY(v){return pT+ph-((v-1)/3)*ph;}

  // Quadrant backgrounds (Performance x = horizontal, Solidez y = vertical)
  // x<2.5 & y<2.5 = red (Q1), x>=2.5 & y<2.5 = blue-ish (Q2/Q3), etc.
  var quads='';
  // Red zone: perf 1-2.5, solidez 1-2.5
  quads+='<rect x="'+pL+'" y="'+toY(2.5)+'" width="'+(toX(2.5)-pL)+'" height="'+(toY(1)-toY(2.5))+'" fill="rgba(239,68,68,0.08)" rx="4"/>';
  // Red zone top-left: perf 1-2.5, solidez 2.5-4
  quads+='<rect x="'+pL+'" y="'+toY(4)+'" width="'+(toX(2.5)-pL)+'" height="'+(toY(2.5)-toY(4))+'" fill="rgba(245,158,11,0.06)" rx="4"/>';
  // Blue zone: perf 2.5-3.5, solidez 1-4
  quads+='<rect x="'+toX(2.5)+'" y="'+toY(4)+'" width="'+(toX(3.5)-toX(2.5))+'" height="'+(toY(1)-toY(4))+'" fill="rgba(99,102,241,0.06)" rx="4"/>';
  // Green zone: perf 3.5-4, solidez 1-4
  quads+='<rect x="'+toX(3.5)+'" y="'+toY(4)+'" width="'+(toX(4)-toX(3.5)+pR)+'" height="'+(toY(1)-toY(4))+'" fill="rgba(34,197,94,0.08)" rx="4"/>';

  // Grid lines
  var grid='';
  for(var i=1;i<=4;i++){
    grid+='<line x1="'+pL+'" y1="'+toY(i)+'" x2="'+(W-pR)+'" y2="'+toY(i)+'" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>';
    grid+='<line x1="'+toX(i)+'" y1="'+pT+'" x2="'+toX(i)+'" y2="'+(H-pB)+'" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>';
    // Y axis labels (Solidez)
    grid+='<text x="'+(pL-8)+'" y="'+(toY(i)+4)+'" font-size="10" fill="var(--text3)" text-anchor="end" font-weight="600" font-family="Inter">'+i+'</text>';
    // X axis labels (Performance)
    grid+='<text x="'+toX(i)+'" y="'+(H-pB+18)+'" font-size="10" fill="var(--text3)" text-anchor="middle" font-weight="600" font-family="Inter">'+i+'</text>';
  }

  // Axis labels
  var axes='<text x="'+(W/2)+'" y="'+(H-4)+'" font-size="11" fill="var(--red)" text-anchor="middle" font-weight="700" font-family="Inter">';
  axes+='Performance (Resultado + Cultura) →</text>';

  // Y axis gradient bar
  axes+='<rect x="2" y="'+pT+'" width="4" height="'+ph+'" rx="2" fill="url(#yGrad)"/>';
  axes+='<defs><linearGradient id="yGrad" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#ef4444"/><stop offset="50%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#22c55e"/></linearGradient>';
  axes+='<linearGradient id="xGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#ef4444"/><stop offset="50%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#22c55e"/></linearGradient></defs>';
  // X axis gradient bar
  axes+='<rect x="'+pL+'" y="'+(H-pB+24)+'" width="'+pw+'" height="4" rx="2" fill="url(#xGrad)"/>';

  // Plot BDR points
  var points='';
  var jitter=0;
  JDC_PEOPLE.forEach(function(p){
    var sc=jdcGetScores(p.id);
    if(!sc||!sc.performance||!sc.solidez) return;
    var x=toX(sc.performance)+(jitter%3-1)*8;
    var y=toY(sc.solidez)+(Math.floor(jitter/3)-1)*6;
    jitter++;
    var name=p.name.split(' ')[0];
    // Dot with glow
    points+='<circle cx="'+x+'" cy="'+y+'" r="8" fill="'+p.color+'" opacity="0.9" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>';
    points+='<circle cx="'+x+'" cy="'+y+'" r="12" fill="'+p.color+'" opacity="0.15"/>';
    // Name label
    points+='<text x="'+x+'" y="'+(y-12)+'" font-size="9" fill="var(--text)" text-anchor="middle" font-weight="700" font-family="Inter">'+name+'</text>';
    // Score badge
    points+='<text x="'+x+'" y="'+(y+3)+'" font-size="7" fill="#fff" text-anchor="middle" font-weight="700" font-family="Inter">'+sc.performance+'</text>';
  });

  var svg='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;max-width:'+W+'px;font-family:Inter,sans-serif">'
    +quads+grid+axes+points+'</svg>';

  // Legenda
  var legend='<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;justify-content:center">';
  JDC_PEOPLE.forEach(function(p){
    var sc=jdcGetScores(p.id);
    var q=jdcCalc9box(p.id);
    if(!sc||!sc.performance) return;
    legend+='<div style="display:flex;align-items:center;gap:4px;font-size:10px">'
      +'<div style="width:8px;height:8px;border-radius:50%;background:'+p.color+'"></div>'
      +'<span style="color:var(--text2);font-weight:500">'+p.name.split(' ')[0]+'</span>'
      +'<span style="color:var(--accent);font-weight:700;font-size:9px">'+(q||'')+'</span>'
      +'<span style="color:var(--text3);font-size:9px">('+sc.performance+')</span>'
      +'</div>';
  });
  legend+='</div>';

  return svg+legend;
}

function jdcBuildMeritPanel(){
  var promo=[];var merito=[];var atencao=[];var pmp=[];
  JDC_PEOPLE.forEach(function(p){
    var q=jdcCalc9box(p.id);if(!q)return;
    var d=jdcData[p.id];
    var risco=d.risco.to_indesejavel===true;
    var obj={name:p.name,color:p.color,q:q,risco:risco};
    if(q==='Q9') promo.push(obj);
    else if(q==='Q6'||q==='Q8') merito.push(obj);
    else if(q==='Q1'||q==='Q4'||q==='Q7') pmp.push(obj);
    else atencao.push(obj);
  });

  function personRow(p,tag){
    return '<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg);border-radius:8px;margin-bottom:6px">'
      +'<div style="width:8px;height:8px;border-radius:50%;background:'+p.color+';flex-shrink:0"></div>'
      +'<div style="font-size:12px;font-weight:600;color:var(--text);flex:1">'+p.name+'</div>'
      +'<div style="font-size:10px;font-weight:700;color:var(--accent)">'+p.q+'</div>'
      +(p.risco?'<div style="font-size:9px;padding:2px 6px;border-radius:10px;background:var(--red-bg);color:var(--red);font-weight:600">TO Indesejável</div>':'')
      +'</div>';
  }

  function section(icon,title,desc,color,people){
    if(people.length===0) return '<div style="margin-bottom:16px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'
      +'<span style="font-size:14px">'+icon+'</span>'
      +'<span style="font-size:12px;font-weight:700;color:var(--text)">'+title+'</span></div>'
      +'<div style="font-size:11px;color:var(--text3);padding:12px;background:var(--bg);border-radius:8px;text-align:center">Nenhum gupier nesta categoria (preencha as avaliações)</div></div>';
    return '<div style="margin-bottom:16px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">'
      +'<span style="font-size:14px">'+icon+'</span>'
      +'<span style="font-size:12px;font-weight:700;color:var(--text)">'+title+'</span>'
      +'<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:'+jdcColorBg(color)+';color:'+jdcColorFg(color)+'">'+people.length+'</span></div>'
      +'<div style="font-size:10px;color:var(--text3);margin-bottom:8px">'+desc+'</div>'
      +people.map(function(p){return personRow(p);}).join('')+'</div>';
  }

  var content=section('🚀','Elegíveis para Promoção','Performance acima do esperado + Excedendo o nível (Q9). Prontidão máxima — prioridade para próxima cadeira.','purple',promo)
    +section('⭐','Elegíveis para Mérito','Performance acima + Sólido (Q6) ou Dentro + Excedendo (Q8). Alta performance ou alta maturidade — reconhecimento salarial.','green',merito)
    +section('👀','Acompanhamento','Performance dentro do esperado ou em desenvolvimento. Foco em evolução e feedbacks direcionados.','amber',atencao)
    +section('⚠️','Atenção — Plano de Melhoria (PMP)','Performance abaixo do esperado. Necessário plano de ação imediato e acompanhamento próximo.','red',pmp);

  return jdcCardHtml('🏆','Sugestões de Mérito & Promoção','Baseado nos resultados das avaliações JDC 2026','','green',content);
}

function jdcRender(pane){
  // View tabs
  var viewTabs='<div style="display:flex;gap:4px;margin-bottom:16px">'
    +'<div class="jdc-vtab'+(jdcView==='eval'?' active':'')+'" data-view="eval" style="padding:8px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;'
    +(jdcView==='eval'?'background:var(--navy);color:#fff':'background:var(--bg3);color:var(--text2)')+'">Avaliações</div>'
    +'<div class="jdc-vtab'+(jdcView==='summary'?' active':'')+'" data-view="summary" style="padding:8px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;'
    +(jdcView==='summary'?'background:var(--navy);color:#fff':'background:var(--bg3);color:var(--text2)')+'">Resumo</div>'
    +'<div class="jdc-vtab'+(jdcView==='9box'?' active':'')+'" data-view="9box" style="padding:8px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;'
    +(jdcView==='9box'?'background:var(--navy);color:#fff':'background:var(--bg3);color:var(--text2)')+'">9BOX</div>'
    +'</div>';

  var html='<div style="margin-bottom:12px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">'
    +'<span style="display:inline-block;background:var(--gupy-green);color:var(--navy);font-size:9px;font-weight:700;padding:2px 8px;border-radius:12px;text-transform:uppercase;letter-spacing:.06em">GUPY OS</span>'
    +'<span style="font-size:15px;font-weight:800;color:var(--text);letter-spacing:-.02em">Jornada de Crescimento 2.0</span></div>'
    +'<div style="font-size:11px;color:var(--text3)">Avaliação de Desempenho · Ciclo Jan-Dez 2025 · Pré-Vendas Outbound</div></div>';

  // PR1 · Mudança 6: Card de status de avaliações no topo da aba Pessoas.
  var total=JDC_PEOPLE.length;
  var doneCount=JDC_PEOPLE.filter(function(p){return jdcCompStatus(p.id)==='done';}).length;
  var pctDone=total>0?Math.round((doneCount/total)*100):0;
  var pendentes=JDC_PEOPLE.filter(function(p){var st=jdcCompStatus(p.id);return st!=='done';});
  var pendRows=pendentes.map(function(p){
    var st=jdcCompStatus(p.id);
    var stLabel=st==='partial'?'Em andamento':'Não iniciada';
    var stCol=st==='partial'?'var(--amber)':'var(--text3)';
    return '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">'
      +'<div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0">'
      +'<div style="width:26px;height:26px;border-radius:50%;background:'+p.color+';color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0">'+jdcInitials(p.name)+'</div>'
      +'<div style="min-width:0;flex:1"><div style="font-size:12px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+p.name.split(' ')[0]+'</div>'
      +'<div style="font-size:10px;color:'+stCol+';font-weight:600">'+stLabel+'</div></div></div>'
      +'<div class="jdc-avaliar-agora" data-pid="'+p.id+'" style="cursor:pointer;font-size:10px;font-weight:700;color:var(--accent);background:var(--accent-light);border:1px solid var(--accent-mid);border-radius:8px;padding:6px 10px;flex-shrink:0">Avaliar agora</div>'
      +'</div>';
  }).join('');
  html+='<div class="card" style="margin-bottom:16px">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'
    +'<div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.08em">Status de avaliações JDC 2026</div>'
    +'<div style="font-size:11px;font-weight:700;color:'+(doneCount===total?'var(--green)':'var(--accent)')+';font-family:\'Inter\',sans-serif">'+doneCount+'/'+total+'</div>'
    +'</div>'
    +'<div style="height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-bottom:8px">'
    +'<div style="width:'+pctDone+'%;height:100%;background:'+(doneCount===total?'var(--green)':'var(--accent)')+';border-radius:4px;transition:width .3s"></div>'
    +'</div>'
    +'<div style="font-size:11px;color:var(--text3);margin-bottom:'+(pendentes.length>0?'12':'0')+'px">Você avaliou '+doneCount+' de '+total+' BDRs neste ciclo.</div>'
    +(pendentes.length>0?'<div style="padding-top:10px;border-top:1px solid var(--border)"><div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Pendentes</div>'+pendRows+'</div>':'')
    +'</div>';

  html+=viewTabs;

  if(jdcView==='eval'){
    // Person nav chips
    var chips=JDC_PEOPLE.map(function(p){
      var ini=jdcInitials(p.name);
      var act=p.id===jdcActive;
      var st=jdcCompStatus(p.id);
      var dotCol=st==='done'?'var(--green)':st==='partial'?'var(--amber)':'var(--border2)';
      return '<div class="jdc-chip" data-pid="'+p.id+'" style="flex-shrink:0;display:flex;align-items:center;gap:6px;'
        +'padding:6px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s;'
        +(act?'background:var(--accent);color:#fff;border:1.5px solid var(--accent);box-shadow:0 2px 8px rgba(0,60,253,.25)':'background:var(--bg3);color:var(--text2);border:1.5px solid var(--border)')
        +'"><div style="width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;'
        +(act?'background:rgba(0,0,0,0.3);color:#fff':'background:rgba(255,255,255,0.06);color:var(--text2)')+'">'+ini+'</div>'
        +p.name.split(' ')[0]
        +'<div style="width:7px;height:7px;border-radius:50%;background:'+dotCol+';flex-shrink:0"></div></div>';
    }).join('');
    html+='<div style="display:flex;gap:6px;overflow-x:auto;margin-bottom:16px;padding-bottom:4px;-webkit-overflow-scrolling:touch">'+chips+'</div>';
    html+='<div id="jdc-person-content">'+jdcBuildPerson(jdcActive)+'</div>';
  } else if(jdcView==='summary'){
    html+=jdcCardHtml('📊','Resumo Consolidado','Visão geral de todas as avaliações','','purple',jdcBuildSummary());
  } else {
    html+=jdcCardHtml('🎯','9BOX do Time','Performance (60% Resultado + 40% Cultura) x Solidez no Nível','','purple',jdcBuild9box());
    html+=jdcBuildMeritPanel();
  }

  // Action buttons
  html+='<div style="display:flex;gap:8px;margin-top:16px;justify-content:center">'
    +'<div class="jdc-action" data-act="save" style="padding:8px 20px;border-radius:8px;font-size:12px;font-weight:700;background:var(--accent);color:#fff;cursor:pointer;box-shadow:var(--shadow-lg)">Salvar Rascunho</div>'
    +'<div class="jdc-action" data-act="export" style="padding:8px 20px;border-radius:8px;font-size:12px;font-weight:700;background:var(--navy);color:#fff;cursor:pointer">Exportar JSON</div>'
    +'</div>';

  pane.innerHTML=html;

  // Event delegation
  pane.onclick=function(e){
    var t=e.target.closest('.jdc-rbtn');
    if(t){
      var pid=t.dataset.pid,sec=t.dataset.sec,fld=t.dataset.fld,val=parseInt(t.dataset.v);
      if(jdcData[pid][sec][fld]===val)jdcData[pid][sec][fld]=null;
      else jdcData[pid][sec][fld]=val;
      jdcSave();jdcRender(pane);return;
    }
    var tog=e.target.closest('.jdc-toggle');
    if(tog){
      var pid2=tog.dataset.pid,fld2=tog.dataset.fld,val2=tog.dataset.val==='true';
      if(jdcData[pid2].risco[fld2]===val2)jdcData[pid2].risco[fld2]=null;
      else jdcData[pid2].risco[fld2]=val2;
      jdcSave();jdcRender(pane);return;
    }
    var chip=e.target.closest('.jdc-chip');
    if(chip){jdcActive=chip.dataset.pid;jdcRender(pane);return;}
    var avaliarBtn=e.target.closest('.jdc-avaliar-agora');
    if(avaliarBtn){jdcActive=avaliarBtn.dataset.pid;jdcView='eval';track('jdc_avaliar_agora',avaliarBtn.dataset.pid);jdcRender(pane);window.scrollTo(0,0);return;}
    var vtab=e.target.closest('.jdc-vtab');
    if(vtab){jdcView=vtab.dataset.view;jdcRender(pane);return;}
    var act=e.target.closest('.jdc-action');
    if(act){
      if(act.dataset.act==='save'){jdcSave();alert('Rascunho salvo!');}
      if(act.dataset.act==='export'){
        var exp={};JDC_PEOPLE.forEach(function(p){var d=jdcData[p.id];var q=jdcCalc9box(p.id);exp[p.name]={...d,_9box:q};});
        var blob=new Blob([JSON.stringify(exp,null,2)],{type:'application/json'});
        var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='jdc2026_avaliacoes.json';a.click();URL.revokeObjectURL(url);
      }
    }
  };
  // Textarea change handlers
  pane.querySelectorAll('.jdc-text').forEach(function(ta){
    ta.oninput=function(){
      var pid=ta.dataset.pid,sec=ta.dataset.sec,fld=ta.dataset.fld;
      jdcData[pid][sec][fld]=ta.value;jdcSave();
    };
  });

  // Tooltip hover handlers
  var activeTip=null;
  pane.addEventListener('mouseenter',function(e){
    var btn=e.target.closest('.jdc-has-tip');
    if(!btn||!btn.dataset.tip)return;
    // Remove existing
    if(activeTip){activeTip.remove();activeTip=null;}
    var tip=document.createElement('div');
    tip.className='jdc-tooltip';
    tip.textContent=btn.dataset.tip;
    btn.appendChild(tip);
    // Force reflow then show
    tip.offsetHeight;
    tip.classList.add('visible');
    activeTip=tip;
  },true);
  pane.addEventListener('mouseleave',function(e){
    var btn=e.target.closest('.jdc-has-tip');
    if(!btn)return;
    if(activeTip){activeTip.remove();activeTip=null;}
  },true);
}

window.buildJDC=function(pane){jdcRender(pane);};
window.jdcSave=jdcSave;
window.jdcNextPerson=function(currentId){
  var idx=JDC_PEOPLE.findIndex(function(x){return x.id===currentId;});
  if(idx<JDC_PEOPLE.length-1){
    jdcActive=JDC_PEOPLE[idx+1].id;
    var pane=document.querySelector('[data-built]');
    if(pane) jdcRender(pane);
    window.scrollTo(0,0);
  }
};
window.jdcExport=function(){
  var exp={};JDC_PEOPLE.forEach(function(p){var d=jdcData[p.id];var q=jdcCalc9box(p.id);exp[p.name]={...d,_9box:q};});
  var blob=new Blob([JSON.stringify(exp,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='jdc2026_avaliacoes.json';a.click();URL.revokeObjectURL(url);
};
})();


</script>
