<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Outbound Gupy">
<meta name="theme-color" content="#ffffff">
<link rel="manifest" href="manifest.json">
<title>Outbound Gupy · Pre Vendas</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  /* ── GRADIENT MESH + MOTION — Dark Premium ── */
  /* Backgrounds */
  --bg:#0a0a0f;
  --bg2:#12121a;
  --bg3:#1a1a26;
  --bg4:#22222e;
  /* Borders */
  --border:rgba(255,255,255,0.06);
  --border2:rgba(255,255,255,0.12);
  /* Text — Light on dark */
  --text:#f0f0f5;
  --text2:#a0a0b8;
  --text3:#606078;
  /* Accent — Indigo vibrante */
  --accent:#6366f1;
  --accent-light:rgba(99,102,241,0.12);
  --accent-mid:rgba(99,102,241,0.20);
  --accent-dim:rgba(99,102,241,0.06);
  /* Gupy Green highlight — usar em detalhes, badges, acentos */
  --gupy-glow:0 0 16px rgba(205,255,130,0.25);
  /* Navy */
  --navy:#0a0a0f;
  --navy-light:rgba(255,255,255,0.04);
  /* Status — vibrant on dark */
  --green:#22c55e;  --green-bg:rgba(34,197,94,0.12);
  --amber:#f59e0b;  --amber-bg:rgba(245,158,11,0.12);
  --red:#f87171;    --red-bg:rgba(248,113,113,0.10);
  --purple:#a855f7; --purple-bg:rgba(168,85,247,0.12);
  --teal:#14b8a6;
  /* Brand Accents */
  --gupy-green:#cdff82;
  --gupy-lilac:#9e88ff;
  --gupy-orange:#ff5c1d;
  /* Gradients */
  --gradient-1:linear-gradient(135deg,#6366f1 0%,#a855f7 50%,#ec4899 100%);
  --gradient-2:linear-gradient(135deg,#22c55e 0%,#14b8a6 100%);
  --gradient-3:linear-gradient(135deg,#f59e0b 0%,#ef4444 100%);
  /* Shadows — glow on dark */
  --shadow:0 2px 8px rgba(0,0,0,0.3),0 4px 16px rgba(0,0,0,0.2);
  --shadow-sm:0 1px 4px rgba(0,0,0,0.3);
  --shadow-lg:0 4px 24px rgba(99,102,241,0.15);
  --glow-accent:0 0 20px rgba(99,102,241,0.3);
  --glow-green:0 0 20px rgba(34,197,94,0.3);
  /* Layout */
  --radius:16px; --radius-sm:12px; --radius-xs:8px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --bottom-nav-h:64px;
}

/* ── LIGHT MODE OVERRIDES ── */
body[data-theme="light"],
body[data-theme="light"] #screen-app{background:#f5f7fa!important;color:#00122f!important;}
body[data-theme="light"] .card{background:#ffffff!important;backdrop-filter:none!important;-webkit-backdrop-filter:none!important;border-color:rgba(0,18,47,0.08)!important;box-shadow:0 1px 4px rgba(0,18,47,0.05),0 2px 8px rgba(0,18,47,0.03)!important;}
body[data-theme="light"] .card:hover{transform:none!important;box-shadow:0 1px 4px rgba(0,18,47,0.05),0 2px 8px rgba(0,18,47,0.03)!important;}
body[data-theme="light"] .app-header{background:#ffffff!important;backdrop-filter:none!important;-webkit-backdrop-filter:none!important;border-bottom:1px solid rgba(0,18,47,0.08)!important;box-shadow:0 1px 3px rgba(0,18,47,0.08)!important;}
body[data-theme="light"] .bottom-nav{background:#ffffff!important;backdrop-filter:none!important;-webkit-backdrop-filter:none!important;border-top:1px solid rgba(0,18,47,0.08)!important;box-shadow:0 -2px 12px rgba(0,0,0,0.06)!important;}
body[data-theme="light"] .nav-item.active{color:#003cfd!important;text-shadow:none!important;}
body[data-theme="light"] .nav-item.active .nav-icon-dot{background:#003cfd!important;box-shadow:none!important;}
body[data-theme="light"] .metric-card{background:#ffffff!important;backdrop-filter:none!important;-webkit-backdrop-filter:none!important;border-color:rgba(0,18,47,0.08)!important;}
body[data-theme="light"] .update-chip{background:#f0f2f6!important;color:#3d5077!important;border-color:rgba(0,18,47,0.08)!important;}
body[data-theme="light"] .login-wave{background:#f5f7fa!important;backdrop-filter:none!important;}
body[data-theme="light"] .login-card{background:#ffffff!important;backdrop-filter:none!important;border-color:rgba(0,18,47,0.08)!important;box-shadow:0 1px 3px rgba(0,18,47,0.08)!important;}
body[data-theme="light"] .login-card:hover{border-color:#003cfd!important;box-shadow:0 0 12px rgba(0,60,253,0.15)!important;}
body[data-theme="light"] .login-card-photo{border-color:rgba(0,60,253,0.3)!important;box-shadow:none!important;}
body[data-theme="light"] .tab-content{background:#f5f7fa!important;}
body[data-theme="light"] .card-title{color:#00122f!important;}
body[data-theme="light"] .alert-banner{color:#00122f!important;}
body[data-theme="light"] .ab-red{background:#fff5f5!important;border-color:#fecaca!important;}
body[data-theme="light"] .ab-amber{background:#fffbeb!important;border-color:#fde68a!important;}
body[data-theme="light"] .ab-green{background:#f0fdf4!important;border-color:#bbf7d0!important;}
body[data-theme="light"] .hl-green{background:#f0fdf4!important;border-color:#bbf7d0!important;}
body[data-theme="light"] .hl-red{background:#fff5f5!important;border-color:#fecaca!important;}
body[data-theme="light"] .pill-green{background:rgba(22,163,74,0.08)!important;color:#16a34a!important;}
body[data-theme="light"] .collapse-icon{color:#7a8eaa!important;}
body[data-theme="light"] .collapsible-header{color:#00122f!important;}
body[data-theme="light"] #settings-panel{background:#ffffff!important;border-left:1px solid rgba(0,18,47,0.08)!important;}
body[data-theme="light"] .bdr-hero{background:linear-gradient(135deg,#003cfd 0%,#00122f 100%)!important;}
body[data-theme="light"] .rc-tm{background:rgba(13,148,136,0.08)!important;border-color:rgba(13,148,136,0.2)!important;color:#0d9488!important;}
body[data-theme="light"] .jdc-tooltip{background:#00122f!important;}
body[data-theme="light"] .jdc-tooltip::after{border-top-color:#00122f!important;}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:\'Inter\',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;overscroll-behavior:none;}

/* ── Tipografia Inter — hierarquia ── */
.t-title   {font-family:\'Inter\',sans-serif;font-weight:700;font-size:16px;color:var(--text);letter-spacing:-.01em;}
.t-subtitle{font-family:\'Inter\',sans-serif;font-weight:400;font-size:13px;color:var(--text2);}
.t-label   {font-family:\'Inter\',sans-serif;font-weight:600;font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;}
.t-caption {font-family:\'Inter\',sans-serif;font-weight:400;font-size:11px;color:var(--text3);}
.t-tag     {font-family:\'Inter\',sans-serif;font-weight:500;font-size:10px;}
.card-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px;font-family:'Inter',sans-serif;letter-spacing:-.01em}

.screen{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden;}
.screen.active{display:flex;}

/* ── LOGIN ──────────────────────────────────────── */
#screen-login{
  background:linear-gradient(160deg,#6366f1 0%,#0a0a0f 40%,#1e3a8a 100%);
  align-items:center;justify-content:flex-start;
  padding:0;overflow-y:auto;
}
.login-header{
  width:100%;padding:52px 28px 28px;
  display:flex;flex-direction:column;align-items:center;
}
.login-wave{
  position:absolute;bottom:0;left:0;right:0;
  height:72%;background:rgba(10,10,15,0.95);
  border-radius:32px 32px 0 0;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}
.login-content{
  position:relative;z-index:1;
  width:100%;padding:24px 20px 40px;
  display:flex;flex-direction:column;
}
.login-section-label{color:#ffffff!important;
  font-size:10px;font-weight:600;color:var(--text3);
  text-transform:uppercase;letter-spacing:.1em;
  margin-bottom:12px;padding-left:4px;
}
.login-card{
  display:flex;align-items:center;gap:14px;
  background:rgba(255,255,255,0.03);border-radius:var(--radius-sm);
  padding:14px 16px;margin-bottom:10px;
  box-shadow:0 2px 12px rgba(0,0,0,0.2);
  border:2px solid rgba(255,255,255,0.10);
  cursor:pointer;transition:all .3s ease;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  position:relative;
}
.login-card:hover{
  border-color:rgba(205,255,130,0.4);
  box-shadow:0 0 24px rgba(205,255,130,0.12),0 0 48px rgba(99,102,241,0.08);
}
.login-card:active{transform:scale(.97);border-color:var(--gupy-green);box-shadow:0 0 32px rgba(205,255,130,0.2);}
.login-card-photo{
  width:46px;height:46px;border-radius:50%;
  object-fit:cover;flex-shrink:0;
  background:var(--bg3);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:600;
  overflow:hidden;
  border:2.5px solid rgba(99,102,241,0.5);
  box-shadow:0 0 12px rgba(99,102,241,0.2);
}
.login-card-info{flex:1;}
.login-card-name{font-size:15px;font-weight:600;color:var(--text);}
.login-card-role{font-size:12px;color:var(--text2);margin-top:1px;}
.login-card-arrow{color:var(--accent);font-size:18px;font-weight:300;}

/* ── APP SHELL ──────────────────────────────────── */
#screen-app{background:var(--bg);}

/* Header */
.app-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;padding-top:calc(16px + var(--safe-top));
  flex-shrink:0;
  background:rgba(10,10,15,0.85);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(255,255,255,0.06);
  z-index:50;
}
.app-header-left{display:flex;align-items:center;gap:12px;}
.app-avatar{
  width:38px;height:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:600;
  overflow:hidden;flex-shrink:0;
  box-shadow:0 0 0 2px var(--accent-light);
}
.app-user-name{font-size:14px;font-weight:600;color:var(--text);}
.app-user-role{font-size:11px;color:var(--text2);margin-top:1px;}
.app-header-right{display:flex;align-items:center;gap:8px;}
.update-chip{
  font-size:10px;color:var(--text2);
  font-family:'Inter',sans-serif;
  background:var(--bg3);padding:4px 9px;
  border-radius:20px;border:1px solid var(--border);
}
.logout-btn{
  width:32px;height:32px;border-radius:50%;
  background:var(--bg3);border:1px solid var(--border);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:14px;color:var(--text2);
}

/* Bottom navigation */
.bottom-nav{
  display:flex;align-items:center;justify-content:space-around;
  height:calc(var(--bottom-nav-h) + var(--safe-bottom));
  padding-bottom:var(--safe-bottom);
  background:rgba(10,10,15,0.9);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-top:1px solid rgba(255,255,255,0.06);
  flex-shrink:0;
}
.nav-item{
  display:flex;flex-direction:column;align-items:center;gap:0;
  padding:10px 8px;cursor:pointer;flex:1;
  color:var(--text3);transition:color .2s,transform .2s;
  background:none;border:none;font-family:'Inter',sans-serif;
}
.nav-item.active{color:var(--gupy-green);text-shadow:0 0 12px rgba(205,255,130,0.4);}
.nav-icon{display:none;}
.nav-label{font-size:10px;font-weight:400;}
.nav-item.active .nav-icon-dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--gupy-green);margin:0 auto;box-shadow:0 0 8px rgba(205,255,130,0.5);
}

/* Content panes */
.tab-content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.tab-pane{display:none;padding:16px 16px 24px;}
.tab-pane.active{display:block;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 8px rgba(99,102,241,0.2)}50%{box-shadow:0 0 24px rgba(99,102,241,0.4)}}
@keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes countUp{from{opacity:0;transform:scale(0.85)}to{opacity:1;transform:scale(1)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

/* ── CARDS ──────────────────────────────────────── */
.card{
  background:var(--bg2);border-radius:var(--radius);
  padding:16px;box-shadow:var(--shadow);
  border:1px solid var(--border);
}
.card+.card,.card+.metrics-grid,.metrics-grid+.card{margin-top:12px;}
.card-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px;font-family:'Inter',sans-serif;letter-spacing:-.01em}

/* Metric cards */
.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.metrics-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px;}
.metric-card{
  background:rgba(18,18,26,0.6);border-radius:var(--radius-sm);
  padding:10px 12px 8px;box-shadow:var(--shadow-sm);
  border:1px solid rgba(255,255,255,0.06);
  position:relative;overflow:hidden;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  transition:transform .2s,box-shadow .2s;
}
.metric-card:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,0.3);}
.metric-icon{
  width:32px;height:32px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;margin-bottom:8px;
}
.metric-label{font-size:12px;color:var(--text2);font-weight:600;margin-bottom:3px;}
.metric-val{font-size:26px;font-weight:700;color:var(--text);line-height:1;font-family:'Inter',sans-serif;}
.metric-sub{font-size:12px;color:var(--text2);margin-top:4px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.metric-progress{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:10px;}
.metric-progress-fill{height:100%;border-radius:2px;}

/* Icon bg variants */
.mi-blue{background:var(--accent-light);color:var(--accent);}
.mi-green{background:rgba(34,197,94,0.12);color:var(--green);}
.mi-amber{background:rgba(245,158,11,0.12);color:var(--amber);}
.mi-red{background:rgba(248,113,113,0.08);color:var(--red);}
.mi-purple{background:rgba(168,85,247,0.12);color:var(--purple);}
.mi-teal{background:rgba(20,184,166,0.12);color:var(--teal);}

/* Backward compat */
.mc-green .metric-icon,.mc-blue .metric-icon{display:none;}
.mc-green::before,.mc-amber::before,.mc-red::before,.mc-blue::before,.mc-purple::before{display:none;}

/* Pills */
.pill{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;}
.pill-green{background:rgba(205,255,130,0.10);color:var(--gupy-green);}
.pill-amber{background:var(--amber-bg);color:var(--amber);}
.pill-red{background:var(--red-bg);color:var(--red);}
.pill-blue{background:var(--accent-light);color:var(--accent);}

/* Funnel */
.funnel{display:flex;flex-direction:column;gap:6px;}
.funnel-row{display:flex;align-items:center;gap:8px;}
.funnel-name{font-size:11px;color:var(--text2);width:110px;flex-shrink:0;text-align:right;}
.funnel-track{flex:1;height:26px;background:var(--bg3);border-radius:6px;overflow:hidden;}
.funnel-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:9px;}
.funnel-fill span{font-size:11px;font-weight:600;font-family:'Inter',sans-serif;color:rgba(255,255,255,.95);}
.funnel-num{font-size:11px;font-family:'Inter',sans-serif;color:var(--text);width:28px;text-align:right;font-weight:600;}

/* Conv list */
.conv-list{display:flex;flex-direction:column;}
.conv-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
.conv-item:last-child{border-bottom:none;}
.conv-tag{font-size:10px;font-family:'Inter',sans-serif;background:var(--bg3);color:var(--text2);padding:3px 7px;border-radius:5px;flex-shrink:0;font-weight:600;}
.conv-lbl{font-size:11px;color:var(--text2);margin-left:8px;flex:1;}
.conv-right{display:flex;align-items:center;gap:6px;}
.conv-pct{font-size:15px;font-weight:700;font-family:'Inter',sans-serif;}
.conv-meta{font-size:10px;color:var(--text3);}
.delta-pos{font-size:11px;font-family:'Inter',sans-serif;font-weight:600;color:var(--green);}
.delta-neg{font-size:11px;font-family:'Inter',sans-serif;font-weight:600;color:var(--red);}

/* Insight block */
.insight-block{margin-top:14px;border-top:1px solid var(--border);padding-top:14px;}
.insight-title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;display:flex;align-items:center;gap:5px;}
.insight-title span{color:var(--accent);}
.insight-item{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;line-height:1.55;}
.insight-item:last-child{border-bottom:none;}
.insight-arrow{font-size:13px;flex-shrink:0;margin-top:1px;font-weight:700;}
.insight-arrow.up{color:var(--green);}
.insight-arrow.down{color:var(--red);}
.insight-arrow.warn{color:var(--amber);}
.insight-text{color:var(--text);}
.insight-text strong{font-weight:600;}

/* Alert banners */
.alert-banner{border-radius:var(--radius-sm);padding:11px 14px;font-size:12px;border:1px solid;margin-bottom:10px;display:flex;gap:9px;align-items:flex-start;line-height:1.55;}
.ab-red{background:rgba(248,113,113,0.06);border-color:rgba(248,113,113,0.20);color:var(--text);}
.ab-amber{background:rgba(245,158,11,0.08);border-color:rgba(245,158,11,0.25);color:var(--text);}
.ab-green{background:rgba(34,197,94,0.08);border-color:rgba(34,197,94,0.25);color:var(--text);}
.ab-blue{background:var(--accent-light);border-color:rgba(99,102,241,0.25);color:var(--text);}

/* Highlights */
.hl-pair{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
.hl-box{border-radius:var(--radius-sm);padding:12px 14px;}
.hl-green{background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.2);}
.hl-red{background:rgba(248,113,113,0.06);border:1px solid rgba(248,113,113,0.15);}
.hl-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;display:flex;align-items:center;gap:4px;}
.hl-green .hl-title{color:var(--green);}
.hl-red .hl-title{color:var(--red);}
.hl-dot{width:5px;height:5px;border-radius:50%;}
.hl-green .hl-dot{background:var(--green);}
.hl-red .hl-dot{background:var(--red);}
.hl-item{font-size:11px;color:var(--text);padding:4px 0;border-bottom:1px solid;display:flex;gap:5px;}
.hl-green .hl-item{border-color:rgba(22,163,74,0.12);}
.hl-red .hl-item{border-color:rgba(220,38,38,0.12);}
.hl-item:last-child{border-bottom:none;}

/* Progress */
.prog-row{margin-bottom:10px;}
.prog-meta{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;}
.prog-name{color:var(--text);font-weight:500;}
.prog-num{color:var(--text2);font-family:'Inter',sans-serif;}
.prog-track{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;border-radius:3px;}

/* BDR list */
.bdr-list{display:flex;flex-direction:column;}
.bdr-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border);}
.bdr-row:last-child{border-bottom:none;}
.bdr-left{display:flex;align-items:center;gap:10px;}
.bdr-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;overflow:hidden;}
.bdr-info-name{font-size:13px;font-weight:600;color:var(--text);}
.bdr-info-sub{font-size:10px;color:var(--text2);}
.bdr-right{display:flex;align-items:center;gap:10px;}
.bdr-stat{text-align:right;}
.bdr-stat-val{font-size:13px;font-family:'Inter',sans-serif;font-weight:600;display:block;color:var(--text);}
.bdr-stat-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* Pace */
.pace-list{display:flex;flex-direction:column;}
.pace-row{padding:10px 0;border-bottom:1px solid var(--border);}
.pace-row:last-child{border-bottom:none;}
.pace-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.pace-name{font-size:12px;font-weight:500;display:flex;align-items:center;gap:7px;color:var(--text);}
.pace-right{display:flex;align-items:center;gap:6px;}
.pace-needed{font-size:10px;color:var(--text3);}
.pace-track{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.pace-fill{height:100%;border-radius:3px;}
.pace-pill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;}
.pp-green{background:var(--green-bg);color:var(--green);}
.pp-amber{background:var(--amber-bg);color:var(--amber);}
.pp-red{background:var(--red-bg);color:var(--red);}

/* Proj */
.proj-big{font-size:40px;font-weight:700;font-family:'Inter',sans-serif;line-height:1;color:var(--text);}
.proj-track{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;margin:10px 0 6px;}
.proj-bar{height:100%;border-radius:4px;}

.divider{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin:16px 0 10px;padding-bottom:7px;border-bottom:1px solid var(--border);}

/* BDR hero */
.bdr-hero{background:linear-gradient(135deg,#6366f1 0%,#a855f7 40%,#1a1a26 100%);border-radius:var(--radius);padding:20px;margin-bottom:12px;text-align:center;box-shadow:0 4px 32px rgba(99,102,241,0.2);}
.bdr-hero-av{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;margin:0 auto 10px;border:3px solid rgba(255,255,255,0.15);overflow:hidden;}
.bdr-hero-name{font-size:17px;font-weight:700;margin-bottom:2px;color:#fff;}
.bdr-hero-role{font-size:11px;color:rgba(255,255,255,.7);}
.bdr-metrics-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px;}
.bdr-metric-mini{background:var(--bg2);border-radius:var(--radius-sm);padding:12px 8px;text-align:center;box-shadow:var(--shadow-sm);}
.bdr-metric-mini .val{font-size:22px;font-weight:700;font-family:'Inter',sans-serif;line-height:1;color:var(--text);}
.bdr-metric-mini .lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-top:4px;}
.bdr-metric-mini .sub{font-size:10px;margin-top:2px;color:var(--text2);}

/* Reunion chips */
.reun-date-block{margin-bottom:14px;}
.reun-date-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.reun-chips{display:flex;flex-wrap:wrap;gap:6px;}
.reun-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid;}
.rc-ta{background:rgba(99,102,241,0.08);border-color:#bfdbfe;color:#6366f1;}
.rc-tm{background:rgba(20,184,166,0.1);border-color:rgba(20,184,166,0.25);color:#14b8a6;}
.rc-dot{width:5px;height:5px;border-radius:50%;}
.rc-ta .rc-dot{background:#6366f1;}
.rc-tm .rc-dot{background:#0f766e;}

/* Motivos */
.motivo-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.motivo-lbl{font-size:11px;color:var(--text);width:130px;flex-shrink:0;text-align:right;line-height:1.35;font-weight:500;}
.motivo-track{flex:1;height:18px;background:var(--bg3);border-radius:4px;overflow:hidden;}
.motivo-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:7px;}
.motivo-fill span{font-size:10px;font-family:'Inter',sans-serif;color:rgba(255,255,255,.95);font-weight:600;}
.motivo-n{font-size:10px;font-family:'Inter',sans-serif;color:var(--text2);width:22px;text-align:right;font-weight:600;}

.etapa-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:12px;}
.etapa-box{background:var(--bg3);border-radius:var(--radius-sm);padding:12px;text-align:center;}
.etapa-box .ev{font-size:24px;font-weight:700;font-family:'Inter',sans-serif;color:var(--text);}
.etapa-box .el{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-top:3px;}
.etapa-box .ep{font-size:10px;margin-top:3px;color:var(--text2);}

/* ── TICKER ─────────────────────────────────────── */
.ticker-bar{display:none;}
.ticker-label{
  font-size:10px;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;
  background:rgba(0,0,0,.2);
  padding:0 12px;height:100%;
  display:flex;align-items:center;
  white-space:nowrap;flex-shrink:0;
}
.ticker-track{flex:1;overflow:hidden;position:relative;height:100%;}
.ticker-inner{
  display:flex;align-items:center;height:100%;
  white-space:nowrap;
  animation:ticker-scroll 32s linear infinite;
}
.ticker-inner:hover{animation-play-state:paused;}
@keyframes ticker-scroll{
  0%{transform:translateX(100%);}
  100%{transform:translateX(-100%);}
}
.ticker-item{
  font-size:11px;font-weight:500;
  padding:0 24px;
  display:inline-flex;align-items:center;gap:6px;
}
.ticker-sep{opacity:.4;margin:0 4px;}


.collapsible-header{cursor:pointer;user-select:none;}
.collapsible-header:active{opacity:.8;}
.collapse-icon{transition:transform .2s ease;display:inline-block;color:var(--gupy-green)!important;}

@media(max-width:360px){
  .funnel-name{width:85px;}
  .motivo-lbl{width:100px;}
  .metrics-grid{grid-template-columns:1fr 1fr;}
}

<script>
// ─── DATA ────────────────────────────────────────────────────
// ── Trophies & Badges helpers ──
function calcTrofeus(bdrId){
  const hist=DATA.metaHistorico&&DATA.metaHistorico[bdrId];
  if(!hist) return {count:0,streak:0};
  // Count consecutive months ending at most recent
  const months=['mar','fev','jan'];
  let streak=0;
  for(const m of months){
    if(hist[m]) streak++; else break;
  }
  // Total months with meta
  const count=months.filter(m=>hist[m]).length;
  return {count,streak};
}

function getEspecialidades(bdrId){
  return (DATA.especialistas&&DATA.especialistas[bdrId])||[];
}

// Badge label config
const ESPECIALIDADE_CONFIG={
  'CRM':          {icon:'🗂',  color:'#6366f1', bg:'rgba(99,102,241,0.1)'},
  'MeetRox':      {icon:'🎙',  color:'#8b5cf6', bg:'rgba(139,92,246,0.1)'},
  'Treinamentos': {icon:'📚',  color:'#14b8a6', bg:'rgba(8,145,178,0.1)'},
  'Embaixador Gupy':{icon:'🏅',color:'#6366f1', bg:'rgba(0,60,253,0.1)'},
};

// ─── PACING POR DIAS ÚTEIS (padrão do app) ────────────────────
// Todas as telas que mostram "atingimento da meta" usam computePacing().
// Regra: paceEsperado = (diasUteisPassados / diasUteisTotais) * meta
// Estados:   above  (ratio >  +0.05) → verde
//            ontrack(ratio >= -0.05) → amber (dentro do pace)
//            below  (ratio <  -0.05) → vermelho
// Feriados nacionais BR 2026 + carnaval (move-se por ano). Override em window.FERIADOS_CUSTOM.
const FERIADOS_BR={
  2026:new Set([
    '2026-01-01','2026-02-16','2026-02-17', // Confraternização + Carnaval seg/ter
    '2026-04-03','2026-04-21',              // Sexta Santa, Tiradentes
    '2026-05-01','2026-06-04',              // Trabalho, Corpus Christi
    '2026-09-07','2026-10-12',              // Independência, Aparecida
    '2026-11-02','2026-11-15','2026-11-20', // Finados, Proclamação, Consciência Negra
    '2026-12-25'                            // Natal
  ])
};
function isoDate(d){
  var y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+day;
}
function isFeriado(d){
  var set=FERIADOS_BR[d.getFullYear()];
  if(set && set.has(isoDate(d))) return true;
  if(window.FERIADOS_CUSTOM && window.FERIADOS_CUSTOM.has && window.FERIADOS_CUSTOM.has(isoDate(d))) return true;
  return false;
}
function isDiaUtil(d){
  var dow=d.getDay();
  if(dow===0||dow===6) return false;
  return !isFeriado(d);
}
function contarDiasUteis(start, end){
  // start e end são inclusivos
  if(end<start) return 0;
  var count=0,d=new Date(start.getFullYear(),start.getMonth(),start.getDate());
  while(d<=end){
    if(isDiaUtil(d)) count++;
    d.setDate(d.getDate()+1);
  }
  return count;
}
// Calcula pacing para um par (opps, meta) no mês corrente (ou numa data de referência).
function computePacing(opps, meta, opts){
  opts=opts||{};
  var ref=opts.ref?new Date(opts.ref):new Date();
  ref.setHours(0,0,0,0);
  var first=new Date(ref.getFullYear(),ref.getMonth(),1);
  var last=new Date(ref.getFullYear(),ref.getMonth()+1,0);
  var diasUteisTotais=contarDiasUteis(first,last);
  var diasUteisPassados=contarDiasUteis(first,ref);
  var diasUteisRestantes=Math.max(0,diasUteisTotais-diasUteisPassados);
  var paceEsperado=diasUteisTotais>0?(diasUteisPassados/diasUteisTotais)*meta:0;
  var paceRound=Math.round(paceEsperado*10)/10;
  var gapPace=opps-paceEsperado;       // + adiantado / - atrasado
  var gapMeta=Math.max(0,meta-opps);   // quantas opps faltam para bater a meta
  var ratio=paceEsperado>0?gapPace/paceEsperado:(opps>=meta?1:-1);
  var state=ratio>0.05?'above':(ratio>=-0.05?'ontrack':'below');
  var cor=state==='above'?'var(--green)':state==='ontrack'?'var(--amber)':'var(--red)';
  var corBg=state==='above'?'var(--green-bg)':state==='ontrack'?'var(--amber-bg)':'var(--red-bg)';
  var corAccent=state==='above'?'#bbf7d0':state==='ontrack'?'#fde68a':'#fecaca';
  var corGrad=state==='above'?'linear-gradient(135deg,#16a34a 0%,#15803d 100%)'
    :state==='ontrack'?'linear-gradient(135deg,#d97706 0%,#b45309 100%)'
    :'linear-gradient(135deg,#dc2626 0%,#b91c1c 100%)';
  var pctAtingimento=meta>0?Math.round((opps/meta)*100):0;
  var pctPaceIdeal=meta>0?Math.min(100,Math.round((paceEsperado/meta)*100)):0;
  return {
    opps:opps, meta:meta,
    paceEsperado:paceRound, gapPace:Math.round(gapPace*10)/10, gapMeta:gapMeta,
    ratio:ratio, state:state,
    cor:cor, corBg:corBg, corAccent:corAccent, corGrad:corGrad,
    pctAtingimento:pctAtingimento, pctPaceIdeal:pctPaceIdeal,
    diasUteisTotais:diasUteisTotais, diasUteisPassados:diasUteisPassados, diasUteisRestantes:diasUteisRestantes
  };
}
window.computePacing=computePacing;

// Calcula semana atual de Abril 2026 baseada na data real
function calcSemAtual(){
  const hoje=new Date();
  const ano=hoje.getFullYear(), mes=hoje.getMonth(), dia=hoje.getDate();
  if(ano===2026 && mes===3){ // Abril
    if(dia<=4)  return 1; // S1: 31mar–04abr
    if(dia<=11) return 2; // S2: 07–11abr
    if(dia<=17) return 3; // S3: 14–17abr
    return 4;             // S4: 22–25abr
  }
  if(ano===2026 && mes===2 && dia>=31) return 1; // 31 Mar
  return 2; // fallback
}

// ─── LOGIN ────────────────────────────────────────────────────
function buildLogin(){
  // Dynamic greeting
  const h=new Date().getHours();
  const greet=h<12?'Bom dia! ☀️':h<18?'Boa tarde! 👋':'Boa noite! 🌙';
  const el=document.getElementById('login-greeting');
  if(el) el.textContent=greet;
  const content=document.getElementById('login-content');
  if(!content) return;
  content.innerHTML='';

  // Grid of person cards
  const label=document.createElement('div');
  label.className='login-section-label';
  label.textContent='Quem é você?';
  content.appendChild(label);

  const grid=document.createElement('div');
  grid.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:10px;';
  USERS.forEach(u=>{
    const card=document.createElement('button');
    card.style.cssText=`
      background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius);
      padding:16px 10px;cursor:pointer;transition:all .18s;
      display:flex;flex-direction:column;align-items:center;gap:10px;
      box-shadow:var(--shadow-sm);font-family:\'Inter\',sans-serif;
      text-align:center;
    `;
    const photoEl=u.photo
      ?`<img src="${u.photo}" style="width:60px;height:60px;border-radius:50%;object-fit:cover;border:2.5px solid var(--accent-dim);">`
      :`<div style="width:60px;height:60px;border-radius:50%;background:${u.bg};color:${u.color};display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;border:2.5px solid var(--accent-dim);">${u.av}</div>`;
    card.innerHTML=`
      ${photoEl}
      <div>
        <div style="font-size:13px;font-weight:600;color:var(--text);line-height:1.3">${u.name.split(' ')[0]}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:2px">${u.isGestor?'Líder':'BDR'}</div>
      </div>`;
    card.addEventListener('touchstart',()=>{ card.style.transform='scale(.96)'; card.style.borderColor='var(--accent)'; },{passive:true});
    card.addEventListener('touchend',()=>{ card.style.transform=''; card.style.borderColor=''; },{passive:true});
    card.onclick=()=>{
      if(u.isGestor){
        var pw=prompt('🔒 Acesso restrito — digite a senha:');
        if(!pw) return;
        if(pw!=='\u004C\u006F\u0062\u0078\u0073\u0032\u0030\u0032\u0036') { alert('Senha incorreta.'); return; }
      }
      currentUser=u; doLogin();
    };
    grid.appendChild(card);
  });
  content.appendChild(grid);
}

async function showAnalytics(){
  var old=document.getElementById('analytics-modal');
  if(old) old.remove();
  var overlay=document.createElement('div');
  overlay.id='analytics-modal';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)';
  overlay.onclick=function(e){if(e.target===overlay)overlay.remove();};
  overlay.innerHTML='<div style="background:var(--bg2);border-radius:16px;padding:20px;max-width:440px;width:100%;max-height:85vh;overflow-y:auto;border:1px solid var(--border)"><div style="text-align:center;padding:20px;color:var(--text3)">Carregando analytics...</div></div>';
  document.body.appendChild(overlay);
  try{
    var rows=await supaFetch('gp_tracking','order=created_at.desc&limit=200');
    if(!rows||rows.length===0){overlay.querySelector('div>div').innerHTML='<div style="text-align:center;padding:20px;color:var(--text3)">Nenhum dado de uso ainda. Os dados aparecem após os BDRs usarem o app.</div>';return;}
    // Aggregate
    var userActivity={};var userLastSeen={};var tabCounts={};var actionCounts={};var deviceCounts={mobile:0,desktop:0};var today=new Date().toDateString();var todayCount=0;
    rows.forEach(function(r){
      // Track ALL activity per user (not just logins)
      if(r.user_name){
        userActivity[r.user_name]=(userActivity[r.user_name]||0)+1;
        if(!userLastSeen[r.user_name]||r.created_at>userLastSeen[r.user_name]) userLastSeen[r.user_name]=r.created_at;
      }
      // Tabs
      if(r.event==='tab_view') tabCounts[r.detail]=(tabCounts[r.detail]||0)+1;
      // Actions
      if(r.event!=='login'&&r.event!=='tab_view') actionCounts[r.event]=(actionCounts[r.event]||0)+1;
      // Device
      if(r.device) deviceCounts[r.device]=(deviceCounts[r.device]||0)+1;
      // Today
      if(new Date(r.created_at).toDateString()===today) todayCount++;
    });
    // Build HTML
    var html='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">'
      +'<div style="font-size:16px;font-weight:700;color:var(--text)">📊 Analytics de Uso</div>'
      +'<button onclick="document.getElementById(\'analytics-modal\').remove()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--text3)">✕</button></div>';
    // Summary cards
    html+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:16px">'
      +'<div style="text-align:center;padding:10px;background:var(--bg3);border-radius:10px"><div style="font-size:20px;font-weight:700;color:var(--accent)">'+rows.length+'</div><div style="font-size:9px;color:var(--text3)">Eventos total</div></div>'
      +'<div style="text-align:center;padding:10px;background:var(--bg3);border-radius:10px"><div style="font-size:20px;font-weight:700;color:var(--green)">'+todayCount+'</div><div style="font-size:9px;color:var(--text3)">Hoje</div></div>'
      +'<div style="text-align:center;padding:10px;background:var(--bg3);border-radius:10px"><div style="font-size:20px;font-weight:700;color:var(--purple)">'+Object.keys(userActivity).length+'</div><div style="font-size:9px;color:var(--text3)">Usuários</div></div>'
      +'</div>';
    // Device split
    var totalDev=deviceCounts.mobile+deviceCounts.desktop;
    html+='<div style="display:flex;gap:8px;margin-bottom:16px">'
      +'<div style="flex:1;padding:8px;background:var(--bg3);border-radius:8px;text-align:center"><div style="font-size:13px;font-weight:700;color:var(--text)">📱 '+deviceCounts.mobile+'</div><div style="font-size:9px;color:var(--text3)">Mobile'+(totalDev>0?' ('+Math.round(deviceCounts.mobile/totalDev*100)+'%)':'')+'</div></div>'
      +'<div style="flex:1;padding:8px;background:var(--bg3);border-radius:8px;text-align:center"><div style="font-size:13px;font-weight:700;color:var(--text)">💻 '+deviceCounts.desktop+'</div><div style="font-size:9px;color:var(--text3)">Desktop'+(totalDev>0?' ('+Math.round(deviceCounts.desktop/totalDev*100)+'%)':'')+'</div></div>'
      +'</div>';
    // User activity
    // Per-user detailed breakdown
    html+='<div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">Detalhamento por usuário</div>';
    // Build per-user data
    var perUser={};
    rows.forEach(function(r){
      if(!r.user_name) return;
      if(!perUser[r.user_name]) perUser[r.user_name]={total:0,tabs:{},actions:{},lastSeen:null,days:{}};
      var u=perUser[r.user_name];
      u.total++;
      if(!u.lastSeen||r.created_at>u.lastSeen) u.lastSeen=r.created_at;
      // Track by day
      var day=r.created_at?r.created_at.split('T')[0]:'';
      if(day){if(!u.days[day]) u.days[day]={total:0,tabs:{},actions:{}};u.days[day].total++;}
      if(r.event==='tab_view'&&r.detail){
        u.tabs[r.detail]=(u.tabs[r.detail]||0)+1;
        if(day) u.days[day].tabs[r.detail]=(u.days[day].tabs[r.detail]||0)+1;
      }
      if(r.event!=='tab_view'&&r.event!=='login'){
        u.actions[r.event]=(u.actions[r.event]||0)+1;
        if(day) u.days[day].actions[r.event]=(u.days[day].actions[r.event]||0)+1;
      }
    });
    var actionLabels={'forecast_submit':'Forecast enviado','forecast_approve':'Forecast aprovado','forecast_reflect':'Forecast devolvido','forecast_reset':'Forecast resetado','opps_modal':'Opps consultadas','jdc_save':'JDC salva','theme_change':'Tema alterado'};
    var sortedUsers=Object.keys(perUser).sort(function(a,b){return perUser[b].total-perUser[a].total;});
    sortedUsers.forEach(function(name){
      var u=perUser[name];
      var lastSeen=u.lastSeen?new Date(u.lastSeen).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'—';
      var uid='analytics-user-'+name.replace(/[^a-zA-Z]/g,'');
      html+='<div style="border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden">';
      // Header (clickable)
      html+='<div onclick="(function(){var el=document.getElementById(\''+uid+'\');el.style.display=el.style.display===\'none\'?\'block\':\'none\';})()" style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;cursor:pointer;background:var(--bg3)">'
        +'<div style="display:flex;align-items:center;gap:8px"><div style="width:8px;height:8px;border-radius:50%;background:var(--accent)"></div>'
        +'<div><div style="font-size:12px;font-weight:600;color:var(--text)">'+name+'</div>'
        +'<div style="font-size:9px;color:var(--text3)">Último: '+lastSeen+'</div></div></div>'
        +'<div style="display:flex;align-items:center;gap:8px"><div style="font-size:16px;font-weight:700;color:var(--accent)">'+u.total+'</div><span style="font-size:12px;color:var(--text3)">▾</span></div>'
        +'</div>';
      // Detail (collapsed by default)
      html+='<div id="'+uid+'" style="display:none;padding:10px 12px">';
      // Tabs visited
      var tabKeys=Object.keys(u.tabs).sort(function(a,b){return u.tabs[b]-u.tabs[a];});
      if(tabKeys.length>0){
        html+='<div style="font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;margin-bottom:4px">Abas visitadas</div>';
        tabKeys.forEach(function(tab){
          html+='<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:11px">'
            +'<span style="color:var(--text)">'+tab+'</span>'
            +'<span style="font-weight:700;color:var(--accent)">'+u.tabs[tab]+'x</span></div>';
        });
      }
      // Actions
      var actKeys=Object.keys(u.actions).sort(function(a,b){return u.actions[b]-u.actions[a];});
      if(actKeys.length>0){
        html+='<div style="font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;margin:8px 0 4px">Ações</div>';

          +'<span style="font-weight:700;color:var(--green)">'+actionCounts[act]+'</span></div>';
      });
    }
    // Recent events (last 15)
    html+='<div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin:16px 0 8px">Últimos eventos</div>';
    rows.slice(0,15).forEach(function(r){

        +'<span style="font-size:8px;color:var(--text3)">'+(r.device==='mobile'?'📱':'💻')+'</span>'
        +'</div>';
    });
    overlay.querySelector('div').innerHTML=html;
  }catch(e){
    overlay.querySelector('div>div').innerHTML='<div style="text-align:center;padding:20px;color:var(--text3)">Erro ao carregar analytics: '+e.message+'</div>';
  }
}

// ── TRACKING ──
function track(event,detail){
  try{
    var u=currentUser||{};
    var isMobile=/iPhone|iPad|Android|Mobile/i.test(navigator.userAgent);
    var payload={
      user_id:u.id||'unknown',
      user_name:(u.name||'').split(' ')[0],
      is_gestor:u.isGestor||false,
      event:event,
      detail:detail||'',
      device:isMobile?'mobile':'desktop',
      created_at:new Date().toISOString()
    };
    fetch(SUPA_URL+'/rest/v1/gp_tracking',{
      method:'POST',
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify(payload)
    }).catch(function(){});
  }catch(e){}
}

function doLogin(){
  if(!currentUser) return;
  try{
    localStorage.setItem('gupypulse_session',JSON.stringify({userId:currentUser.id}));
    if(currentUser.isGestor) sessionStorage.setItem('gupypulse_gestor_auth','true');
  }catch(e){}
  track('login','direct');
  document.getElementById('screen-login').classList.remove('active');
  document.getElementById('screen-app').classList.add('active');
  setupApp();
}

function doLogout(){
  try{localStorage.removeItem('gupypulse_session');sessionStorage.removeItem('gupypulse_gestor_auth');}catch(e){}
  currentUser=null;
  document.getElementById('screen-app').classList.remove('active');
  document.getElementById('screen-login').classList.add('active');
  document.getElementById('bottom-nav').innerHTML='';
  document.getElementById('tab-content').innerHTML='';
}

function buildTicker(user){
  const ticker=document.getElementById('ticker-inner');
  if(!ticker) return;
  const d=DATA;
  let items=[];

  if(user.isGestor){
    const pctMeta=Math.round((d.funil.oportunidades/d.meta)*100);
    const proj=Math.round((d.funil.oportunidades/d.semAtual)*d.semTotal);
    items=[
      {icon:'▲',text:`Time · ${d.funil.oportunidades} opps de ${d.meta} · ${pctMeta}% da meta`},
      {icon:'—',text:`Projeção de fechamento: ${proj} opps`},
      {icon:'▲',text:`AI→LC em 74% · meta 57% · +17pp acima`},
      {icon:'▼',text:`LC→RA em 26% · meta 37% · −11pp abaixo`},
      {icon:'—',text:`${d.funil.reuniaoAgendada} reuniões agendadas na semana`},
      {icon:'▼',text:`${d.funil.desqualificados} leads desqualificados · 115 esta semana`},
      {icon:'▲',text:`MeetRox time · média 8.1 esta semana · 8.4 em março`},
    ];
  } else {
    const bdr=d.bdrs.find(b=>b.id===user.id);
    if(!bdr) return;
    const META=d.metaBDR;
    const pct=Math.round((bdr.opps/META)*100);
    const SEMR=d.semTotal-d.semAtual;
    const needed=SEMR>0?Math.ceil((META-bdr.opps)/SEMR):META-bdr.opps;
    const m=bdr.meetrox;
    items=[
      {icon:'—',text:`${bdr.name.split(' ')[0]} · ${(bdr.oppsMes||bdr.opps)} opps de ${META} · ${pct}% da meta`},
      {icon:'—',text:`${bdr.ras} reuniões agendadas · ${bdr.lig} ligações conectadas esta semana`},
      {icon:'—',text:`Precisa de ${needed} opps/semana nas próximas ${SEMR} semanas`},
      ...(m&&m.nota?[{icon:m.nota>=8?'▲':'▼',text:`MeetRox · nota ${m.nota} esta semana · M-1: ${m.notaMes}`}]:[]),
      {icon:'—',text:`${bdr.desq} leads desqualificados · principal motivo: ${d.bdrFunil[bdr.id]?.topMotivo||'—'}`},
    ];
  }

  ticker.innerHTML=items.map(item=>`
    <span class="ticker-item">
      <span style="opacity:.6">${item.icon}</span>
      ${item.text}
    </span>
    <span class="ticker-sep">·</span>
  `).join('') + items.map(item=>`
    <span class="ticker-item">
      <span style="opacity:.6">${item.icon}</span>
      ${item.text}
    </span>
    <span class="ticker-sep">·</span>
  `).join(''); // duplicate for seamless loop
}

// ─── DRAG & DROP CARDS ────────────────────────────────────────
function makePaneDraggable(pane, storageKey){
  // Wait a tick for innerHTML to settle
  setTimeout(function(){
    var cards=Array.from(pane.querySelectorAll(':scope > .card'));
    if(cards.length < 2) return; // nothing to reorder

    // Restore saved order
    try{
      var saved=JSON.parse(localStorage.getItem(storageKey));
      if(saved && Array.isArray(saved) && saved.length === cards.length){
        // Give each card a stable index based on position
        cards.forEach(function(c,i){ c.dataset.dragIdx=String(i); });
        var reordered=[];
        saved.forEach(function(idx){
          var c=pane.querySelector(':scope > .card[data-drag-idx="'+idx+'"]');
          if(c) reordered.push(c);
        });
        // append any missing
        cards.forEach(function(c){
          if(!reordered.includes(c)) reordered.push(c);
        });
        reordered.forEach(function(c){ pane.appendChild(c); });
        cards=reordered;
      }
    }catch(e){}

    // Tag cards with index
    cards.forEach(function(c,i){ c.dataset.dragIdx=String(i); });

    function saveOrder(){
      var order=Array.from(pane.querySelectorAll(':scope > .card')).map(function(c){return c.dataset.dragIdx;});
      try{ localStorage.setItem(storageKey,JSON.stringify(order)); }catch(e){}
    }

    var dragSrc=null;

    cards.forEach(function(card){
      // Add drag handle to card
      var existingHandle=card.querySelector('.drag-handle');
      if(existingHandle) return;

      var handle=document.createElement('div');
      handle.className='drag-handle';
      handle.innerHTML='⠿';
      handle.title='Arrastar para reordenar';
      handle.style.cssText='position:absolute;top:10px;right:40px;font-size:14px;color:var(--border2);cursor:grab;padding:2px 6px;border-radius:4px;transition:color .15s;z-index:2;user-select:none;touch-action:none';
      handle.onmouseenter=function(){ handle.style.color='var(--text2)'; };
      handle.onmouseleave=function(){ handle.style.color='var(--border2)'; };

      // Make card relative for handle positioning
      if(getComputedStyle(card).position==='static') card.style.position='relative';
      card.appendChild(handle);
      card.draggable=true;

      // Desktop drag
      card.addEventListener('dragstart',function(e){
        // Only if drag started from handle area
        dragSrc=card;
        card.style.opacity='0.45';
        e.dataTransfer.effectAllowed='move';
      });
      card.addEventListener('dragend',function(){
        dragSrc=null;
        card.style.opacity='1';
        Array.from(pane.querySelectorAll(':scope > .card')).forEach(function(c){
          c.style.borderTop=''; c.style.borderBottom='';
        });
        saveOrder();
      });
      card.addEventListener('dragover',function(e){
        e.preventDefault();
        if(!dragSrc||dragSrc===card) return;
        Array.from(pane.querySelectorAll(':scope > .card')).forEach(function(c){
          c.style.borderTop=''; c.style.borderBottom='';
        });
        var rect=card.getBoundingClientRect();
        var mid=rect.top+rect.height/2;
        if(e.clientY<mid) card.style.borderTop='2px solid var(--accent)';
        else card.style.borderBottom='2px solid var(--accent)';
      });
      card.addEventListener('dragleave',function(){
        card.style.borderTop=''; card.style.borderBottom='';
      });
      card.addEventListener('drop',function(e){
        e.preventDefault();
        card.style.borderTop=''; card.style.borderBottom='';
        if(!dragSrc||dragSrc===card) return;
        var rect=card.getBoundingClientRect();
        var mid=rect.top+rect.height/2;
        if(e.clientY<mid) pane.insertBefore(dragSrc,card);
        else pane.insertBefore(dragSrc,card.nextSibling);
        saveOrder();
      });

      // Touch drag
      var touchClone=null, touchOffY=0;
      handle.addEventListener('touchstart',function(e){
        e.stopPropagation();
        dragSrc=card;
        var t=e.touches[0];
        touchOffY=t.clientY-card.getBoundingClientRect().top;
        touchClone=card.cloneNode(true);
        touchClone.style.cssText='position:fixed;left:'+card.getBoundingClientRect().left+'px;top:'+(t.clientY-touchOffY)+'px;width:'+card.offsetWidth+'px;opacity:.6;z-index:9999;pointer-events:none;box-shadow:0 8px 30px rgba(0,0,0,.25)';
        document.body.appendChild(touchClone);
        card.style.opacity='0.35';
      },{passive:true});
      handle.addEventListener('touchmove',function(e){
        if(!touchClone) return;
        e.preventDefault();
        var t=e.touches[0];
        touchClone.style.top=(t.clientY-touchOffY)+'px';
        touchClone.style.display='none';
        var el=document.elementFromPoint(t.clientX,t.clientY);
        touchClone.style.display='';
        var target=el?el.closest('.card'):null;
        Array.from(pane.querySelectorAll(':scope > .card')).forEach(function(c){
          c.style.borderTop=''; c.style.borderBottom='';
        });
        if(target&&target!==card&&pane.contains(target)){
          var rect=target.getBoundingClientRect();
          if(t.clientY<rect.top+rect.height/2) target.style.borderTop='2px solid var(--accent)';
          else target.style.borderBottom='2px solid var(--accent)';
        }
      },{passive:false});
      handle.addEventListener('touchend',function(e){
        if(touchClone){ touchClone.remove(); touchClone=null; }
        card.style.opacity='1';
        Array.from(pane.querySelectorAll(':scope > .card')).forEach(function(c){
          c.style.borderTop=''; c.style.borderBottom='';
        });
        if(!dragSrc) return;
        var t=e.changedTouches[0];
        var el=document.elementFromPoint(t.clientX,t.clientY);
        var target=el?el.closest('.card'):null;
        if(target&&target!==card&&pane.contains(target)){
          var rect=target.getBoundingClientRect();
          if(t.clientY<rect.top+rect.height/2) pane.insertBefore(card,target);
          else pane.insertBefore(card,target.nextSibling);
        }
        dragSrc=null;
        saveOrder();
      });
    });
  },80);
}

function buildTabs(tabs,builders){
  const nav=document.getElementById('bottom-nav');
  const content=document.getElementById('tab-content');
  nav.innerHTML=''; content.innerHTML='';
  tabs.forEach((t,i)=>{
    // Nav button
    const btn=document.createElement('button');
    btn.className='nav-item'+(i===0?' active':'');
    btn.dataset.idx=i;
    const iconKey=t.id.replace('-','_');
    btn.innerHTML=`<span class="nav-icon">${NAV_ICONS[iconKey]||'◦'}</span><span class="nav-label">${NAV_LABELS[iconKey]||t.label}</span>`;
    btn.onclick=()=>{
      document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
      btn.classList.add('active');
      const pane=document.getElementById('pane-'+t.id);
      pane.classList.add('active');
      track('tab_view',t.label||t.id);
      if(!pane.dataset.built){
        pane.dataset.built='1';
        builders[i](pane);
        makePaneDraggable(pane,'drag-order-'+t.id+'-'+(currentUser?currentUser.id:'g'));
      }
    };
    nav.appendChild(btn);
    // Pane
    const pane=document.createElement('div');
    pane.className='tab-pane'+(i===0?' active':'');
    pane.id='pane-'+t.id;
    content.appendChild(pane);
    if(i===0){
      pane.dataset.built='1';
      builders[0](pane);
      makePaneDraggable(pane,'drag-order-'+t.id+'-'+(currentUser?currentUser.id:'g'));
    }
  });
}
